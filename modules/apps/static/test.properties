##
## Test Suites
##


	modified.files.includes[relevant][static-rule]=**

	relevant.rule.names=\
		static-rule

	test.batch.names[relevant][static-rule]=\
		modules-integration-mysql57-jdk8,\
		functional-tomcat90-mysql57-jdk8

    modules.includes.required.test.batch.class.names.includes[modules-integration-*-jdk8][relevant][static-rule]=\
        **/change-tracking/**/*Test.java


    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][static-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][static-rule]=\
        (testray.main.component.name == "Bundle Blacklist") OR \
        (testray.main.component.name == "File Install") OR \
        (testray.main.component.name == "Publications")

##
## Testray
##

    testray.main.component.name=File Install