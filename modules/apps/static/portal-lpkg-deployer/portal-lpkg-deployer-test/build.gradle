copyLibs {
	enabled = true
}

dependencies {
	compileOnly project(":apps:static:portal-lpkg-deployer:portal-lpkg-deployer")

	testImplementation group: "com.liferay.portal", name: "com.liferay.portal.impl", version: "default"
	testImplementation group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "default"
	testImplementation group: "com.liferay.portal", name: "com.liferay.util.java", version: "default"
	testImplementation group: "commons-io", name: "commons-io", version: "2.5"
	testImplementation group: "easyconf", name: "easyconf", version: "0.9.5"
	testImplementation group: "javax.servlet", name: "javax.servlet-api", version: "3.0.1"
	testImplementation group: "org.apache.tika", name: "tika-core", version: "1.26"
	testImplementation group: "org.osgi", name: "osgi.core", version: "6.0.0"
	testImplementation project(":apps:static:portal-lpkg-deployer:portal-lpkg-deployer-test-util")
	testImplementation project(":core:petra:petra-lang")

	testIntegrationImplementation group: "com.liferay", name: "com.liferay.arquillian.extension.junit.bridge", version: "1.0.19"
}

test {
	systemProperty "liferay.home", System.getProperty("liferay.home")
}