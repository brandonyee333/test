forbidden.classes=इनपुट कॉमा डीलिमित क्लास नामों की एक सूची जो उपयोगकर्ता परिभाषित सर्वर साइड स्क्रिप्ट के लिए कभी उपलब्ध नहीं होगी। विशेष स्ट्रिंग "all_classes" किसी भी जावा वर्ग तक पहुंच को अक्षम करती है। यह संपत्ति केवल स्क्रिप्टिंग सेवा का उपयोग करते समय और ईवल या एक्सईसी विधियों को लागू करते समय प्रभावी होती है। (Automatic Translation)
