additional-configurations=Configurazioni aggiuntive
additional-configurations-help=Impostazioni personalizzate per Elasticsearch incorporato, in formato YML (elasticsearch.yml). (Automatic Translation)
additional-index-configurations=Configurazioni di indice aggiuntive (Automatic Translation)
additional-index-configurations-help=Impostazioni personalizzate per l'indice Liferay, in formato JSON o YML (Elasticsearch Create Index API). (Automatic Translation)
additional-type-mappings=Mapping dei tipi aggiuntivi (Automatic Translation)
additional-type-mappings-help=Mapping personalizzati per LiferayDocumentType, in formato JSON (API di mapping dei put di Elasticsearch). Questo valore deve essere impostato solo con nuovi mapping di campo. Se si imposta questo valore con mapping sovrapposti per i campi predefiniti, la creazione dell'indice ha esito negativo. Per sostituire completamente i mapping predefiniti, utilizzare overrideTypeMappings. (Automatic Translation)
bootstrap-mlockall=Bootstrap Mlockall (Automatic Translation)
bootstrap-mlockall-help=Se questa opzione è selezionata, lo spazio degli indirizzi di processo viene bloccato nella RAM, impedendo lo scambio di memoria Elasticsearch. (Automatic Translation)
client-transport-ignore-cluster-name=Trasporto client Ignora nome cluster (Automatic Translation)
client-transport-ignore-cluster-name-help=Se questa opzione è selezionata, la convalida del nome del cluster dei nodi connessi viene ignorata. (Automatic Translation)
client-transport-nodes-sampler-interval=Intervallo campionatore nodi trasporto client (Automatic Translation)
client-transport-nodes-sampler-interval-help=Intervallo (in secondi) in cui il nodo client campiona/esegue il ping dei nodi connessi. Se non impostato, viene utilizzato il client.transport.nodes_sampler_interval elasticsearch predefinito. (Automatic Translation)
client-transport-ping-timeout=Timeout ping trasporto client (Automatic Translation)
client-transport-ping-timeout-help=Ora (in secondi) in cui il nodo client attende una risposta ping da un nodo. Se non impostato, viene utilizzato il client.transport.ping_timeout elasticsearch predefinito. (Automatic Translation)
client-transport-sniff=Sniff del trasporto client (Automatic Translation)
client-transport-sniff-help=Se questa opzione è selezionata, lo sniffing del cluster è abilitato per individuare dinamicamente i nodi disponibili nel cluster. (Automatic Translation)
cluster-name=Nome Cluster
cluster-name-help=Nome del cluster a cui unirsi. Il nome deve corrispondere al cluster remoto quando la modalità operativa è impostata su remote. (Automatic Translation)
discovery-zen-ping-unicast-hosts-port=Zen Discovery Unicast ospita il porto (Automatic Translation)
discovery-zen-ping-unicast-hosts-port-help=Intervallo di porte da utilizzare durante la creazione del valore discovery.zen.ping.unicast.hosts. Più nodi Elasticsearch su una vasta gamma di porte possono fungere da router di gossip nello stesso computer. (Automatic Translation)
elasticsearch6-configuration-name=Ricerca elastica 6 (Automatic Translation)
http-cors-allow-origin=Http CORS Consenti origine (Automatic Translation)
http-cors-allow-origin-help=Origini da consentire quando il CORS HTTP è abilitato. (Automatic Translation)
http-cors-configurations=Configurazioni CORS http (Automatic Translation)
http-cors-configurations-help=Impostazioni personalizzate per HTTP CORS, in formato YML (elasticsearch.yml). (Automatic Translation)
http-cors-enabled=Cors http abilitato (Automatic Translation)
http-cors-enabled-help=Se questa opzione è selezionata, la condivisione delle risorse tra origini è abilitata, determinando se un browser su un'altra origine può effettuare richieste a Elasticsearch. Se disabilitato, gli strumenti front-end Web come elasticsearch-head potrebbero non essere in grado di connettersi. (Automatic Translation)
http-enabled=Http Abilitato
http-enabled-help=Questa impostazione è stata deprecata e verrà rimossa in una versione futura. Se questa opzione è selezionata, il livello HTTP è abilitato. Se deselezionato, il livello HTTP è disabilitato nei nodi che non sono destinati a soddisfare direttamente le richieste REST. (Automatic Translation)
index-name-prefix=Prefisso Nome Indice
index-name-prefix-help=Il prefisso per il nome dell'indice di ricerca. Questo valore non deve essere modificato in condizioni normali. Se si modifica questo valore, è necessario anche reindicizzare il portale e quindi eliminare manualmente l'indice precedente utilizzando la console di amministrazione di Elasticsearch.
log-exceptions-only=Solo eccezioni di registro (Automatic Translation)
log-exceptions-only-help=Se questa opzione è selezionata, registra le eccezioni solo da Elasticsearch e non le ricresce. (Automatic Translation)
network-bind-host=Host binding di rete (Automatic Translation)
network-bind-host-help=Le interfaccia di rete a cui un nodo deve associarsi per ascoltare le richieste in arrivo. (Automatic Translation)
network-host=Host di rete (Automatic Translation)
network-host-help=Nome host o indirizzo IP associazione al nodo, utilizzato per pubblicare (annunciare) l'host in altri nodi del cluster. Si tratta di un collegamento che imposta contemporaneamente l'host di binding e l'host di pubblicazione. (Automatic Translation)
network-publish-host=Host di pubblicazione in rete (Automatic Translation)
network-publish-host-help=La singola interfaccia che il nodo annuncia ad altri nodi del cluster, in modo che tali nodi possano connettersi ad essa. (Automatic Translation)
number-of-index-replicas=Numero di repliche degli indici
number-of-index-replicas-help=Il numero di repliche per ogni indice di Liferay. Se non impostato, non vengono utilizzate repliche. Modifiche a questo valore avranno effetto dopo una reindicizzazione completa.
number-of-index-shards=Numero di frammenti di indice (Automatic Translation)
number-of-index-shards-help=Il numero di frammenti da utilizzare quando viene creato un indice di Liferay. Se non impostato, verrà utilizzato un singolo frammento. Modifiche a questo valore avranno effetto dopo una reindicizzazione completa.
operation-mode=Modalità operativa (Automatic Translation)
operation-mode-help=La modalità di funzionamento REMOTE si connette a un cluster Elasticsearch autonomo remoto. La modalità operativa EMBEDDED avvia Portal con un'istanza elasticsearch interna nella stessa JVM. La modalità di funzionamento EMBEDDED non è supportata. (Automatic Translation)
override-type-mappings=Ignora mapping dei tipi (Automatic Translation)
override-type-mappings-help=Eseguire l'override dei mapping per l'intero LiferayDocumentType, in formato JSON (Elasticsearch Put Mapping API). Se si imposta questo valore, la creazione dell'indice ignora la definizione dei mapping predefiniti e gli eventuali punti di estensione, utilizzando invece questa definizione di mapping alternativa. Utilizzare questa opzione se è necessario creare LiferayDocumentType con mapping non standard per i campi predefiniti. Se è necessario aggiungere nuovi mapping personalizzati senza sovrapporre impostazioni predefinite, utilizzare additionalTypeMappings. (Automatic Translation)
retry-on-conflict=Riprova in conflitto (Automatic Translation)
retry-on-conflict-help=Numero di tentativi se si verifica un conflitto di versioni perché il documento è stato aggiornato tra il recupero e l'aggiornamento. (Automatic Translation)
sync-search=Ricerca sincronizzata
sync-search-deprecated-help=Questa impostazione è stata deprecata e verrà rimossa in una versione futura. Non ha alcun impatto funzionale. (Automatic Translation)
transport-addresses=Indirizzi di trasporto (Automatic Translation)
transport-addresses-help=Indirizzi del nodo remoto a cui connettersi. Questo valore è obbligatorio quando la modalità operativa è impostata su REMOTE. (Automatic Translation)
transport-tcp-port=Porta TCP
transport-tcp-port-help=Porta da associare per la comunicazione tra nodi. Accetta un singolo valore o un intervallo (ad esempio, 9300-9400). (Automatic Translation)