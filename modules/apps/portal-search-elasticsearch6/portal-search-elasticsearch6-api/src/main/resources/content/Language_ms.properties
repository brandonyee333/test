additional-configurations=Konfigurasi Tambahan (Automatic Translation)
additional-configurations-help=Tetapan tersuai untuk Elasticsearch terbenam, dalam format YML (elasticsearch.yml). (Automatic Translation)
additional-index-configurations=Konfigurasi Indeks Tambahan (Automatic Translation)
additional-index-configurations-help=Seting tersuai untuk indeks Liferay, dalam format JSON atau YML (Elasticsearch Buat Indeks API). (Automatic Translation)
additional-type-mappings=Pemetaan Jenis Tambahan (Automatic Translation)
additional-type-mappings-help=Pemetaan tersuai untuk LiferayDocumentType, dalam format JSON (Elasticsearch Meletakkan API Pemetaan). Nilai ini harus ditetapkan dengan pemetaan medan baru sahaja. Jika anda menetapkan nilai ini dengan mana-mana pemetaan bertindih untuk medan lalai, penciptaan indeks gagal. Untuk menggantikan pemetaan lalai sepenuhnya, gunakan overrideTypeMappings. (Automatic Translation)
bootstrap-mlockall=Bootstrap Mlockall (Automatic Translation)
bootstrap-mlockall-help=Jika ini diperiksa, ruang alamat proses dikunci ke dalam RAM, menghalang sebarang ingatan Elasticsearch daripada ditukar keluar. (Automatic Translation)
client-transport-ignore-cluster-name=Pengangkutan Pelanggan Abaikan Nama Kluster (Automatic Translation)
client-transport-ignore-cluster-name-help=Jika ini disemak, pengesahan nama kelompok nod bersambung diabaikan. (Automatic Translation)
client-transport-nodes-sampler-interval=Selang Nod Pengangkutan Pelanggan Sampler (Automatic Translation)
client-transport-nodes-sampler-interval-help=Selang (dalam beberapa saat) di mana pelanggan nod nod / pings bersambung nod. Jika tidak diset, Elasticsearch client.transport.nodes_sampler_interval lalai digunakan. (Automatic Translation)
client-transport-ping-timeout=Pelanggan Pengangkutan Ping Timeout (Automatic Translation)
client-transport-ping-timeout-help=Masa (dalam beberapa saat) nod pelanggan menunggu jawapan ping dari nod. Jika tidak diset, Elasticsearch client.transport.ping_timeout lalai digunakan. (Automatic Translation)
client-transport-sniff=Pengangkutan Pelanggan Menghidu (Automatic Translation)
client-transport-sniff-help=Jika ini diperiksa, penghidupan kelompok didayakan untuk menemui nod yang ada secara dinamik dalam kelompok. (Automatic Translation)
cluster-name=Nama Kluster (Automatic Translation)
cluster-name-help=Nama kelompok untuk menyertai. Nama harus sepadan dengan kelompok jauh apabila Mod Operasi ditetapkan kepada jauh. (Automatic Translation)
discovery-zen-ping-unicast-hosts-port=Zen Discovery Unicast Tuan Rumah Pelabuhan (Automatic Translation)
discovery-zen-ping-unicast-hosts-port-help=Pelbagai pelabuhan untuk digunakan semasa membina discovery.zen.ping.unicast.hosts nilai. Pelbagai nod Elasticsearch pada pelbagai port boleh bertindak sebagai penghala gosip pada komputer yang sama. (Automatic Translation)
elasticsearch6-configuration-name=Elasticsearch 6 (Automatic Translation)
http-cors-allow-origin=Http CORS Benarkan Asal (Automatic Translation)
http-cors-allow-origin-help=Asal-usul untuk membenarkan apabila HTTP CORS didayakan. (Automatic Translation)
http-cors-configurations=Konfigurasi HTTP CORS (Automatic Translation)
http-cors-configurations-help=Seting tersuai untuk HTTP CORS, dalam format YML (elasticsearch.yml). (Automatic Translation)
http-cors-enabled=Http CORS Didayakan (Automatic Translation)
http-cors-enabled-help=Jika ini diperiksa, perkongsian sumber silang asal didayakan, yang menentukan sama ada pelayar pada asal lain boleh membuat permintaan kepada Elasticsearch. Jika dinyahdayakan, alatan front-end web seperti kepala anjal mungkin tidak dapat menyambung. (Automatic Translation)
http-enabled=Didayakan Http (Automatic Translation)
http-enabled-help=Seting ini telah diluaskan dan akan dialih keluaran pada masa akan datang. Jika ini disemak, lapisan HTTP didayakan. Jika tidak disemak, lapisan HTTP dinyahdayakan pada nod yang tidak dimaksudkan untuk melayani permintaan REST secara langsung. (Automatic Translation)
index-name-prefix=Awalan Nama Indeks (Automatic Translation)
index-name-prefix-help=Awalan untuk nama indeks carian. Nilai ini tidak boleh diubah dalam keadaan normal. Jika anda menukar nilai ini, anda juga mesti memasang semula portal dan kemudian memadam indeks lama secara manual menggunakan konsol pentadbiran Elasticsearch. (Automatic Translation)
log-exceptions-only=Pengecualian Log Sahaja (Automatic Translation)
log-exceptions-only-help=Jika ini diperiksa, pengecualian balak hanya dari Elasticsearch dan tidak memikirkannya semula. (Automatic Translation)
network-bind-host=Hos Ikatan Rangkaian (Automatic Translation)
network-bind-host-help=Antara muka rangkaian nod harus diikat untuk mendengar permintaan masuk. (Automatic Translation)
network-host=Hos Rangkaian (Automatic Translation)
network-host-help=Nama hos atau alamat IP yang diikat pada nod, yang digunakan untuk menerbitkan (mengiklankan) tuan rumah kepada nod lain dalam kelompok. Ini adalah pintasan yang menetapkan hos terikat dan hos penerbitan pada masa yang sama. (Automatic Translation)
network-publish-host=Hos Terbitan Rangkaian (Automatic Translation)
network-publish-host-help=Antara muka tunggal nod mengiklankan kepada nod lain dalam kelompok, supaya nod tersebut boleh menyambung kepadanya. (Automatic Translation)
number-of-index-replicas=Bilangan Replika Indeks (Automatic Translation)
number-of-index-replicas-help=Bilangan replika bagi setiap indeks Liferay. Jika tidak diset, tiada replika digunakan. Perubahan kepada nilai ini berkesan selepas reindex penuh. (Automatic Translation)
number-of-index-shards=Bilangan Shards Indeks (Automatic Translation)
number-of-index-shards-help=Bilangan jerung untuk digunakan apabila indeks Liferay dicipta. Jika tidak diset, satu jerung akan digunakan. Perubahan kepada nilai ini berkesan selepas reindex penuh. (Automatic Translation)
operation-mode=Mod Operasi (Automatic Translation)
operation-mode-help=Mod operasi JAUH menyambung ke kluster Elasticsearch kendiri jauh. Mod operasi EMBEDDED memulakan Portal dengan contoh Elasticsearch dalaman dalam JVM yang sama. Mod operasi EMBEDDED tidak disokong. (Automatic Translation)
override-type-mappings=Pemetaan Jenis Override (Automatic Translation)
override-type-mappings-help=Mengatasi pemetaan untuk seluruh LiferayDocumentType, dalam format JSON (Elasticsearch Put Mapping API). Jika anda menetapkan nilai ini, penciptaan indeks mengabaikan definisi pemetaan lalai dan sebarang titik sambungan, menggunakan definisi pemetaan alternatif ini. Gunakan ini jika anda memerlukan LiferayDocumentType untuk dicipta dengan pemetaan nonstandard untuk medan lalai. Jika anda hanya perlu menambah pemetaan tersuai baru tanpa bertindih mana-mana lalai, gunakan TambahanTypeMappings. (Automatic Translation)
retry-on-conflict=Cuba semula pada Konflik (Automatic Translation)
retry-on-conflict-help=Bilangan cubaan semula jika konflik versi berlaku kerana dokumen itu dikemas kini antara mendapatkannya dan mengemas kininya. (Automatic Translation)
sync-search=Carian Segerak (Automatic Translation)
sync-search-deprecated-help=Seting ini telah diluaskan dan akan dialih keluaran pada masa akan datang. Ia tidak mempunyai kesan fungsian. (Automatic Translation)
transport-addresses=Alamat Pengangkutan (Automatic Translation)
transport-addresses-help=Alamat nod jauh untuk disambungkan. Nilai ini diperlukan apabila Mod Operasi disetkan ke JAUH. (Automatic Translation)
transport-tcp-port=Pelabuhan TCP Pengangkutan (Automatic Translation)
transport-tcp-port-help=Port untuk mengikat komunikasi antara nod. Menerima nilai tunggal atau julat (contohnya, 9300-9400). (Automatic Translation)