additional-configurations=Cấu hình bổ sung (Automatic Translation)
additional-configurations-help=Cài đặt tùy chỉnh cho Elasticsearch nhúng, ở định dạng YML (elasticsearch.yml). (Automatic Translation)
additional-index-configurations=Cấu hình Chỉ mục Bổ sung (Automatic Translation)
additional-index-configurations-help=Cài đặt tùy chỉnh cho chỉ mục Liferay, ở định dạng JSON hoặc YML (Elasticsearch Create Index API). (Automatic Translation)
additional-type-mappings=Ánh xạ Loại Bổ sung (Automatic Translation)
additional-type-mappings-help=Ánh xạ tùy chỉnh cho LiferayDocumentType, ở định dạng JSON (Elasticsearch Put Mapping API). Giá trị này chỉ nên được đặt với ánh xạ trường mới. Nếu bạn đặt giá trị này với bất kỳ ánh xạ chồng chéo cho các trường mặc định, tạo chỉ mục không thành công. Để thay thế hoàn toàn ánh xạ mặc định, hãy sử dụng overrideTypeMappings. (Automatic Translation)
bootstrap-mlockall=Bootstrap Mlockall (Automatic Translation)
bootstrap-mlockall-help=Nếu điều này được chọn, không gian địa chỉ quy trình sẽ bị khóa thành RAM, ngăn không cho mọi bộ nhớ Elasticsearch bị hoán đổi. (Automatic Translation)
client-transport-ignore-cluster-name=Máy khách truyền tải bỏ qua tên cụm (Automatic Translation)
client-transport-ignore-cluster-name-help=Nếu điều này được kiểm tra, xác nhận tên cụm của các nút được kết nối bị bỏ qua. (Automatic Translation)
client-transport-nodes-sampler-interval=Khoảng thời gian lấy mẫu các nút truyền tải của máy khách (Automatic Translation)
client-transport-nodes-sampler-interval-help=Khoảng thời gian (tính bằng giây) mà tại đó các nút máy khách mẫu/ping các nút được kết nối. Nếu unset, sử dụng elasticsearch client.transport.nodes_sampler_interval định. (Automatic Translation)
client-transport-ping-timeout=Thời gian chờ Ping truyền tải khách hàng (Automatic Translation)
client-transport-ping-timeout-help=Thời gian (tính bằng giây) nút máy khách chờ phản hồi ping từ một nút. Nếu unset, sử dụng elasticsearch client.transport.ping_timeout định. (Automatic Translation)
client-transport-sniff=Khách hàng vận chuyển Sniff (Automatic Translation)
client-transport-sniff-help=Nếu điều này được kiểm tra, đánh hơi cụm được kích hoạt để tự động phát hiện các nút có sẵn trong cụm. (Automatic Translation)
cluster-name=Tên Cụm (Automatic Translation)
cluster-name-help=Tên của cụm để tham gia. Tên phải khớp với cụm từ xa khi chế độ hoạt động được đặt từ xa. (Automatic Translation)
discovery-zen-ping-unicast-hosts-port=Zen Discovery Unicast Lưu trữ Cổng (Automatic Translation)
discovery-zen-ping-unicast-hosts-port-help=Phạm vi cổng để sử dụng khi xây dựng giá trị discovery.zen.ping.unicast.hosts. Nhiều nút Elasticsearch trên một loạt các cổng có thể hoạt động như các bộ định tuyến tin đồn tại cùng một máy tính. (Automatic Translation)
elasticsearch6-configuration-name=Elasticsearch 6 (Automatic Translation)
http-cors-allow-origin=HTTP CORS cho phép nguồn gốc (Automatic Translation)
http-cors-allow-origin-help=Nguồn gốc cho phép khi HTTP CORS được bật. (Automatic Translation)
http-cors-configurations=Cấu hình HTTP CORS (Automatic Translation)
http-cors-configurations-help=Cài đặt tùy chỉnh cho HTTP CORS, ở định dạng YML (elasticsearch.yml). (Automatic Translation)
http-cors-enabled=Đã bật HTTP CORS (Automatic Translation)
http-cors-enabled-help=Nếu điều này được chọn, tính năng chia sẻ tài nguyên có nguồn gốc chéo sẽ được bật, điều này sẽ xác định xem trình duyệt ở nguồn gốc khác có thể thực hiện yêu cầu đến Elasticsearch hay không. Nếu bị vô hiệu hóa, các công cụ giao diện người dùng web như elasticsearch-head có thể không thể kết nối. (Automatic Translation)
http-enabled=Đã bật Http (Automatic Translation)
http-enabled-help=Cài đặt này đã không được dùng nữa và sẽ bị xóa trong bản phát hành trong tương lai. Nếu điều này được chọn, lớp HTTP được bật. Nếu không được chọn, lớp HTTP bị vô hiệu hóa trên các nút không có nghĩa là phục vụ trực tiếp các yêu cầu REST. (Automatic Translation)
index-name-prefix=Tiền tố Tên Chỉ mục (Automatic Translation)
index-name-prefix-help=Tiền tố cho tên chỉ mục tìm kiếm. Giá trị này không nên thay đổi trong điều kiện bình thường. Nếu thay đổi giá trị này, bạn cũng phải lập chỉ mục lại cổng thông tin rồi xóa chỉ mục cũ theo cách thủ công bằng bảng điều khiển quản trị Elasticsearch. (Automatic Translation)
log-exceptions-only=Chỉ ghi nhật ký ngoại lệ (Automatic Translation)
log-exceptions-only-help=Nếu điều này được chọn, chỉ ghi lại các ngoại lệ từ Elasticsearch và không phát triển lại chúng. (Automatic Translation)
network-bind-host=Máy chủ Liên kết Mạng (Automatic Translation)
network-bind-host-help=(Các) giao diện mạng mà một nút nên liên kết để nghe các yêu cầu đến. (Automatic Translation)
network-host=Máy chủ mạng (Automatic Translation)
network-host-help=Tên máy chủ hoặc địa chỉ IP liên kết với nút, được sử dụng để xuất bản (quảng cáo) máy chủ đến các nút khác trong cụm. Đây là một lối tắt đặt máy chủ liên kết và máy chủ xuất bản cùng một lúc. (Automatic Translation)
network-publish-host=Máy chủ Phát hành Mạng (Automatic Translation)
network-publish-host-help=Giao diện duy nhất mà nút quảng cáo cho các nút khác trong cụm, để các nút đó có thể kết nối với nó. (Automatic Translation)
number-of-index-replicas=Số lượng bản sao chỉ mục (Automatic Translation)
number-of-index-replicas-help=Số lượng bản sao cho mỗi chỉ số Liferay. Nếu unset, không có bản sao nào được sử dụng. Các thay đổi đối với giá trị này có hiệu lực sau khi lập chỉ mục lại đầy đủ. (Automatic Translation)
number-of-index-shards=Số lượng phân đoạn chỉ mục (Automatic Translation)
number-of-index-shards-help=Số lượng phân đoạn cần sử dụng khi tạo chỉ mục Liferay. Nếu unset, một phân đoạn duy nhất sẽ được sử dụng. Các thay đổi đối với giá trị này có hiệu lực sau khi lập chỉ mục lại đầy đủ. (Automatic Translation)
operation-mode=Chế độ hoạt động (Automatic Translation)
operation-mode-help=Chế độ hoạt động REMOTE kết nối với cụm Elasticsearch độc lập từ xa. Chế độ hoạt động EMBEDDED khởi động Portal với một phiên bản Elasticsearch bên trong trong cùng một JVM. Chế độ hoạt động EMBEDDED không được hỗ trợ. (Automatic Translation)
override-type-mappings=Ghi đè Ánh xạ Loại (Automatic Translation)
override-type-mappings-help=Ghi đè ánh xạ cho toàn bộ LiferayDocumentType, ở định dạng JSON (ELASTICSEARCH Put Mapping API). Nếu bạn đặt giá trị này, tạo chỉ mục bỏ qua định nghĩa ánh xạ mặc định và bất kỳ điểm mở rộng nào, thay vào đó sử dụng định nghĩa ánh xạ thay thế này. Sử dụng điều này nếu bạn cần LiferayDocumentType được tạo bằng ánh xạ không chuẩn cho các trường mặc định. Nếu bạn chỉ cần thêm ánh xạ tùy chỉnh mới mà không chồng chéo bất kỳ mặc định nào, hãy sử dụng additionalTypeMappings. (Automatic Translation)
retry-on-conflict=Thử lại khi xung đột (Automatic Translation)
retry-on-conflict-help=Số lần thử lại nếu xảy ra xung đột phiên bản vì tài liệu được Cập Nhật giữa việc truy xuất và cập nhật nó. (Automatic Translation)
sync-search=Tìm kiếm Đồng bộ (Automatic Translation)
sync-search-deprecated-help=Cài đặt này đã không được dùng nữa và sẽ bị xóa trong bản phát hành trong tương lai. Nó không có tác động chức năng. (Automatic Translation)
transport-addresses=Địa chỉ Truyền tải (Automatic Translation)
transport-addresses-help=Các địa chỉ nút từ xa để kết nối tới. Giá trị này là bắt buộc khi chế độ hoạt động được đặt thành REMOTE. (Automatic Translation)
transport-tcp-port=Cổng TCP truyền tải (Automatic Translation)
transport-tcp-port-help=Cổng để liên kết để liên lạc giữa các nút. Chấp nhận một giá trị duy nhất hoặc một phạm vi (ví dụ: 9300-9400). (Automatic Translation)