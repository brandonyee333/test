additional-configurations=추가 설정
additional-configurations-help=포함된 Elasticsearch에 대한 YML 형식(elasticsearch.yml)의 사용자 지정 설정.
additional-index-configurations=추가 인덱스 설정
additional-index-configurations-help=JSON 또는 YML 형식의 Liferay 인덱스에 대한 사용자 정의 설정(Elasticsearch Create Index API).
additional-type-mappings=추가 유형 맵핑
additional-type-mappings-help=JSON 형식의 LiferayDocumentType에 대한 사용자 정의 매핑(Elasticsearch Put Mapping API). 이 값은 새 필드 매핑으로만 설정해야 합니다. 기본 필드에 대해 겹치는 매핑으로 이 값을 설정하면 인덱스 생성이 실패합니다. 기본 매핑을 완전히 바꾸려면 overrideTypeMappings를 사용하십시오.
bootstrap-mlockall=부트스트랩 Mlockall (Automatic Translation)
bootstrap-mlockall-help=이 옵션을 선택하면 프로세스 주소 공간이 RAM에 잠겨 있으면 Elasticsearch 메모리가 바뀝니다. (Automatic Translation)
client-transport-ignore-cluster-name=클라이언트 전송 클러스터 이름 무시 (Automatic Translation)
client-transport-ignore-cluster-name-help=이 옵션을 선택하면 연결된 노드의 클러스터 이름 유효성 검사가 무시됩니다. (Automatic Translation)
client-transport-nodes-sampler-interval=클라이언트 전송 노드 샘플러 간격 (Automatic Translation)
client-transport-nodes-sampler-interval-help=클라이언트 노드가 노드를 샘플링/ping으로 연결된 간격(초)입니다. 설정이 해제되면 기본 Elasticsearch client.transport.nodes_sampler_interval 사용됩니다. (Automatic Translation)
client-transport-ping-timeout=클라이언트 전송 핑 시간 아웃 (Automatic Translation)
client-transport-ping-timeout-help=클라이언트 노드가 노드에서 ping 응답을 기다리는 시간(초)입니다. 설정이 해제되면 기본 Elasticsearch client.transport.ping_timeout 사용됩니다. (Automatic Translation)
client-transport-sniff=클라이언트 전송 스니프 (Automatic Translation)
client-transport-sniff-help=이 옵션을 선택하면 클러스터 스니핑이 활성화되어 클러스터에서 사용 가능한 노드를 동적으로 검색할 수 있습니다. (Automatic Translation)
cluster-name=클러스터 이름 (Automatic Translation)
cluster-name-help=조인할 클러스터의 이름입니다. 작업 모드가 리모컨으로 설정된 경우 이름이 원격 클러스터와 일치해야 합니다. (Automatic Translation)
discovery-zen-ping-unicast-hosts-port=젠 디스커버리 유니캐스트 호스트 포트 (Automatic Translation)
discovery-zen-ping-unicast-hosts-port-help=discovery.zen.ping.unicast.hosts 값을 빌드할 때 사용할 포트 범위입니다. 포트 범위의 여러 Elasticsearch 노드는 동일한 컴퓨터에서 가십 라우터 역할을 할 수 있습니다. (Automatic Translation)
elasticsearch6-configuration-name=Elasticsearch 6 (Automatic Translation)
http-cors-allow-origin=HTTP CORS는 기원을 허용 (Automatic Translation)
http-cors-allow-origin-help=HTTP CORS를 사용할 때 사용할 수 있는 원점이 있습니다. (Automatic Translation)
http-cors-configurations=HTTP CORS 구성 (Automatic Translation)
http-cors-configurations-help=HTTP CORS에 대한 사용자 지정 설정, YML 형식 (elasticsearch.yml). (Automatic Translation)
http-cors-enabled=HTTP CORS 사용 (Automatic Translation)
http-cors-enabled-help=이 옵션을 선택하면 원본 간 리소스 공유가 활성화되어 다른 원본의 브라우저가 Elasticsearch에 요청할 수 있는지 여부를 결정합니다. 비활성화된 경우 elasticsearch 헤드와 같은 웹 프런트 엔드 도구는 연결할 수 없습니다. (Automatic Translation)
http-enabled=Http 사용 (Automatic Translation)
http-enabled-help=이 설정은 사용되지 않으며 향후 릴리스에서 제거됩니다. 이 옵션을 선택하면 HTTP 레이어가 활성화됩니다. 선택하지 않으면 REST 요청을 직접 서비스하기 위한 것이 아닌 노드에서 HTTP 계층이 비활성화됩니다. (Automatic Translation)
index-name-prefix=색인 이름 접두사 (Automatic Translation)
index-name-prefix-help=검색 인덱스 이름의 접두사입니다. 이 값은 정상적인 조건에서 변경해서는 안 됩니다. 이 값을 변경하는 경우 포털의 인덱싱을 다시 한 다음 Elasticsearch 관리 콘솔을 사용하여 이전 인덱스를 수동으로 삭제해야 합니다. (Automatic Translation)
log-exceptions-only=로그 예외만 (Automatic Translation)
log-exceptions-only-help=이 옵션을 선택하면 Elasticsearch에서만 예외를 기록하고 다시 던지지 않습니다. (Automatic Translation)
network-bind-host=네트워크 바인딩 호스트 (Automatic Translation)
network-bind-host-help=들어오는 요청을 수신하기 위해 노드가 바인딩해야 합니다. (Automatic Translation)
network-host=네트워크 호스트 (Automatic Translation)
network-host-help=호스트 이름 또는 IP 주소가 노드에 바인딩되어 호스트를 클러스터의 다른 노드에 게시(광고)하는 데 사용됩니다. 바인딩 호스트와 게시 호스트를 동시에 설정하는 바로 가기입니다. (Automatic Translation)
network-publish-host=네트워크 게시 호스트 (Automatic Translation)
network-publish-host-help=노드가 클러스터의 다른 노드에 광고하므로 해당 노드가 연결될 수 있습니다. (Automatic Translation)
number-of-index-replicas=인덱스 복제본 수 (Automatic Translation)
number-of-index-replicas-help=각 Liferay 인덱스의 복제본 수입니다. 설정이 해제된 경우 복제본이 사용되지 않습니다. 이 값의 변경 사항은 전체 다시 인덱싱 후에 적용됩니다. (Automatic Translation)
number-of-index-shards=인덱스 샤드 수 (Automatic Translation)
number-of-index-shards-help=Liferay 인덱스가 생성될 때 사용할 샤드 수입니다. 설정이 해제되면 단일 샤드가 사용됩니다. 이 값의 변경 사항은 전체 다시 인덱싱 후에 적용됩니다. (Automatic Translation)
operation-mode=작동 모드 (Automatic Translation)
operation-mode-help=원격 작동 모드는 원격 독립 실행형 Elasticsearch 클러스터에 연결됩니다. EMBEDDED 작동 모드는 동일한 JVM의 내부 Elasticsearch 인스턴스로 포털을 시작합니다. EMBEDDED 작동 모드는 지원되지 않습니다. (Automatic Translation)
override-type-mappings=형식 매핑 재정의 (Automatic Translation)
override-type-mappings-help=JSON 형식(Elasticsearch Put Mapping API)의 전체 LiferayDocumentType에 대한 재정의를 재정의합니다. 이 값을 설정하면 인덱스 생성은 대신 이 대체 매핑 정의를 사용하여 기본 매핑 정의 및 확장 점을 무시합니다. 기본 필드에 대한 비표준 매핑으로 LiferayDocumentType을 만들어야 하는 경우 이 작업을 사용합니다. 기본값과 겹치지 않고 새 사용자 지정 매핑을 추가해야 하는 경우 추가TypeMappings를 사용합니다. (Automatic Translation)
retry-on-conflict=충돌에 대한 재시도 (Automatic Translation)
retry-on-conflict-help=문서가 검색하고 업데이트하는 사이에 업데이트되었기 때문에 버전 충돌이 발생하는 경우 다시 시도 수입니다. (Automatic Translation)
sync-search=동기화된 검색 (Automatic Translation)
sync-search-deprecated-help=이 설정은 사용되지 않으며 향후 릴리스에서 제거됩니다. 기능적 영향이 없습니다. (Automatic Translation)
transport-addresses=전송 주소 (Automatic Translation)
transport-addresses-help=연결할 원격 노드 주소입니다. 이 값은 운영 모드가 리모컨으로 설정된 경우 필요합니다. (Automatic Translation)
transport-tcp-port=운송 TCP 포트 (Automatic Translation)
transport-tcp-port-help=노드 간의 통신을 위해 바인딩할 포트입니다. 단일 값 또는 범위(예: 9300-9400)를 수락합니다. (Automatic Translation)