client-transport-sniff=ग्राहक परिवहन सूंघ (Automatic Translation)
client-transport-sniff-help=यदि इसकी जांच की जाती है, तो क्लस्टर सूंघने को क्लस्टर में उपलब्ध नोड्स को गतिशील रूप से खोजने में सक्षम बनाया जाता है। (Automatic Translation)
cluster-name=क्लस्टर नाम (Automatic Translation)
cluster-name-help=क्लस्टर में शामिल होने के लिए नाम। जब ऑपरेशन मोड रिमोट पर सेट हो जाता है तो नाम रिमोट क्लस्टर से मेल खाने चाहिए। (Automatic Translation)
