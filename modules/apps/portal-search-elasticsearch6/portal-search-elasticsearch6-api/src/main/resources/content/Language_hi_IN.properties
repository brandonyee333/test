http-cors-enabled=http CORS सक्षम (Automatic Translation)
http-cors-enabled-help=यदि इसकी जांच की जाती है, तो क्रॉस-ओरिजिन रिसोर्स शेयरिंग सक्षम है, जो यह निर्धारित करता है कि किसी अन्य मूल पर ब्राउज़र लोचदार खोज के लिए अनुरोध कर सकता है या नहीं। यदि अक्षम, तो इलास्टिकसर्च-हेड जैसे वेब फ्रंट-एंड टूल कनेक्ट करने में असमर्थ हो सकते हैं। (Automatic Translation)
http-enabled=http सक्षम (Automatic Translation)
http-enabled-help=इस सेटिंग को बहिष्कृत किया गया था और भविष्य में रिलीज में हटा दिया जाएगा। यदि इसकी जांच की जाती है, तो HTTP परत सक्षम है। यदि अनियंत्रित, HTTP परत नोड्स पर अक्षम है जो सीधे आरईएस अनुरोधों की सेवा करने के लिए नहीं हैं। (Automatic Translation)
index-name-prefix=इंडेक्स नाम उपसर्ग (Automatic Translation)
index-name-prefix-help=खोज सूचकांक नाम के लिए उपसर्ग। इस मान को सामान्य परिस्थितियों में नहीं बदला जाना चाहिए। यदि आप इस मूल्य को बदलते हैं, तो आपको पोर्टल को भी फिर से रींडेक्स करना होगा और फिर इलास्टिकसर्च एडमिनिस्ट्रेशन कंसोल का उपयोग करके पुराने इंडेक्स को मैन्युअल रूप से हटाना होगा। (Automatic Translation)
log-exceptions-only=केवल अपवाद लॉग इन करें (Automatic Translation)
log-exceptions-only-help=यदि इसकी जांच की जाती है, तो केवल लोचदार खोज से अपवाद लॉग करें और उन्हें फिर से फेंक नहीं देते हैं। (Automatic Translation)
network-bind-host=नेटवर्क बिंद होस्ट (Automatic Translation)
network-bind-host-help=नेटवर्क इंटरफेस (एस) आने वाले अनुरोधों के लिए सुनने के लिए एक नोड को बांधना चाहिए। (Automatic Translation)
network-host=नेटवर्क होस्ट (Automatic Translation)
network-host-help=मेजबान नाम या आईपी पता नोड से बांधा जाता है, जिसका उपयोग मेजबान को क्लस्टर में अन्य नोड्स में प्रकाशित (विज्ञापित) करने के लिए किया जाता है। यह एक शॉर्टकट है जो एक ही समय में बाइंड होस्ट और पब्लिश होस्ट को सेट करता है। (Automatic Translation)
network-publish-host=नेटवर्क पब्लिश होस्ट (Automatic Translation)
network-publish-host-help=सिंगल इंटरफेस नोड क्लस्टर में अन्य नोड्स में विज्ञापन देता है, ताकि वे नोड्स इससे जुड़ सकें। (Automatic Translation)
number-of-index-replicas=इंडेक्स प्रतिकृतियों की संख्या (Automatic Translation)
number-of-index-replicas-help=प्रत्येक लाइफरे इंडेक्स के लिए प्रतिकृतियों की संख्या। यदि असेट, कोई प्रतिकृतियां उपयोग की जाती हैं। इस मान में परिवर्तन पूर्ण पुनर्डेक्स के बाद प्रभावी होते हैं। (Automatic Translation)
number-of-index-shards=इंडेक्स शार्ड्स की संख्या (Automatic Translation)
number-of-index-shards-help=जब लाइफरे इंडेक्स बनाया जाता है तो उपयोग करने के लिए शार्ड्स की संख्या। अगर अपसेट है तो एक ही ठीकरा फोड़ा जाएगा। इस मान में परिवर्तन पूर्ण पुनर्डेक्स के बाद प्रभावी होते हैं। (Automatic Translation)
operation-mode=ऑपरेशन मोड (Automatic Translation)
operation-mode-help=रिमोट ऑपरेशन मोड एक रिमोट स्टैंडअलोन इलास्टिकसर्च क्लस्टर से जुड़ता है। एम्बेडेड ऑपरेशन मोड एक ही जेवीएम में एक आंतरिक लोचदार उदाहरण के साथ पोर्टल शुरू होता है। एम्बेडेड ऑपरेशन मोड असमर्थित है। (Automatic Translation)
override-type-mappings=ओवरराइड टाइप मैपिंग (Automatic Translation)
override-type-mappings-help=जेएसओएन प्रारूप (इलास्टिकसर्च पुट मैपिंग एपीआई) में पूरे लाइफरेडॉक्यूमेंटटाइप के लिए ओवरराइड मैपिंग। यदि आप इस मूल्य को सेट करते हैं, तो इंडेक्स क्रिएशन इसके बजाय इस वैकल्पिक मैपिंग परिभाषा का उपयोग करके डिफ़ॉल्ट मैपिंग परिभाषा और किसी भी एक्सटेंशन पॉइंट को अनदेखा करता है। यदि आपको डिफ़ॉल्ट फ़ील्ड के लिए अमानक मैपिंग के साथ बनाया जाना है तो इसका उपयोग करें। यदि आपको किसी भी चूक को ओवरलैप किए बिना नए कस्टम मैपिंग जोड़ने की आवश्यकता है, तो अतिरिक्त टाइपमैपिंग का उपयोग करें। (Automatic Translation)
retry-on-conflict=संघर्ष पर फिर से प्रयास (Automatic Translation)
retry-on-conflict-help=यदि कोई संस्करण संघर्ष होता है तो रेट्री की संख्या क्योंकि दस्तावेज़ को इसे पुनः प्राप्त करने और उसे अपडेट करने के बीच अपडेट किया गया था। (Automatic Translation)
sync-search=सिंक्रोनाइज्ड सर्च (Automatic Translation)
sync-search-deprecated-help=इस सेटिंग को बहिष्कृत किया गया था और भविष्य में रिलीज में हटा दिया जाएगा। इसका कोई कार्यात्मक प्रभाव नहीं पड़ता है। (Automatic Translation)
transport-addresses=परिवहन पते (Automatic Translation)
transport-addresses-help=रिमोट नोड से कनेक्ट करने के लिए पते। जब ऑपरेशन मोड रिमोट पर सेट होता है तो इस मूल्य की आवश्यकता होती है। (Automatic Translation)
transport-tcp-port=परिवहन टीसीपी पोर्ट (Automatic Translation)
transport-tcp-port-help=नोड्स के बीच संचार के लिए बांधने के लिए बंदरगाह। एक ही मूल्य या एक सीमा (जैसे, 9300-9400) स्वीकार करता है। (Automatic Translation)