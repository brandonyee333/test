discovery-zen-ping-unicast-hosts-port-help=खोज.zen.ping.unicast.2015 मूल्य का निर्माण करते समय उपयोग करने के लिए बंदरगाहों की सीमा। बंदरगाहों की एक श्रृंखला पर कई लोचदार खोज नोड्स एक ही कंप्यूटर पर गपशप राउटर के रूप में कार्य कर सकते हैं। (Automatic Translation)
