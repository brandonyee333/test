client-transport-ignore-cluster-name-help=यदि इसकी जांच की जाती है, तो कनेक्टेड नोड्स के क्लस्टर नाम सत्यापन को अनदेखा कर दिया जाता है। (Automatic Translation)
client-transport-nodes-sampler-interval=क्लाइंट ट्रांसपोर्ट नोड्स पारखी अंतराल (Automatic Translation)
