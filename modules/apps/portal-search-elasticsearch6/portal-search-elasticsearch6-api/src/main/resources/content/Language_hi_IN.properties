additional-type-mappings=अतिरिक्त प्रकार मानचित्रण (Automatic Translation)
additional-type-mappings-help=जेएसओएन प्रारूप में लाइफरेडोक्यूमेंटटाइप के लिए कस्टम मैपिंग (इलास्टिकसर्च पुट मैपिंग एपीआई)। यह मान केवल नए फील्ड मैपिंग के साथ सेट किया जाना चाहिए। यदि आप डिफ़ॉल्ट फ़ील्ड के लिए किसी भी ओवरलैपिंग मैपिंग के साथ इस मूल्य को सेट करते हैं, तो इंडेक्स क्रिएशन विफल हो जाता है। डिफ़ॉल्ट मैपिंग को पूरी तरह से बदलने के लिए, ओवरराइडटाइपमैपिंग का उपयोग करें। (Automatic Translation)
bootstrap-mlockall=बूटस्ट्रैप मलॉकऑल (Automatic Translation)
bootstrap-mlockall-help=यदि यह जांच की जाती है, तो प्रक्रिया पता स्थान रैम में बंद हो जाता है, जिससे किसी भी लोचदार खोज स्मृति को स्वैप होने से रोका जा सकता है। (Automatic Translation)
