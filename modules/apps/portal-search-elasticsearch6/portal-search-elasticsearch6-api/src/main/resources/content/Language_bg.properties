additional-configurations=Допълнителни конфигурации (Automatic Translation)
additional-configurations-help=Потребителски настройки за вграден Elasticsearch, във формат YML (elasticsearch.yml). (Automatic Translation)
additional-index-configurations=Допълнителни конфигурации на индекса (Automatic Translation)
additional-index-configurations-help=Потребителски настройки за индекса Liferay, във формат JSON или YML (Elasticsearch Създаване индекс API). (Automatic Translation)
additional-type-mappings=Съпоставяния на допълнителен тип (Automatic Translation)
additional-type-mappings-help=Персонализирани картографи за LiferayDocumentType, във формат JSON (Elasticsearch Пут Картографски API). Тази стойност трябва да бъде зададена само с нови съпоставяния на полета. Ако зададете тази стойност с припокриващи се съпоставяния за полета по подразбиране, създаването на индекса е неуспешно. За да заместите изцяло съпоставянията по подразбиране, използвайте "заменитипа на тип". (Automatic Translation)
bootstrap-mlockall=Театрал Моккал (Automatic Translation)
bootstrap-mlockall-help=Ако това е отметнато, адресното пространство на процеса е заключено в RAM, като се предотвратява размяната на паметта на еластичния адрес. (Automatic Translation)
client-transport-ignore-cluster-name=Клиент транспорт игнориране на името на клъстера (Automatic Translation)
client-transport-ignore-cluster-name-help=Ако е включена проверката на името на клъстера на свързани възли се игнорира. (Automatic Translation)
client-transport-nodes-sampler-interval=Пробоотборник на възли за транспорт на клиент (Automatic Translation)
client-transport-nodes-sampler-interval-help=Интервалът (в секунди), в който клиентски възел извадки/pings свързани възли. Ако е изключен, се използва client.transport.nodes_sampler_interval по подразбиране. (Automatic Translation)
client-transport-ping-timeout=Време на изчакване за транспортиране на клиент (Automatic Translation)
client-transport-ping-timeout-help=Времето (в секунди) клиентски възел чака пинг отговор от възел. Ако е изключен, се използва client.transport.ping_timeout по подразбиране. (Automatic Translation)
client-transport-sniff=Клиентски транспорт сниф (Automatic Translation)
client-transport-sniff-help=Ако това е включена, клъстер смъркане е разрешено динамично откриване на наличните възли в клъстера. (Automatic Translation)
cluster-name=Име на клъстер (Automatic Translation)
cluster-name-help=Името на клъстера да се присъедини. Името трябва да съответства на отдалечен клъстер, когато режим на работа е отдалечен. (Automatic Translation)
discovery-zen-ping-unicast-hosts-port=Едноадресни хостове пристанище Zen Discovery (Automatic Translation)
discovery-zen-ping-unicast-hosts-port-help=Диапазон на портове, които да използвате при изграждането на стойност discovery.zen.ping.unicast.hosts. Множество възли Elasticsearch на редица портове могат да действат като клюки рутери на един и същ компютър. (Automatic Translation)
elasticsearch6-configuration-name=Еластична тесенце 6 (Automatic Translation)
http-cors-allow-origin=Http CORS разреши произход (Automatic Translation)
http-cors-allow-origin-help=Произход да разрешите, когато е разрешена HTTP CORS. (Automatic Translation)
http-cors-configurations=Http CORS конфигурации (Automatic Translation)
http-cors-configurations-help=Потребителски настройки за HTTP CORS, във формат YML (elasticsearch.yml). (Automatic Translation)
http-cors-enabled=Http CORS поддръжка (Automatic Translation)
http-cors-enabled-help=Ако това е отметнато, споделянето на ресурси от различни произход е разрешено, което определя дали браузър с друг произход може да направи заявки към Еластично търсене. Ако е забранено, уеб инструменти като еластични главата на търсене може да не може да се свърже. (Automatic Translation)
http-enabled=Http поддръжка (Automatic Translation)
http-enabled-help=Тази настройка е отхвърлена и ще бъде премахната в бъдеща версия. Ако е включена тази отметка, HTTP слой е активиран. Ако не е отметнато, HTTP слой е забранен на възли, които не са предназначени да обслужват заявките за почивка директно. (Automatic Translation)
index-name-prefix=Префикс на име на индекс (Automatic Translation)
index-name-prefix-help=Префиксът за името на индекса за търсене. Тази стойност не трябва да се променя при нормални условия. Ако промените тази стойност, трябва също да преиндексирате портала и след това ръчно да изтриете стария индекс с помощта на конзолата за управление на Elasticsearch. (Automatic Translation)
log-exceptions-only=Регистрационни само изключения (Automatic Translation)
log-exceptions-only-help=Ако това е отметнато, регистрира изключения само от Elasticsearch и не ги rethrow. (Automatic Translation)
network-bind-host=Мрежово обвързване на хост (Automatic Translation)
network-bind-host-help=Мрежовият интерфейс(и) възел трябва да се обвърже с, за да слушате входящи заявки. (Automatic Translation)
network-host=Мрежов хост (Automatic Translation)
network-host-help=Името на хоста или IP адресът се свързват с възела, който се използва за публикуване (реклама) на хоста към други възли в клъстера. Това е пряк път, който задава името хост и публикуване хост в същото време. (Automatic Translation)
network-publish-host=Хост за публикуване на мрежа (Automatic Translation)
network-publish-host-help=Единният интерфейс възелът рекламира към други възли в клъстера, така че тези възли могат да се свързват с него. (Automatic Translation)
number-of-index-replicas=Брой на индексни реплики (Automatic Translation)
number-of-index-replicas-help=Броят на копията за всеки индекс liferay. Ако е изключен, не се използват реплики. Промените в тази стойност влиза в сила след пълно преиндексиране. (Automatic Translation)
number-of-index-shards=Брой на парчетата индекс (Automatic Translation)
number-of-index-shards-help=Брой парчета, които да се използват при създаване на индекс на Liferay. Ако е изключена, ще се използва единичен парче. Промените в тази стойност влиза в сила след пълно преиндексиране. (Automatic Translation)
operation-mode=Режим на работа (Automatic Translation)
operation-mode-help=Режимът на работа REMOTE се свързва към отдалечена самостоятелна elasticsearch клъстер. Режимът на работа EMBEDDED стартира портал с вътрешен еластично търсене екземпляр в същия JVM. Режимът на работа EMBEDDED не се поддържа. (Automatic Translation)
override-type-mappings=Заместване на съпоставяне на типове (Automatic Translation)
override-type-mappings-help=Отменяне на картографирането за целия LiferaraDocumentType, във формат JSON (Еластично търсене Пут-картографски API). Ако зададете тази стойност, създаването на индекс игнорира дефиницията на съпоставянията по подразбиране и всички точки на разширение, вместо това използва тази дефиниция за алтернативни съпоставяния. Използвайте това, ако имате нужда от LiferayDocumentType, за да бъде създаден с нестандартни съпоставяния за полета по подразбиране. Ако просто трябва да добавите нови персонализирани съпоставяния без припокриване на всички настройки по подразбиране, използвайте additionalTypeMappings. (Automatic Translation)
retry-on-conflict=Опитай отново конфликт (Automatic Translation)
retry-on-conflict-help=Броят на опитите, ако възникне конфликт на версия, защото документът е актуализиран между извличането му и актуализирането му. (Automatic Translation)
sync-search=Синхронизирано търсене (Automatic Translation)
sync-search-deprecated-help=Тази настройка е отхвърлена и ще бъде премахната в бъдеща версия. Няма функционално въздействие. (Automatic Translation)
transport-addresses=Транспортни адреси (Automatic Translation)
transport-addresses-help=Отдалеченият възел адреси за свързване. Тази стойност е задължителна, когато режим на работа е зададен на ОТДАЛЕЧЕН. (Automatic Translation)
transport-tcp-port=Порт за транспорт на TCP (Automatic Translation)
transport-tcp-port-help=Портът, който да се свързва за комуникация между възли. Приема една стойност или диапазон (напр. 9300-9400). (Automatic Translation)