additional-type-mappings-help=Vlastné priradenia pre LiferayDocumentType vo formáte JSON (Elasticsearch Dať mapovanie API). Táto hodnota by mala byť nastavená len s novými priradeniami polí. Ak nastavíte túto hodnotu s akékoľvek prekrývajúce sa priradenia pre predvolené polia, vytvorenie indexu zlyhá. Ak chcete úplne nahradiť predvolené priradenia, použite funkciu overrideTypeMappings. (Automatic Translation)
bootstrap-mlockall=Bootstrap Mlockall (Automatic Translation)
bootstrap-mlockall-help=Ak je táto voľba zapnutá, priestor adries procesu sa uzamkne do pamäte RAM, čo zabráni výmene pamäte Elasticsearch. (Automatic Translation)
client-transport-ignore-cluster-name=Klient dopravy ignorovať názov klastra (Automatic Translation)
client-transport-ignore-cluster-name-help=Ak je táto voľba zapnutá, overenie názvu klastra pripojených uzlov sa ignoruje. (Automatic Translation)
client-transport-nodes-sampler-interval=Interval vzorkovača uzlov prepravy klienta (Automatic Translation)
client-transport-nodes-sampler-interval-help=Interval (v sekundách), pri ktorom klientsky uzol vzorky/ping pripojené uzly. Ak sa toto nastavenie nezníči, použije sa predvolená client.transport.nodes_sampler_interval Elasticsearch. (Automatic Translation)
client-transport-ping-timeout=Časový limit pre dopravu klienta Ping (Automatic Translation)
client-transport-ping-timeout-help=Čas (v sekundách) klientsky uzol čaká na ping odpoveď z uzla. Ak sa toto nastavenie nezníči, použije sa predvolená client.transport.ping_timeout elastického noža. (Automatic Translation)
client-transport-sniff=Čuch na prepravu klienta (Automatic Translation)
client-transport-sniff-help=Ak je táto voľba zapnutá, klastra sniffing je povolené dynamicky objavovať dostupné uzly v klastri. (Automatic Translation)
cluster-name=Názov klastra (Automatic Translation)
cluster-name-help=Názov klastra, ku ktorý sa chcete pripojiť. Názov by sa mal zhodovať so vzdialeným klastrom, keď je prevádzkový režim nastavený na vzdialený. (Automatic Translation)
discovery-zen-ping-unicast-hosts-port=Zen Discovery Unicast Hostitelia Port (Automatic Translation)
discovery-zen-ping-unicast-hosts-port-help=Rozsah portov, ktoré sa majú použiť pri budovaní hodnoty discovery.zen.ping.unicast.hosts. Viaceré elastickésearch uzly na rade portov môže pôsobiť ako klebety smerovače na rovnakom počítači. (Automatic Translation)
elasticsearch6-configuration-name=Elastický zásearch 6 (Automatic Translation)
http-cors-allow-origin=Http CORS Povoliť pôvod (Automatic Translation)
http-cors-allow-origin-help=Počiatky, ktoré sa majú povoliť, keď je zapnutá protokol HTTP CORS. (Automatic Translation)
http-cors-configurations=Konfigurácie http CORS (Automatic Translation)
http-cors-configurations-help=Vlastné nastavenia pre HTTP CORS, vo formáte YML (elasticsearch.yml). (Automatic Translation)
http-cors-enabled=Http CORS povolené (Automatic Translation)
http-cors-enabled-help=Ak je táto voľba zapnutá, je povolené zdieľanie prostriedkov medzi pôvodmi, ktoré určuje, či prehliadač iného pôvodu môže k žiadostiam o elastickésearch. Ak je táto možnosť vypnutá, webové klientne nástroje, ako napríklad elastická hlava, sa nemusia pripojiť. (Automatic Translation)
http-enabled=Http povolené (Automatic Translation)
http-enabled-help=Toto nastavenie bolo zastarané a bude odstránené v budúcom vydaní. Ak je táto voľba zapnutá, vrstva HTTP je zapnutá. Ak táto možnosť nie je zanechaná, vrstva HTTP je vypnutá na uzloch, ktoré nie sú určené na priame služby požiadaviek REST. (Automatic Translation)
index-name-prefix=Predpona názvu indexu (Automatic Translation)
index-name-prefix-help=Predpona názvu indexu vyhľadávania. Táto hodnota by sa za normálnych podmienok nemala meniť. Ak zmeníte túto hodnotu, musíte tiež preindexovať portál a potom manuálne odstrániť starý index pomocou konzoly správy Elasticsearch. (Automatic Translation)
log-exceptions-only=Iba výnimky denníka (Automatic Translation)
log-exceptions-only-help=Ak je táto voľba zapnutá, za denníky výnimky iba z Elasticsearch a nie je rethrow je. (Automatic Translation)
network-bind-host=Hostiteľ sieťovej väzby (Automatic Translation)
network-bind-host-help=Sieťové rozhrania, na ktoré by sa mal naviazať uzol, aby bolo možné počúvať prichádzajúce požiadavky. (Automatic Translation)
network-host=Hostiteľ siete (Automatic Translation)
network-host-help=Názov hostiteľa alebo adresa IP naviazaná na uzol, ktorý sa používa na publikovanie (inzerovanie) hostiteľa na iné uzly v klastri. Toto je skratka, ktorá nastavuje hostiteľa väzby a hostiteľa publikovania súčasne. (Automatic Translation)
network-publish-host=Hostiteľ publikovania v sieti (Automatic Translation)
network-publish-host-help=Jedno rozhranie uzol inzeruje na iné uzly v klastri, takže tieto uzly sa k tomu môžu pripojiť. (Automatic Translation)
number-of-index-replicas=Počet replik indexových replík (Automatic Translation)
number-of-index-replicas-help=Počet replík pre každý index Liferay. Ak sa tento problém rozbalí, nepoužívajú sa žiadne repliky. Zmeny tejto hodnoty sa prejavia po úplnom preindexe. (Automatic Translation)
number-of-index-shards=Počet indexových črepov (Automatic Translation)
number-of-index-shards-help=Počet črepov, ktoré sa majú použiť pri vytvorení indexu Liferay. Ak sa odstaví, použije sa jeden črep. Zmeny tejto hodnoty sa prejavia po úplnom preindexe. (Automatic Translation)
operation-mode=Prevádzkový režim (Automatic Translation)
operation-mode-help=Režim vzdialenej prevádzky sa pripája k vzdialenému samostatnému klastru Elasticsearch. Vstavaný prevádzkový režim spustí portál s internou inštanciou Elasticsearch v rovnakom JVM. Prevádzkový režim EMBEDDED nie je podporovaný. (Automatic Translation)
override-type-mappings=Prepísať priradenia typov (Automatic Translation)
override-type-mappings-help=Prepísať priradenia pre celý LiferayDocumentType vo formáte JSON (Elasticsearch Dať mapovanie API). Ak nastavíte túto hodnotu, vytvorenie indexu ignoruje predvolenú definíciu priradenia a všetky body rozšírenia, namiesto toho použite túto alternatívnu definíciu priradenia. Túto možnosť použite, ak potrebujete, aby bol liferayDocumentType vytvorený s neštandardné priradenia pre predvolené polia. Ak potrebujete pridať nové vlastné priradenia bez prekrývania predvolených nastavení, použite ďalšietypeMappings. (Automatic Translation)
retry-on-conflict=Zopakovať pokus o konflikt (Automatic Translation)
retry-on-conflict-help=Počet pokusov, ak dôjde ku konfliktu verzií, pretože dokument bol aktualizovaný medzi jeho načítanie a aktualizáciu. (Automatic Translation)
sync-search=Synchronizované vyhľadávanie (Automatic Translation)
sync-search-deprecated-help=Toto nastavenie bolo zastarané a bude odstránené v budúcom vydaní. Nemá žiadny funkčný vplyv. (Automatic Translation)
transport-addresses=Prepravné adresy (Automatic Translation)
transport-addresses-help=Vzdialené adresy uzlov, ku ktoré sa chcete pripojiť. Táto hodnota sa vyžaduje, keď je prevádzkový režim nastavený na hodnotu REMOTE. (Automatic Translation)
transport-tcp-port=Prenos portu TCP (Automatic Translation)
transport-tcp-port-help=Port, ktorý sa má viazať na komunikáciu medzi uzlami. Akceptuje jednu hodnotu alebo rozsah (napr. 9300-9400). (Automatic Translation)