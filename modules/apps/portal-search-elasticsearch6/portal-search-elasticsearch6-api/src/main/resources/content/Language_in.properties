additional-configurations=Konfigurasi Tambahan (Automatic Translation)
additional-configurations-help=Pengaturan kustom untuk Elasticsearch tertanam, dalam format YML (elasticsearch.yml). (Automatic Translation)
additional-index-configurations=Konfigurasi Indeks Tambahan (Automatic Translation)
additional-index-configurations-help=Pengaturan kustom untuk indeks Liferay, dalam format JSON atau YML (Elasticsearch Create Index API). (Automatic Translation)
additional-type-mappings=Pemetaan Tipe Tambahan (Automatic Translation)
additional-type-mappings-help=Pemetaan kustom untuk LiferayDocumentType, dalam format JSON (Elasticsearch Put Mapping API). Nilai ini harus ditetapkan dengan pemetaan bidang baru saja. Jika Anda menetapkan nilai ini dengan pemetaan yang tumpang tindih untuk bidang default, pembuatan indeks gagal. Untuk mengganti pemetaan default sepenuhnya, gunakan overrideTypeMappings. (Automatic Translation)
bootstrap-mlockall=Bootstrap Mlockall (Automatic Translation)
bootstrap-mlockall-help=Jika ini diperiksa, ruang alamat proses dikunci ke dalam RAM, mencegah memori Elasticsearch ditukar. (Automatic Translation)
client-transport-ignore-cluster-name=Klien Abaikan Nama Kluster (Automatic Translation)
client-transport-ignore-cluster-name-help=Jika ini diperiksa, validasi nama kluster dari node yang terhubung diabaikan. (Automatic Translation)
client-transport-nodes-sampler-interval=Interval Sampler Node Transang Klien (Automatic Translation)
client-transport-nodes-sampler-interval-help=Interval (dalam detik) di mana sampel node klien / pings node terhubung. Jika tidak diset, default Elasticsearch client.transport.nodes_sampler_interval digunakan. (Automatic Translation)
client-transport-ping-timeout=Batas Waktu Ping Transportasi Klien (Automatic Translation)
client-transport-ping-timeout-help=Waktu (dalam detik) node klien menunggu respons ping dari node. Jika tidak diset, default Elasticsearch client.transport.ping_timeout digunakan. (Automatic Translation)
client-transport-sniff=Klien Transportasi Mengendus (Automatic Translation)
client-transport-sniff-help=Jika ini diperiksa, sniffing kluster diaktifkan untuk secara dinamis menemukan node yang tersedia di klaster. (Automatic Translation)
cluster-name=Nama Kluster (Automatic Translation)
cluster-name-help=Nama kluster untuk bergabung. Nama harus cocok dengan klaster jarak jauh ketika Mode Operasi disetel ke jarak jauh. (Automatic Translation)
discovery-zen-ping-unicast-hosts-port=Zen Discovery Unicast Host Port (Automatic Translation)
discovery-zen-ping-unicast-hosts-port-help=Rentang porta yang digunakan saat membangun nilai discovery.zen.ping.unicast.hosts. Beberapa node Elasticsearch pada berbagai port dapat bertindak sebagai router gosip di komputer yang sama. (Automatic Translation)
elasticsearch6-configuration-name=Elasticsearch 6 (Automatic Translation)
http-cors-allow-origin=Http CORS Izinkan Asal (Automatic Translation)
http-cors-allow-origin-help=Asal untuk memungkinkan ketika HTTP CORS diaktifkan. (Automatic Translation)
http-cors-configurations=Konfigurasi HTTP CORS (Automatic Translation)
http-cors-configurations-help=Pengaturan kustom untuk HTTP CORS, dalam format YML (elasticsearch.yml). (Automatic Translation)
http-cors-enabled=Http CORS Diaktifkan (Automatic Translation)
http-cors-enabled-help=Jika ini diperiksa, berbagi sumber daya lintas asal diaktifkan, yang menentukan apakah browser di asal lain dapat membuat permintaan ke Elasticsearch. Jika dinonaktifkan, alat front-end web seperti elasticsearch-head mungkin tidak dapat terhubung. (Automatic Translation)
http-enabled=Http Difungsikan (Automatic Translation)
http-enabled-help=Setelan ini telah ditolak dan akan dihapus dalam rilis mendatang. Jika ini diperiksa, lapisan HTTP diaktifkan. Jika tidak dicentang, lapisan HTTP dinonaktifkan pada node yang tidak dimaksudkan untuk melayani permintaan REST secara langsung. (Automatic Translation)
index-name-prefix=Awalan Nama Indeks (Automatic Translation)
index-name-prefix-help=Awalan untuk nama indeks pencarian. Nilai ini tidak boleh diubah dalam kondisi normal. Jika Anda mengubah nilai ini, Anda juga harus mengaktifkan kembali portal lalu menghapus indeks lama secara manual menggunakan konsol administrasi Elasticsearch. (Automatic Translation)
log-exceptions-only=Hanya Perepsian Log (Automatic Translation)
log-exceptions-only-help=Jika ini diperiksa, perjekalikan log hanya dari Elasticsearch dan tidak muncul kembali. (Automatic Translation)
network-bind-host=Host Ikatan Jaringan (Automatic Translation)
network-bind-host-help=Antarmuka jaringan yang harus mengikat node untuk mendengarkan permintaan masuk. (Automatic Translation)
network-host=Host Jaringan (Automatic Translation)
network-host-help=Nama host atau alamat IP mengikat node, yang digunakan untuk mempublikasikan (mengiklankan) host ke node lain di klaster. Ini adalah pintasan yang mengatur host bind dan host publikasi pada saat yang sama. (Automatic Translation)
network-publish-host=Host Publikasi Jaringan (Automatic Translation)
network-publish-host-help=Antarmuka tunggal node beriklan ke node lain di klaster, sehingga node tersebut dapat terhubung ke sana. (Automatic Translation)
number-of-index-replicas=Jumlah Replika Indeks (Automatic Translation)
number-of-index-replicas-help=Jumlah replika untuk setiap indeks Liferay. Jika tidak diset, tidak ada replika yang digunakan. Perubahan pada nilai ini berlaku setelah reindex penuh. (Automatic Translation)
number-of-index-shards=Jumlah Pecahan Indeks (Automatic Translation)
number-of-index-shards-help=Jumlah pecahan yang digunakan saat indeks Liferay dibuat. Jika tidak diset, satu shard akan digunakan. Perubahan pada nilai ini berlaku setelah reindex penuh. (Automatic Translation)
operation-mode=Mode Operasi (Automatic Translation)
operation-mode-help=Mode operasi REMOTE tersambung ke kluster Elasticsearch mandiri jarak jauh. Mode operasi EMBEDDED memulai Portal dengan instance Elasticsearch internal di JVM yang sama. Mode operasi EMBEDDED tidak didukung. (Automatic Translation)
override-type-mappings=Mengesampingkan Pemetaan Tipe (Automatic Translation)
override-type-mappings-help=Mengesampingkan pemetaan untuk seluruh LiferayDocumentType, dalam format JSON (Elasticsearch Put Mapping API). Jika Anda menetapkan nilai ini, pembuatan indeks mengabaikan definisi pemetaan default dan titik ekstensi apa pun, menggunakan definisi pemetaan alternatif ini sebagai gantinya. Gunakan ini jika Anda memerlukan LiferayDocumentType untuk dibuat dengan pemetaan nonstandar untuk bidang default. Jika Anda hanya perlu menambahkan pemetaan kustom baru tanpa tumpang tindih default apa pun, gunakan AdditionalTypeMappings. (Automatic Translation)
retry-on-conflict=Coba lagi tentang Konflik (Automatic Translation)
retry-on-conflict-help=Jumlah pengambilan jika terjadi konflik versi karena dokumen diperbarui antara mengambilnya dan memperbaruinya. (Automatic Translation)
sync-search=Pencarian yang Disinkronkan (Automatic Translation)
sync-search-deprecated-help=Setelan ini telah ditolak dan akan dihapus dalam rilis mendatang. Ini tidak memiliki dampak fungsional. (Automatic Translation)
transport-addresses=Alamat Transportasi (Automatic Translation)
transport-addresses-help=Alamat node jarak jauh yang akan disambungkan. Nilai ini diperlukan ketika Mode Operasi diatur ke REMOTE. (Automatic Translation)
transport-tcp-port=Port TCP Transang (Automatic Translation)
transport-tcp-port-help=Porta yang mengikat komunikasi antar node. Menerima nilai tunggal atau rentang (misalnya, 9300-9400). (Automatic Translation)