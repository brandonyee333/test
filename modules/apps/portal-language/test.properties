	modified.files.includes[relevant][portal-language-rule]=**

	relevant.rule.names=\
		portal-language-rule

	test.batch.names[relevant][portal-language-rule]=\
		functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-language-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-language-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Language Override") OR \
            (testray.main.component.name ~ "Language Override")\
        )

