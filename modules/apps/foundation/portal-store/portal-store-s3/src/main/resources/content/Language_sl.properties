s3-region=Regija S3 (Automatic Translation)
s3-region-help=Nastavite amazonsko regijo S3, ki predstavlja geografsko regijo, kjer Amazon S3 shranjuje uporabniško ustvarjena vedra. Amazon S3 Regije se uporabljajo za optimizacijo latenca, zmanjšanje stroškov in obravnavanje regulativnih zahtev. Predmeti, shranjeni v amazonski regiji S3, nikoli ne zapustijo te regije, razen če so izrecno preneseni v drugo regijo. (Automatic Translation)
s3-storage-class=S3 shranjevanje razred (Automatic Translation)
s3-storage-class-help=Nastavite razred za shranjevanje Amazon S3. Standardni razred shranjevanja se privzeto uporablja in pomeni, da bodo odvečne kopije podatkov shranjene na različnih lokacijah. Razred REDUCED_REDUNDANCY za shranjevanje je namenjen shranjevanju nekriti nih, pomnilljivih podatkov, ki ponujajo nizkocenovno, visoko razpoložljivo možnost shranjevanja; vendar je ta možnost manj odveč. (Automatic Translation)
