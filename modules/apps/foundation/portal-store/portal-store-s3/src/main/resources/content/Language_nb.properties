s3-region=S3-regionen (Automatic Translation)
s3-region-help=Sett Amazon S3-regionen, som representerer et geografisk område der Amazon S3 lagrer de brukeropprettede bøttene. Amazon S3-regioner brukes til å optimalisere latens, minimere kostnader og håndtere forskriftsmessige krav. Objekter som er lagret i en Amazon S3-region, forlater aldri regionen med mindre de overføres eksplisitt til et annet område. (Automatic Translation)
s3-storage-class=S3-lagringsklasse (Automatic Translation)
s3-storage-class-help=Angi Amazon S3-lagringsklassen. STANDARD-lagringsklassen brukes som standard, og betyr at overflødige kopier av data lagres på forskjellige steder. Den REDUCED_REDUNDANCY lagringsklassen er ment å lagre ikke-kritiske, reproduserbare data, og tilbyr et rimelig, svært tilgjengelig lagringsalternativ; Dette alternativet er imidlertid mindre overflødig. (Automatic Translation)
