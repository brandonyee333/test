proxy-auth-type=Godkjenningstype for proxy (Automatic Translation)
proxy-auth-type-help=Angi proxy-godkjenningstypen som skal brukes ved tilkobling til en S3-tjeneste. Ingen konfigurerer ingen proxy. "Brukernavn-passord" konfigurerer en proxy; For denne konfigurasjonen angir du verdier for proxy-brukernavn og proxy-passord. Ntlm konfigurerer en Windows NTLM-proxy. For denne konfigurasjonen angir du verdier for proxy-brukernavn, proxy-passord, NTLM-proxy-domene og NTLM-proxy-arbeidsstasjon. (Automatic Translation)
