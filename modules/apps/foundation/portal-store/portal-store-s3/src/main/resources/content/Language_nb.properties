minimum-uploads-part-size=Minste delstørrelse (Automatic Translation)
minimum-uploads-part-size-help=Angi minimum delestørrelse for opplastingsdeler. Hvis du reduserer minimumsstørrelsen for deler, deles opplastinger med flere deler inn i et større antall mindre deler. Hvis du angir denne verdien for lav, har det en negativ effekt på overføringshastighetene, noe som fører til ekstra ventetid og nettverkskommunikasjon for hver del. (Automatic Translation)
multipart-upload-threshold=Terskel for opplasting av flere deler (Automatic Translation)
