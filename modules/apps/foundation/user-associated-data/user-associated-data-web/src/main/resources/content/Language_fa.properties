summary-page-step-one-description=<strong>مرحله 1:</strong> قبل از شروع فرآیند حذف اطلاعات کاربر باید غیر فعال شود.
summary-page-step-three-description=<strong>مرحله 3:</strong> اطلاعات بازبینی نرم افزار ممکن است به عنوان اطلاعات شخصی در نظر گرفته شوند. این اطلاعات نمی توانند به صورت خودکار بی نام شوند و بایستی توسط یک ادمین بازبینی شوند.
summary-page-step-two-description=<strong>مرحله 2:</strong> همه اطلاعات داخل سایت شخصی کاربر پاک خواهد شد. هر داده ای رو که می خواهید نگه دارید روی نمایه کاربر و صفخات داشبورد او بازبینی و ذخیره نمایید.
