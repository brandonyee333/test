id-token-signing-alg-values=ID Token Signing 演算法
id-token-signing-alg-values-help=Állítsa a támogatott ID token aláírási algoritmusait az OpenID csatlakozás szolgáltatóra. Ha a felderítés végpontja nincs megadva, ezek az algoritmusok lesznek használva. Ez esetben az RS256 algoritmust is fel kell tüntetni, és a lista első helyén kell szerepelnie. Ha meg van adva a felderítés végpontja, itt nem kell megadni semmilyen algoritmust, hiszen az azonosság-token támogatott aláírási algoritmusait a felfedezés végpontja szolgáltatja.
