xuggler-help=Xuggler требует установки библиотек для ОС (native library), которые распространяются под GPL лицензией. Если вы видите ваше окружение в списке ниже, то сервер может автоматически скачать и установить библиотеки за вас. После этого вам будет необходимо перезапустить сервер. Если ваше окружение отсутствует в списке, вы можете скомпилировать и собрать библиотеки вручную. <a href="{0}" target="_blank">Читать дальше.</a>
