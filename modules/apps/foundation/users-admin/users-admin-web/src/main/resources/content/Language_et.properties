javax.portlet.description.com_liferay_my_account_web_portlet_MyAccountPortlet=Konto sätted annavad juurdepääsu teie isiklikele seadetele ühes ja lihtsasti kasutatavas asukohas. Kasutajad saavad redigeerida oma profiili ja vaadata saidi liikmelisust ning organisatsioone ja kasutajagruppe, kuhu nad kuuluvad. (Automatic Translation)
javax.portlet.description.com_liferay_users_admin_web_portlet_UsersAdminPortlet=Kasutajad on isikud, kes täidavad portaali abil toiminguid. Saate luua uusi kasutajaid või desaktiveerida olemasolevaid kasutajaid. Kasutajad saavad saitidega liituda, paigutada organisatsiooni hierarhiatesse, delegeerida rollide õigusi või koguda neid kasutajagruppidesse. Kasutajagrupid võivad ületada organisatsioonipiire ja neid saab kasutada kõigi liikmete määramiseks teistesse kogudesse (nt saitidele või rollidele). Kasutajagruppe võidakse kasutada ka liikmete isiklike saidimallide kohandamiseks. (Automatic Translation)
