javax.portlet.description.com_liferay_users_admin_web_portlet_UsersAdminPortlet=Користувачі – це особи, які виконують завдання за допомогою порталу. Можна створити нових або вимкнути наявних користувачів. Користувачі можуть приєднуватися до сайтів, бути поміщеними в ієрархії організації, делегувати дозволи в ролях або збиратися в групи користувачів. Групи користувачів можуть перетинати організаційні межі та використовуватися для призначення всіх учасників іншим колекціям, таким як сайти або ролі. Групи користувачів також можуть використовуватися для настроювання особистих шаблонів сайтів для учасників. (Automatic Translation)
