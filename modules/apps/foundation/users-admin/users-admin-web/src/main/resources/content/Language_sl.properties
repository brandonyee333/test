javax.portlet.description.com_liferay_my_account_web_portlet_MyAccountPortlet=Nastavitve računa zagotavljajo dostop do vaših osebnih nastavitev na eni, preprosti za uporabo lokacije. Uporabniki lahko urejajo svoj profil in si ogledajo članstva v mestu ter organizacije in skupine uporabnikov, ki jim pripadajo. (Automatic Translation)
javax.portlet.description.com_liferay_users_admin_web_portlet_UsersAdminPortlet=Uporabniki so posamezniki, ki opravljajo naloge z uporabo portala. Ustvarite lahko nove uporabnike ali deaktivirate obstoječe uporabnike. Uporabniki se lahko pridružijo spletnim mestom, se postavijo v hierarhije organizacije, se prenesejo dovoljenja v vlogah ali pa se zbirajo v skupine uporabnikov. Uporabniške skupine lahko prečkajo organizacijske meje in se lahko uporabijo za dodeljevanje vseh članov drugim zbirkam, kot so mesta ali vloge. Uporabniške skupine se lahko uporabljajo tudi za prilagajanje predlog osebnih mest za člane. (Automatic Translation)
