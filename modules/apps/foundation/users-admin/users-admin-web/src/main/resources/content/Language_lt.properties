javax.portlet.description.com_liferay_my_account_web_portlet_MyAccountPortlet=Mano paskyra apjungia visą jūsų informaciją į vieną lengvai prieinamą vietą. Vartotojai gali redaguoti savo profilį ir matyti organizacijas ir grupes, kurioms jie priklauso.
javax.portlet.description.com_liferay_users_admin_web_portlet_UsersAdminPortlet=Vartotojai yra asmenys, atliekantys užduotis naudodamiesi portalu. Galite kurti naujus vartotojus arba išjungti esamus vartotojus. Vartotojai gali prisijungti prie svetainių, būti įtraukti į organizacijų hierarchijas, būti įgalioti vaidmenų teises arba būti surinkti į vartotojų grupes. Vartotojų grupės gali kirsti organizacijos ribas ir gali būti naudojamos visiems nariams priskirti kitiems rinkiniams, pvz., svetainėms ar vaidmenims. Vartotojų grupės taip pat gali būti naudojamos narių asmeniniams svetainių šablonams tinkinti. (Automatic Translation)
