javax.portlet.description.com_liferay_my_account_web_portlet_MyAccountPortlet=Настройки на акаунта предоставя достъп до личните ви настройки в едно, лесно за използване местоположение. Потребителите могат да редактират своя профил и да преглеждат членствата на сайта и организациите и потребителските групи, към които принадлежат. (Automatic Translation)
javax.portlet.description.com_liferay_users_admin_web_portlet_UsersAdminPortlet=Потребителите са лица, които изпълняват задачи с помощта на портала. Можете да създавате нови потребители или да деактивирате съществуващи потребители. Потребителите могат да се присъединяват към сайтове, да бъдат поставени в йерархии на организацията, да бъдат делегирани разрешения в роли или да бъдат събрани в потребителски групи. Потребителските групи могат да преминават границите на организацията и могат да се използват за присвояване на всички членове към други колекции, като например сайтове или роли. Потребителските групи могат да се използват и за персонализиране на персонални шаблони на сайтове за членове. (Automatic Translation)
