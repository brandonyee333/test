javax.portlet.description.com_liferay_my_account_web_portlet_MyAccountPortlet=खाता सेटिंग एक में आपकी व्यक्तिगत सेटिंग तक पहुंच प्रदान करती है, स्थान का उपयोग करने में आसान। उपयोगकर्ता अपनी प्रोफ़ाइल और साइट सदस्यता और उन संगठनों और उपयोगकर्ता समूहों को संपादित कर सकते हैं जिनसे वे संबंधित हैं। (Automatic Translation)
javax.portlet.description.com_liferay_users_admin_web_portlet_UsersAdminPortlet=उपयोगकर्ता ऐसे व्यक्ति हैं जो पोर्टल का उपयोग करके कार्य करते हैं। आप नए उपयोगकर्ता बना सकते हैं या मौजूदा उपयोगकर्ताओं को निष्क्रिय कर सकते हैं। उपयोगकर्ता साइटों में शामिल हो सकते हैं, संगठन पदानुक्रम में रखा जा सकता है, भूमिकाओं में अनुमतियां प्रत्यायोजित किया जा सकता है, या उपयोगकर्ता समूहों में एकत्र किया जा सकता है। उपयोगकर्ता समूह संगठनात्मक सीमाओं को पार कर सकते हैं, और इसका उपयोग सभी सदस्यों को साइटों या भूमिकाओं जैसे अन्य संग्रहों को असाइन करने के लिए किया जा सकता है। उपयोगकर्ता समूहों का उपयोग सदस्यों के लिए व्यक्तिगत साइट टेम्पलेट्स को अनुकूलित करने के लिए भी किया जा सकता है। (Automatic Translation)
