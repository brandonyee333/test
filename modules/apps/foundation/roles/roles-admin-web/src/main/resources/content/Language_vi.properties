updating-the-chosen-permissions-will-overwrite-the-respective-individually-defined-permissions-for-one-or-more-of-these-resource-types=Cập nhật các quyền đã chọn sẽ ghi đè lên các quyền được xác định riêng tương ứng cho một hoặc nhiều loại tài nguyên sau: Mục đánh dấu trang, Thư mục dấu trang, Đặt lịch, Lịch, Tài nguyên lịch (Automatic Translation)
