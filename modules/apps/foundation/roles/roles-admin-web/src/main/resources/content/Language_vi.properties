javax.portlet.description.com_liferay_roles_admin_web_portlet_RolesAdminPortlet=Vai trò là nhóm người dùng chia sẻ một chức năng cụ thể trong cổng thông tin, theo một phạm vi cụ thể. Bạn có thể thêm vai trò có thể được cấp quyền cho các chức năng khác nhau trong các ứng dụng portlet. (Automatic Translation)
