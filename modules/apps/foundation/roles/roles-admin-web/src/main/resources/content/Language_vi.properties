application-permissions=Phiên bản ứng dụng
application-permissions-help=Các quyền này xác định những hành động nào có thể được thực hiện trên ứng dụng này. Chúng bao gồm các hành động mà mọi ứng dụng đều có, chẳng hạn như Thêm vào Trang và Xem, cũng như các hành động dành riêng cho ứng dụng. (Automatic Translation)
are-you-sure-you-want-to-delete-this-role=Bạn có chắc chắn muốn xóa bỏ vai trò này không? Nó sẽ bị xóa ngay lập tức. Nếu đó là vai trò của người đánh giá, các nhiệm vụ của nó sẽ bị xóa cùng với vai trò đó. (Automatic Translation)
