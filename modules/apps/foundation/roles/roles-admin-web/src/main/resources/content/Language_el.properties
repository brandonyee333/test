javax.portlet.description.com_liferay_roles_admin_web_portlet_RolesAdminPortlet=Οι ρόλοι είναι ομαδοποιήσεις χρηστών που μοιράζονται μια συγκεκριμένη λειτουργία εντός της πύλης, σύμφωνα με ένα συγκεκριμένο πεδίο εφαρμογής. Μπορείτε να προσθέσετε ρόλους στους οποίους μπορούν να εκχωρηθούν δικαιώματα σε διάφορες συναρτήσεις εντός εφαρμογών θυρών. (Automatic Translation)
