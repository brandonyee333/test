include-inherited-permissions=Sertakan Keizinan Warisan (Automatic Translation)
include-inherited-permissions-help=Setkan ini untuk benar untuk menyertakan peranan yang diwarisi pengguna sebagai sebahagian daripada penapisan keizinan carian. Peranan yang diwarisi pengguna termasuk semua pengguna yang diperuntukkan kepada pengguna daripada kumpulan pengguna dan keahlian organisasi mereka. (Automatic Translation)
index-commit-immediately=Indeks Komited Dengan Serta-merta (Automatic Translation)
index-commit-immediately-help=Tetapkan ini kepada benar untuk segera melakukan permintaan tulis indeks carian. Menetapkan ini untuk benar boleh memberi kesan negatif kepada prestasi enjin carian kerana setiap permintaan menulis akan memaksa enjin carian untuk menyegarkan pembaca indeks dan berpotensi mengepam transaksi ke cakera. Tingkah laku lalai portal ini adalah untuk melakukan serta-merta untuk operasi indeks individu (contohnya menambah blog, mengemas kini blog) tetapi kelewatan komited untuk operasi pukal (contohnya indeks semua pengguna, indeks semua wiki) sehingga semua penyertaan dihantar ke enjin carian. Menetapkan ini kepada palsu boleh menyebabkan portlet seperti Penerbit Aset mempamerkan tindak balas tertangguh apabila menunjukkan kandungan yang baru ditambah. Sebagai contoh, pengguna mungkin mengalami kelewatan dengan enjin carian Elasticsearch lalai. Lihat https://www.elastic.co/guide/en/elasticsearch/guide/current/near-real-time.html untuk maklumat lanjut. (Automatic Translation)
