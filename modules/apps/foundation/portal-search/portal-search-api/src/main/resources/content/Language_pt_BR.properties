buffered=Em buffer
buffered-execution-mode=Modo de execução em buffer
default-search-result-permission-filter-configuration-name=預設搜尋結果權限篩選
excluded-entry-class-names=不包括條目類別名稱
field-name-patterns=欄位名稱模式
include-inherited-permissions=包括繼承的權限
include-inherited-permissions-help=Defina como verdadeiro para incluir os papéis herdados pelo usuário como parte do filtro de permissões da pesquisa. Os papéis herdados pelo usuário incluem todos os usuários designados para um usuário a partir do seu grupo de usuário e as filiações à organização.
index-commit-immediately=Confirmar índice imediatamente
index-commit-immediately-help=Configure como verdadeiro para confirmar as requisições de escrita da busca imediatamente. Configurar como verdadeiro pode impactar negativamente a performance do motor de busca já que cada requisição de escrita forçará o motor de busca a refazer a leitura dos índices e potencialmente gravar as transações para o disco. O comportamento padrão do portal é confirmar imediatamente as operações individuais de índices (e.g. inserir blog, atualizar blog) mas postergar para operações em massa (ex.: indexar todos os usuários, indexar todas as wikis) até que todos os conteúdos sejam adicionados. Configurar como falso pode fazer portlets como o Publicador de Conteúdos e Mídias demorar a exibir conteúdo recente. Por exemplo, usuários podem experimentar um atraso com o motor de busca padrão Elasticsearch. Veja https://www.elastic.co/guide/en/elasticsearch/guide/current/near-real-time.html para mais informações.
index-read-only=Apenas leitura de índice
index-status-manager-configuration-name=Gerenciar estado do índice
index-writer-helper-configuration-name=Assistente de Escrita de Indexação
index.status.manager.configuration.nam=Gerenciar estado do índice
indexer-registry-configuration-name=Registro de Indexação de Busca
indexing-batch-sizes=Tamanhos de lote de indexação
indexing-batch-sizes-help=O número de documentos a serem indexados por lote por tipos de modelos que dão suporte à indexação de lote. 1000 como padrão. Para modelos com documentos maiores, diminuir este valor pode melhorar a estabilidade ao executar uma reindexação completa.
max-buffer-size=Tamanho máximo do buffer
minimum-buffer-availability-percentage=Porcentagem de disponibilidade mínima do buffer
permission-filtered-search-result-accurate-count-threshold=權限篩選搜尋結果準確計數門檻值
permission-filtered-search-result-accurate-count-threshold-help=如果搜尋查詢結果低於門檻值，則確保權限篩選器後的搜尋結果的數量是準確的。
permission-terms-limit=權限條款限制
permission-terms-limit-help=Definir ele para limitar o número de termos de busca por permissão que serão adicionados à consulta de busca. Se este limite for excedido, nenhum termo de busca por permissão será adicionado. Em vez disso, a verificação por permissão voltará para o filtro de permissão de busca.
query-pre-process-configuration-name=Preprocessador de Consultas de Indexação de Busca
reindex-configuration-name=Reindexar
search-engine-helper-configuration-name=Assistente de Motor de Busca
search-permission-checker-configuration-name=Verificador de Permissão de Busca
search-query-result-window-limit=搜尋查詢結果的最大數
search-query-result-window-limit-help=Definir para limitar o número de resultados de bisca que podem ser solicitados para uma consulta de busca.