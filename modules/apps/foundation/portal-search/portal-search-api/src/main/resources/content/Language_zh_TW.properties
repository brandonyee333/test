buffered=緩衝器
buffered-execution-mode=緩衝執行模式
default-search-result-permission-filter-configuration-name=預設搜尋結果權限篩選
excluded-entry-class-names=不包括條目類別名稱
field-name-patterns=欄位名稱模式
include-inherited-permissions=包括繼承的權限
include-inherited-permissions-help=將此設置為真實，以將用戶繼承的角色作為搜索許可權篩選的一部分。使用者繼承的角色包括從使用者組和組織成員身份分配給使用者的所有使用者。 (Automatic Translation)
index-commit-immediately=立刻提交索引
index-commit-immediately-help=將此設置為真實，以便立即提交搜索索引書寫請求。將此設置為真值可能會對搜尋引擎性能產生負面影響，因為每個寫入請求將迫使搜尋引擎刷新索引讀取器，並可能將交易沖洗到磁碟上。門戶的默認行為是立即承諾針對單個索引操作（例如添加部落格、更新部落格），但延遲批量操作（例如索引所有使用者，索引所有 wikis），直到所有條目都發送到搜尋引擎。將此設置為錯誤可能會導致資產發佈器等埠在顯示新添加的內容時顯示延遲回應。例如，使用者可能會遇到預設彈性搜尋引擎的延遲。有關更多資訊，請參閱 https://www.elastic.co/guide/en/elasticsearch/guide/current/near-real-time.html。 (Automatic Translation)
index-read-only=只讀索引
index-status-manager-configuration-name=索引狀態管理器
index-writer-helper-configuration-name=索引寫入 Helper
index.status.manager.configuration.nam=索引狀態管理器
indexer-registry-configuration-name=搜索索引註冊處 (Automatic Translation)
indexing-batch-sizes=索引批次處理大小
indexing-batch-sizes-help=支援批次索引的模型類型每批要索引的文件數量。默認值為10000。對於具有大型文檔的模型，降低此值可能會提高執行完全重新交易時的穩定性。 (Automatic Translation)
max-buffer-size=最大緩衝器大小
minimum-buffer-availability-percentage=最大緩衝器可用性百分比
permission-filtered-search-result-accurate-count-threshold=權限篩選搜尋結果準確計數門檻值
permission-filtered-search-result-accurate-count-threshold-help=如果搜尋查詢結果低於門檻值，則確保權限篩選器後的搜尋結果的數量是準確的。
permission-terms-limit=權限條款限制
permission-terms-limit-help=將限制設置為添加到搜尋查詢的搜索許可條款的數量。如果超過此限制，則不會添加許可權搜索條款。反之，許可權檢查將會回到搜尋權限篩選器。
query-pre-process-configuration-name=搜索索引查詢預處理器 (Automatic Translation)
reindex-configuration-name=重新索引
search-engine-helper-configuration-name=搜尋引擎幫手 (Automatic Translation)
search-permission-checker-configuration-name=搜索許可權檢查器 (Automatic Translation)
search-query-result-window-limit=搜尋查詢結果的最大數
search-query-result-window-limit-help=設置此選項，可以限制從搜尋查詢中請求的搜尋結果數量。