include-inherited-permissions-help=Set this to true to include a user's inherited roles as part of search permission filtering. A user's inherited roles include all users assigned to a user from their user group and organization memberships. (Automatic Copy)
index-commit-immediately=Index Commit Immediately (Automatic Copy)
index-commit-immediately-help=ตั้งค่านี้เป็นจริงเพื่อส่งคำขอเขียนอินเด็กซ์การค้นหาทันที การตั้งค่านี้เป็นจริงอาจส่งผลเสียต่อประสิทธิภาพของเครื่องมือค้นหาเนื่องจากคำขอการเขียนแต่ละครั้งจะบังคับให้เครื่องมือค้นหารีเฟรชตัวอ่านอินเด็กซ์และอาจล้างคำสั่งที่ไปยังดิสก์ พฤติกรรมเริ่มต้นของพอร์ทัลคือการส่งมอบทันทีสำหรับการดำเนินการอินเด็กซ์แต่ละรายการ (เช่นเพิ่มบล็อกอัปเดตบล็อก) แต่ความล่าช้าส่งมอบสำหรับการดำเนินการจำนวนมาก (เช่นอินเด็กซ์ผู้ใช้ทั้งหมด อินเด็กซ์วิกิทั้งหมด) จนกว่ารายการทั้งหมดจะถูกส่งไปยังเครื่องมือค้นหา การตั้งค่านี้เป็นเท็จอาจทำให้พอร์ตเล็ตเช่นผู้เผยแพร่โฆษณาแสดงการตอบกลับล่าช้าเมื่อแสดงเนื้อหาที่เพิ่มใหม่ ตัวอย่างเช่นผู้ใช้อาจพบความล่าช้าด้วยเครื่องมือค้นหา Elasticsearch เริ่มต้น ดู https://www.elastic.co/guide/en/elasticsearch/guide/current/near-real-time.html สำหรับข้อมูลเพิ่มเติม
