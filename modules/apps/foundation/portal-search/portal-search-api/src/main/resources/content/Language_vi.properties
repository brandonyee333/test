permission-filtered-search-result-accurate-count-threshold-help=Nếu truy vấn tìm kiếm trả về kết quả tìm kiếm có số đếm nằm trong ngưỡng này, tổng số sau khi lọc quyền được đảm bảo là chính xác. (Automatic Translation)
permission-terms-limit=Giới hạn điều khoản cấp phép (Automatic Translation)
permission-terms-limit-help=Đặt tùy chọn này để giới hạn số cụm từ tìm kiếm quyền sẽ được thêm vào truy vấn tìm kiếm. Nếu vượt quá giới hạn này, sẽ không có cụm từ tìm kiếm quyền nào được thêm vào. Thay vào đó, kiểm tra quyền sẽ quay lại bộ lọc quyền tìm kiếm. (Automatic Translation)
