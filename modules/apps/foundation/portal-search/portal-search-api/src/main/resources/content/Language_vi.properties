indexing-batch-sizes-help=Số lượng tài liệu để lập chỉ mục mỗi lô cho các loại mô hình hỗ trợ lập chỉ mục hàng loạt. Mặc định là 10000. Đối với các mô hình có tài liệu lớn, việc giảm giá trị này có thể cải thiện tính ổn định khi thực hiện chỉ mục lại đầy đủ. (Automatic Translation)
