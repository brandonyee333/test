permission-terms-limit=Limit podmienok povolenia (Automatic Translation)
permission-terms-limit-help=Túto hodnotu nastavte tak, aby sa obmedzil počet hľadaných výrazov povolení, ktoré sa pridajú do vyhľadávacieho dotazu. Ak sa tento limit prekročí, nebudú pridané žiadne hľadané výrazy povolení. Namiesto toho kontrola povolení klesne späť na filter povolení vyhľadávania. (Automatic Translation)
