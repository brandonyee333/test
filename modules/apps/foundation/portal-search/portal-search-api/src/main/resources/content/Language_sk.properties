indexing-batch-sizes-help=Počet dokumentov na indexovanie na dávku pre typy modelov, ktoré podporujú indexovanie šarží. Predvolená hodnota je 10000. V prípade modelov s veľkými dokumentmi môže zníženie tejto hodnoty zlepšiť stabilitu pri vykonávaní úplného preindexu. (Automatic Translation)
