include-inherited-permissions-help=검색 권한 필터링의 일부로 사용자의 상속된 역할을 포함하려면 이를 true로 설정하십시오. 사용자의 상속된 역할에는 사용자 그룹 및 조직 멤버십에서 사용자에게 할당된 모든 사용자가 포함됩니다.
index-commit-immediately=인덱스 즉시 커밋
index-commit-immediately-help=검색 인덱스 쓰기 요청을 즉시 커밋하려면 이를 true로 설정합니다. 이를 true로 설정하면 각 쓰기 요청이 검색 엔진에서 색인 판독기를 새로 고치고 잠재적으로 트랜잭션을 디스크로 플러시하기 때문에 검색 엔진 성능에 부정적인 영향을 미칠 수 있습니다. 포털의 기본 동작은 개별 색인 작업(예: 블로그 추가, 블로그 업데이트)에 대해 즉시 커밋하지만 모든 항목이 검색 엔진에 전송될 때까지 대량 작업(예: 모든 사용자 색인, 모든 Wiki 색인)에 대한 커밋을 지연하는 것입니다. 이를 false로 설정하면 새로 추가된 콘텐츠를 표시할 때 Asset Publisher와 같은 위젯이 지연된 응답을 나타낼 수 있습니다. 예를 들어 사용자는 기본 Elasticsearch 검색 엔진에서 지연을 경험할 수 있습니다. 자세한 내용은 https://www.elastic.co/guide/en/elasticsearch/guide/current/near-real-time.html을 참조하세요.
