indexing-batch-sizes-help=배치 인덱싱을 지원하는 모델 유형에 대해 배치당 인덱싱할 문서 수입니다. 기본값은 10000입니다. 큰 문서가 있는 모델의 경우 이 값을 줄이면 전체 재색인을 실행할 때 안정성이 향상될 수 있습니다.
