indexing-batch-sizes-help=일괄 처리 인덱싱을 지원하는 모델 유형에 대해 일괄 처리당 인덱싱할 문서 수입니다. 기본값은 10000입니다. 문서가 큰 모델의 경우 이 값을 줄이면 전체 재인덱싱을 실행하면 안정성이 향상될 수 있습니다. (Automatic Translation)
