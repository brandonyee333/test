permission-filtered-search-result-accurate-count-threshold-help=검색 쿼리가 이 임계값 내에 있는 개수로 검색 결과를 반환하면 권한 필터링 후총 수가 정확하다고 보장됩니다. (Automatic Translation)
permission-terms-limit=권한 조건 제한 (Automatic Translation)
permission-terms-limit-help=이 설정은 검색 쿼리에 추가될 권한 검색 어정문의 수를 제한하도록 설정합니다. 이 제한을 초과하면 권한 검색 어가 추가되지 않습니다. 대신 사용 권한 확인이 검색 권한 필터로 돌아갑니다. (Automatic Translation)
