permission-filtered-search-result-accurate-count-threshold-help=Hvis en søkespørring returnerer søkeresultater med et antall som er innenfor denne terskelen, vil det totale antallet etter tillatelsesfiltrering garantert være nøyaktig. (Automatic Translation)
