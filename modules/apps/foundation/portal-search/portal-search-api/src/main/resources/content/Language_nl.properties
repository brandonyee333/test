indexer-registry-configuration-name=Zoekindexregister
indexing-batch-sizes=Batchgrootte voor indexering
indexing-batch-sizes-help=Het aantal te indexeren documenten per batch voor modeltypes die batchindexering ondersteunen. De standaardwaarde is 10.000. Voor modellen met grote documenten kan een lagere waarde de stabiliteit ten goede komen bij een volledige herindexering.
max-buffer-size=Maximale buffergrootte
minimum-buffer-availability-percentage=Minimaal percentage voor bufferschikbaarheid
permission-filtered-search-result-accurate-count-threshold=權限篩選搜尋結果準確計數門檻值
permission-filtered-search-result-accurate-count-threshold-help=如果搜尋查詢結果低於門檻值，則確保權限篩選器後的搜尋結果的數量是準確的。
permission-terms-limit=權限條款限制
permission-terms-limit-help=Stel dit in om het aantal zoektermen voor machtigingen te beperken dat toegevoegd zal worden aan de zoekquery. Bij overschrijding van deze limiet worden geen zoektermen voor machtigingen toegevoegd. De machtigingcontrole zal in dat geval gebruikmaken van de filter 'machtiging zoeken'.
