permission-filtered-search-result-accurate-count-threshold-help=Pokud vyhledávací dotaz vrátí výsledky hledání s počtem, který je v této prahové hodnotě, je zaručeno, že celkový počet po filtrování oprávnění bude přesný. (Automatic Translation)
permission-terms-limit=Omezení podmínek oprávnění (Automatic Translation)
permission-terms-limit-help=Toto nastavením omezíte počet hledaných výrazů oprávnění, které budou přidány do vyhledávacího dotazu. Pokud je tento limit překročen, nebudou přidány žádné výrazy pro vyhledávání oprávnění. Místo toho se kontrola oprávnění vrátí do filtru oprávnění k vyhledávání. (Automatic Translation)
