indexing-batch-sizes-help=Počet dokumentů, které mají být indexovány pro dávku pro typy modelů, které podporují indexování dávek. Výchozí hodnota je 10000. U modelů s velkými dokumenty může snížení této hodnoty zlepšit stabilitu při provádění úplného reindexu. (Automatic Translation)
