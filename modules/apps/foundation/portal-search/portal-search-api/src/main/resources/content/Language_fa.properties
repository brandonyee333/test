permission-terms-limit-help=این را برای محدود کردن تعداد اصطلاحات جستجوی مجوز که به پرس و جو جستجو اضافه خواهد شد، تنظیم کنید. اگر از این حد تجاوز شود، هیچ اصطلاح جستجوی مجوزی اضافه نخواهد شد. در عوض، چک کردن مجوز دوباره به فیلتر مجوز جستجو سقوط خواهد کرد. (Automatic Translation)
