permission-filtered-search-result-accurate-count-threshold-help=اگر یک پرس و جو جستجو نتایج جستجو را با شمارشی که درون این آستانه است برگرداند، شمارش کل پس از فیلتر کردن اجازه تضمین می شود که دقیق باشد. (Automatic Translation)
