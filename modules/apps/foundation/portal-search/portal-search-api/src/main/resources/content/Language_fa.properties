indexing-batch-sizes-help=تعداد اسناد به شاخص در هر دسته برای انواع مدل است که پشتیبانی از نمایه سازی دسته ای. پیش فرض به 10000. برای مدل های با اسناد بزرگ، کاهش این مقدار ممکن است ثبات را در هنگام اجرای یک راس مجدد کامل بهبود بخشد. (Automatic Translation)
