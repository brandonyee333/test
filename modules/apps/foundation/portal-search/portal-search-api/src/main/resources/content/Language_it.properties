permission-filtered-search-result-accurate-count-threshold-help=Se una query di ricerca restituisce risultati di ricerca con un conteggio che si trova entro questa soglia, il conteggio totale dopo il filtro autorizzazioni è garantito per essere accurato. (Automatic Translation)
permission-terms-limit=Limite termini autorizzazione (Automatic Translation)
permission-terms-limit-help=Impostare questa proprietà per limitare il numero di termini di ricerca delle autorizzazioni che verranno aggiunti alla query di ricerca. Se questo limite viene superato, non verranno aggiunti termini di ricerca delle autorizzazioni. Al contrario, il controllo delle autorizzazioni tornerà al filtro delle autorizzazioni di ricerca. (Automatic Translation)
