indexing-batch-sizes-help=Numero di documenti da indicizzare per batch per i tipi di modello che supportano l'indicizzazione batch. Il valore predefinito è 10000. Per i modelli con documenti di grandi dimensioni, la riduzione di questo valore può migliorare la stabilità durante l'esecuzione di un reindicizzazione completo. (Automatic Translation)
