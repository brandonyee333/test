additional-configurations=Дополнительные конфигурации (Automatic Translation)
additional-configurations-help=Пользовательские настройки для встроенного Elasticsearch, в формате YML (elasticsearch.yml). (Automatic Translation)
additional-index-configurations=Дополнительные конфигурации индекса (Automatic Translation)
additional-index-configurations-help=Пользовательские настройки для индекса Liferay в формате JSON или YML (Elasticsearch Create Index API). (Automatic Translation)
additional-type-mappings=Дополнительные типы карт (Automatic Translation)
additional-type-mappings-help=Пользовательские картографирования для LiferayDocumentType в формате JSON (Elasticsearch Put Mapping API). Это значение должно быть установлено только с помощью новых полевых карт. Если установить это значение с помощью перекрывающихся отображений для полей по умолчанию, создание индекса не удается. Чтобы полностью заменить отображение по умолчанию, используйте overrideTypeMappings. (Automatic Translation)
bootstrap-mlockall=Бутстрап Млоколл (Automatic Translation)
bootstrap-mlockall-help=Если это проверено, пространство адреса процесса заблокировано в оперативной памяти, предотвращая замену памяти Elasticsearch. (Automatic Translation)
client-transport-ignore-cluster-name=Клиент Транспорт Игнорировать название кластера (Automatic Translation)
client-transport-ignore-cluster-name-help=Если это проверено, проверка имени кластера подключенных узлов игнорируется. (Automatic Translation)
client-transport-nodes-sampler-interval=Интервал клиентских транспортных узлов Sampler (Automatic Translation)
client-transport-nodes-sampler-interval-help=Инструктирует узел клиента о том, как часто можно работать с перечисленными и подключенными узлами. (Automatic Translation)
client-transport-sniff=Клиент Транспорт Sniff (Automatic Translation)
client-transport-sniff-help=Если это проверено, кластерное нюхание позволяет динамически обнаружить доступные узлы в кластере. (Automatic Translation)
cluster-name=Название кластера (Automatic Translation)
cluster-name-help=Название кластера для присоединения. Название должно соответствовать удаленному кластеру при настройке режима работы на удаленном. (Automatic Translation)
discovery-zen-ping-unicast-hosts-port=Дзен Дискавери Unicast Хосты Порт (Automatic Translation)
discovery-zen-ping-unicast-hosts-port-help=Диапазон портов для использования при создании значения discovery.zen.ping.unicast.hosts. Несколько узлов Elasticsearch в различных портах могут выступать в качестве маршрутизаторов сплетен на одном компьютере. (Automatic Translation)
elastic-search-configuration-name=Элустихис (Automatic Translation)
http-cors-allow-origin=Http CORS Разрешить происхождение (Automatic Translation)
http-cors-allow-origin-help=Происхождение, чтобы, когда HTTP CORS включен. (Automatic Translation)
http-cors-configurations=Конфигурации Http CORS (Automatic Translation)
http-cors-configurations-help=Пользовательские настройки для HTTP CORS, в формате YML (elasticsearch.yml). (Automatic Translation)
http-cors-enabled=Http CORS Включено (Automatic Translation)
http-cors-enabled-help=Если это проверено, включается совместное использование ресурсов кросс-происхождения, которое определяет, может ли браузер другого происхождения делать запросы в Elasticsearch. При отключении веб-инструменты переднего конца, такие как elasticsearch-голова, могут быть не в состоянии подключиться. (Automatic Translation)
http-enabled=Http Включено (Automatic Translation)
http-enabled-help=Если это проверено, включен слой HTTP. При отсутствии контроля полностью отключен слой HTTP на узлах, которые не предназначены для обслуживания запросов REST напрямую. (Automatic Translation)
index-name-prefix=Префикс названия индекса (Automatic Translation)
index-name-prefix-help=Приставка для имени индекса поиска. Это значение не должно быть изменено при нормальных условиях. Если вы измените это значение, вы также должны переиндексировать портал, а затем вручную удалить старый индекс с помощью консоли администрирования Elasticsearch. (Automatic Translation)
log-exceptions-only=Только исключения из журнала (Automatic Translation)
log-exceptions-only-help=Если это проверено, журналы исключения только из Elasticsearch и не перенапрягая их. (Automatic Translation)
network-bind-host=Сетевой хост bind (Automatic Translation)
network-bind-host-help=Сетевой интерфейс (ы) узел должен связываться с для того, чтобы слушать входящие запросы. (Automatic Translation)
network-host=Сетевой хост (Automatic Translation)
network-host-help=Имя хоста или IP-адрес, связанный с узлом, который используется для публикации (рекламы) узла другим узлам кластера. Это ярлык, который устанавливает хост связывания и хост публикации в то же время. (Automatic Translation)
network-publish-host=Сеть Публикация Хост (Automatic Translation)
network-publish-host-help=Единый интерфейс узел рекламирует другим узлам кластера, так что эти узлы могут подключиться к нему. (Automatic Translation)
operation-mode=Режим работы (Automatic Translation)
operation-mode-help=Режим работы REMOTE подключается к удаленному автономному кластеру Elasticsearch. Режим работы EMBEDDED запускает Portal с внутреннего экземпляра Elasticsearch в том же JVM. Режим работы EMBEDDED не поддерживается. (Automatic Translation)
override-type-mappings=Переопределение типов карт (Automatic Translation)
override-type-mappings-help=Переопределить отображения для всего LiferayDocumentType, в формате JSON (Elasticsearch Put Mapping API). Если вы установите это значение, создание индекса игнорирует определение отображения по умолчанию и любые точки расширения, используя вместо этого это альтернативное определение отображения. Используйте это, если вам нужно LiferayDocumentType, который будет создан с нестандартными отображениями для полей по умолчанию. Если вам просто нужно добавить новые пользовательские отображения без перекрытия каких-либо по умолчанию, используйте additionalTypeMappings. (Automatic Translation)
retry-on-conflict=Повторить конфликт (Automatic Translation)
retry-on-conflict-help=Количество ретрий в случае конфликта версии происходит из-за обновления документа между его извлечением и обновлением. (Automatic Translation)
sync-search=Синхронизированный поиск (Automatic Translation)
sync-search-help=Если это проверено, поиск выполняется по потоку вызова, а не по пулу потоков поиска Elasticsearch. Это относится только к режиму работы EMBEDDED. (Automatic Translation)
transport-addresses=Транспортные адреса (Automatic Translation)
transport-addresses-help=Удаленный узел адреса для подключения. Это значение требуется при настройке режима работы REMOTE. (Automatic Translation)
transport-tcp-port=Транспорт TCP Порт (Automatic Translation)
transport-tcp-port-help=Порт для связывания связи между узлами. Принимает одно значение или диапазон (например, 9300-9400). (Automatic Translation)