additional-type-mappings=Додаткові зіставлення типів (Automatic Translation)
additional-type-mappings-help=Настроювані зіставлення для типу LiferayDocumentType у форматі JSON (API пружної карти). Це значення слід установити лише для нових зіставлень полів. Якщо встановити це значення з будь-якими зіставленнями, що перекриваються для полів за промовчанням, створення індексу зазнає невдачі. Щоб повністю замінити зіставлення за промовчанням, використовуйте defaultTypeMappings. (Automatic Translation)
bootstrap-mlockall=Завантаження Mlockall (Automatic Translation)
bootstrap-mlockall-help=Якщо буде позначено цей пункт, адресний простір процесу буде заблоковано у оперативній пам' яті, що запобігає заміні будь- якої пам' яті Elasticsearch. (Automatic Translation)
client-transport-ignore-cluster-name=Клієнтський транспорт ігнорує ім'я кластера (Automatic Translation)
client-transport-ignore-cluster-name-help=Якщо буде позначено цей пункт, перевірка назви кластера з' єднаних вузлів буде проігнорована. (Automatic Translation)
client-transport-nodes-sampler-interval=Інтервал пробовідбірника вузлів клієнта (Automatic Translation)
client-transport-nodes-sampler-interval-help=Інструктує клієнтський вузол про частоту вибірки/пінгу вузлів, перелічених і підключених. (Automatic Translation)
client-transport-sniff=Нюхання транспорту клієнта (Automatic Translation)
client-transport-sniff-help=Якщо буде позначено цей пункт, буде увімкнено обнюхування кластера для динамічного виявлення доступних вузлів у кластері. (Automatic Translation)
cluster-name=Ім'я кластера (Automatic Translation)
cluster-name-help=Ім'я кластера, який потрібно об'єднати. Ім'я має збігатися з іменем віддаленого кластера, якщо режим роботи встановлено на віддалений. (Automatic Translation)
discovery-zen-ping-unicast-hosts-port=Дзен-відкриття одноадресний порт хостів (Automatic Translation)
discovery-zen-ping-unicast-hosts-port-help=Діапазон портів, який буде використовуватися при побудові значення discovery.zen.ping.unicast.hosts. Кілька вузлів Elasticsearch на ряді портів можуть виступати в якості маршрутизаторів пліток на одному комп'ютері. (Automatic Translation)
elastic-search-configuration-name=Еластичний пошук (Automatic Translation)
http-cors-allow-origin=Http CORS дозволяють джерело (Automatic Translation)
http-cors-allow-origin-help=Джерело, яке дозволяється, коли ввімкнено HTTP CORS. (Automatic Translation)
http-cors-configurations=Конфігурації HTTP CORS (Automatic Translation)
http-cors-configurations-help=Користувацькі параметри http CORS у форматі YML (elasticsearch.yml). (Automatic Translation)
http-cors-enabled=Увімкнуто http CORS (Automatic Translation)
http-cors-enabled-help=Якщо буде позначено цей пункт, буде увімкнено спільний доступ до ресурсів між джерелом, який визначає, чи може браузер іншого походження робити запити до Elasticsearch. Якщо цей інструмент вимкнено, веб-інструменти інтерфейсу, такі як elasticsearch-head, можуть бути не в змозі підключитися. (Automatic Translation)
http-enabled=Ввімкнуто http (Automatic Translation)
http-enabled-help=Якщо буде позначено цей пункт, буде увімкнено шар HTTP. Якщо цей пункт не буде позначено, шар HTTP повністю на вузлах, які не призначені для безпосереднього обслуговування REST-запитів, буде вимкнено. (Automatic Translation)
index-name-prefix=Префікс імені індексу (Automatic Translation)
index-name-prefix-help=Префікс імені індексу пошуку. Це значення не слід змінювати за звичайних умов. Якщо це значення змінюється, потрібно також повторно додати портал, а потім вручну видалити старий індекс за допомогою консолі адміністрування Elasticsearch. (Automatic Translation)
log-exceptions-only=Лише винятки журналу (Automatic Translation)
log-exceptions-only-help=Якщо буде позначено цей пункт, журнали буде в журналі винятків лише з Elasticsearch і не перекружувати їх. (Automatic Translation)
network-bind-host=Вузол мережних прив'яязку (Automatic Translation)
network-bind-host-help=Для прослуховування вхідних запитів слід прив' язати вузол до мережних інтерфейсів. (Automatic Translation)
network-host=Мережний вузол (Automatic Translation)
network-host-help=Назва вузла або IP-адреса прив'язуються до вузла, який використовується для публікації (реклами) вузла на інших вузлах кластера. Це скорочення, яке встановлює вузол прив'їв і вузол публікації одночасно. (Automatic Translation)
network-publish-host=Вузол публікації в мережі (Automatic Translation)
network-publish-host-help=Єдиний інтерфейс, який вузол рекламує на інших вузлах кластера, так що ці вузли можуть підключатися до нього. (Automatic Translation)
operation-mode=Режим роботи (Automatic Translation)
operation-mode-help=Режим дистанційної роботи підключається до віддаленого автономного кластера Elasticsearch. Режим вбудованої роботи запускає портал із внутрішнім екземпляром Elasticsearch у тому самому СПМ. Режим вбудованої операції не підтримується. (Automatic Translation)
override-type-mappings=Перевизначити зіставлення типів (Automatic Translation)
override-type-mappings-help=Перевизначити зіставлення для всього типу LiferayDocument у форматі JSON (Elasticsearch Put Mapping API). Якщо встановити це значення, створення індексу ігноруватиме визначення зіставлень за промовчанням і будь-які точки розширення, використовуючи натомість це альтернативне визначення зіставлення. Використовуйте цей параметр, якщо потрібно створити LiferayDocumentType із нестандартними зіставленнями полів за промовчанням. Якщо потрібно просто додати нові настроювані зіставлення, не перекриваючи жодних значень за промовчанням, використовуйте додаткові зіставленняType. (Automatic Translation)
retry-on-conflict=Повторити спробу при конфлікті (Automatic Translation)
retry-on-conflict-help=Кількість запитів, якщо версія конфліктує, оскільки документ оновлено між його отриманням і оновленням. (Automatic Translation)
sync-search=Синхронізований пошук (Automatic Translation)
sync-search-help=Якщо буде позначено цей пункт, пошук виконується у ланцюжку викликів, а не у пулі потоків пошуку Elasticsearch. Це стосується лише режиму роботи EMBEDDED. (Automatic Translation)
transport-addresses=Адреси транспорту (Automatic Translation)
transport-addresses-help=Адреси віддалених вузлів, до які потрібно підключитися. Це значення потрібне, якщо для параметра Режим роботи встановлено значення REMOTE. (Automatic Translation)
transport-tcp-port=Транспортний порт TCP (Automatic Translation)
transport-tcp-port-help=Порт для зв'язку між вузлами. Приймає одне значення або діапазон (наприклад, 9300-9400). (Automatic Translation)