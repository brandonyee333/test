operation-mode=Provozní režim (Automatic Translation)
operation-mode-help=Režim vzdáleného ovládání se připojuje ke vzdálenému samostatnému clusteru Elasticsearch. Provozní režim EMBEDDED spustí portál s interní instancí Elasticsearch ve stejném JVM. Provozní režim EMBEDDED není podporován. (Automatic Translation)
override-type-mappings=Přepsat mapování typů (Automatic Translation)
override-type-mappings-help=Přepsat mapování pro celý LiferayDocumentType ve formátu JSON (Elasticsearch Put Mapping API). Pokud nastavíte tuto hodnotu, vytvoření indexu ignoruje výchozí definici mapování a všechny rozšiřující body, místo toho pomocí této alternativní definice mapování. Tuto možnost použijte, pokud potřebujete, aby byl liferaydocumentType vytvořen s nestandardními mapováními pro výchozí pole. Pokud potřebujete jen přidat nová vlastní mapování bez překrývání výchozích hodnot, použijte additionalTypeMappings. (Automatic Translation)
retry-on-conflict=Opakovat pokus o konflikt (Automatic Translation)
