network-host=Hostitel sítě (Automatic Translation)
network-host-help=Název hostitele nebo adresa IP se vázány na uzel, který se používá k publikování (inzerování) hostitele do jiných uzlů v clusteru. Jedná se o zástupce, který současně nastaví hostitele vazby a hostitele publikování. (Automatic Translation)
