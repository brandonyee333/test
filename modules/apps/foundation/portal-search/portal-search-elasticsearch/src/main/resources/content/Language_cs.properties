sync-search=Synchronizované hledání (Automatic Translation)
sync-search-help=Pokud je tato funkce zaškrtnuta, vyhledávání se spustí ve vlákně invokeru, nikoli ve fondu vyhledávacích vláken elasticsearch. To platí pouze pro režim operace EMBEDDED. (Automatic Translation)
transport-addresses=Adresy přenosu (Automatic Translation)
