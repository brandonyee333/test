additional-configurations=Dodatkowe konfiguracje (Automatic Translation)
additional-configurations-help=Niestandardowe ustawienia osadzonego Elasticsearch w formacie YML (elasticsearch.yml). (Automatic Translation)
additional-index-configurations=Dodatkowe konfiguracje indeksów (Automatic Translation)
additional-index-configurations-help=Niestandardowe ustawienia indeksu Liferay w formacie JSON lub YML (Elasticsearch Create Index API). (Automatic Translation)
additional-type-mappings=Dodatkowe mapowania typów (Automatic Translation)
additional-type-mappings-help=Niestandardowe mapowania dla LiferayDocumentType, w formacie JSON (Elasticsearch Put Mapping API). Ta wartość powinna być ustawiona tylko przy nowych mapowaniach pól. Jeśli ta wartość zostanie ustawiona z dowolnymi nakładającymi się mapowaniami dla pól domyślnych, tworzenie indeksu zakończy się niepowodzeniem. Aby całkowicie zastąpić mapowania domyślne, należy użyć overrideTypeMappings. (Automatic Translation)
bootstrap-mlockall=Bootstrap Mlockall (Automatic Translation)
bootstrap-mlockall-help=Jeśli to jest zaznaczone, przestrzeń adresowa procesu jest zablokowana w pamięci RAM, zapobiegając zamianie pamięci Elasticsearch. (Automatic Translation)
client-transport-ignore-cluster-name=Nazwa klastra ignorowania transportu klienta (Automatic Translation)
client-transport-ignore-cluster-name-help=Jeśli to jest zaznaczone, sprawdzanie poprawności nazwy klastra połączonych węzłów jest ignorowane. (Automatic Translation)
client-transport-nodes-sampler-interval=Interwał próbnika węzłów transportu klienta (Automatic Translation)
client-transport-nodes-sampler-interval-help=Nakazuje węzłowi klienta, jak często próbkować/pingować węzły wymienione i połączone. (Automatic Translation)
client-transport-sniff=Wąchanie transportu klienta (Automatic Translation)
client-transport-sniff-help=Jeśli to jest zaznaczone, wąchanie klastra jest włączone dynamicznie odnajdywać dostępne węzły w klastrze. (Automatic Translation)
cluster-name=Nazwa klastra (Automatic Translation)
cluster-name-help=Nazwa klastra do dołączenia. Nazwa powinna być zgodna ze zdalnym klastrem, gdy tryb pracy jest ustawiony na zdalny. (Automatic Translation)
discovery-zen-ping-unicast-hosts-port=Port hostów emisji pojedynczej Zen Discovery (Automatic Translation)
discovery-zen-ping-unicast-hosts-port-help=Zakres portów używanych podczas tworzenia wartości discovery.zen.ping.unicast.hosts. Wiele węzłów Elasticsearch na różnych portach może działać jako routery plotkarskie na tym samym komputerze. (Automatic Translation)
elastic-search-configuration-name=Elasticsearch (wyszukiwanie elastyczne) (Automatic Translation)
http-cors-allow-origin=Http CORS Zezwalaj na pochodzenie (Automatic Translation)
http-cors-allow-origin-help=Początki, aby zezwolić, gdy http cors jest włączony. (Automatic Translation)
http-cors-configurations=Konfiguracje protokołu HTTP CORS (Automatic Translation)
http-cors-configurations-help=Ustawienia niestandardowe dla HTTP CORS w formacie YML (elasticsearch.yml). (Automatic Translation)
http-cors-enabled=Http CORS włączone (Automatic Translation)
http-cors-enabled-help=Jeśli to jest zaznaczone, udostępnianie zasobów między źródłami jest włączone, co określa, czy przeglądarka innego źródła może żądać Elasticsearch. Jeśli jest wyłączona, narzędzia front-endu sieci web, takie jak elasticsearch-head, mogą nie być w stanie się połączyć. (Automatic Translation)
http-enabled=Http włączone (Automatic Translation)
http-enabled-help=Jeśli ta opcja jest zaznaczona, warstwa HTTP jest włączona. Jeśli opcja ta nie jest zaznaczona, warstwa HTTP całkowicie na węzłach, które nie są przeznaczone do bezpośredniego wyświetlania żądań REST, jest wyłączona. (Automatic Translation)
index-name-prefix=Prefiks nazwy indeksu (Automatic Translation)
index-name-prefix-help=Prefiks nazwy indeksu wyszukiwania. Ta wartość nie powinna być zmieniana w normalnych warunkach. Jeśli zmienisz tę wartość, należy również ponownie zeksuj portal, a następnie ręcznie usunąć stary indeks za pomocą konsoli administracyjnej Elasticsearch. (Automatic Translation)
log-exceptions-only=Tylko wyjątki dziennika (Automatic Translation)
log-exceptions-only-help=Jeśli jest to zaznaczone, rejestruje wyjątki tylko z Elasticsearch i nie rethrow je. (Automatic Translation)
network-bind-host=Host wiązania sieciowego (Automatic Translation)
network-bind-host-help=Interfejsy sieciowe, z których węzeł powinien być powiązany w celu nasłuchiwać żądań przychodzących. (Automatic Translation)
network-host=Host sieciowy (Automatic Translation)
network-host-help=Nazwa hosta lub adres IP powiązany z węzłem, który jest używany do publikowania (anonsowania) hosta do innych węzłów w klastrze. Jest to skrót, który ustawia hosta powiązania i hosta publikowania w tym samym czasie. (Automatic Translation)
network-publish-host=Host publikowania w sieci (Automatic Translation)
network-publish-host-help=Pojedynczy interfejs węzeł anonsuje do innych węzłów w klastrze, tak aby te węzły mogą się z nim połączyć. (Automatic Translation)
operation-mode=Tryb pracy (Automatic Translation)
operation-mode-help=Tryb pracy REMOTE łączy się ze zdalnym autonomicznym klastrem elasticsearch. Tryb operacji EMBEDDED uruchamia portal z wewnętrznym wystąpieniem Elasticsearch w tym samym dżomie JVM. Tryb pracy EMBEDDED nie jest nieobsługiwał. (Automatic Translation)
override-type-mappings=Zastępowanie mapowań typów (Automatic Translation)
override-type-mappings-help=Zastąp mapowania dla całego LiferayDocumentType w formacie JSON (Elasticsearch Put Mapping API). Jeśli ustawisz tę wartość, tworzenie indeksu ignoruje domyślną definicję mapowań i wszystkie punkty rozszerzenia, używając tej alternatywnej definicji mapowań. Użyj tego, jeśli potrzebujesz LiferayDocumentType do utworzenia z niestandardowymi mapowaniami dla pól domyślnych. Jeśli wystarczy dodać nowe mapowania niestandardowe bez nakładania się żadnych ustawień domyślnych, należy użyć additionalTypeMappings. (Automatic Translation)
retry-on-conflict=Ponów próbę konfliktu (Automatic Translation)
retry-on-conflict-help=Liczba ponownych prób, jeśli wystąpi konflikt wersji, ponieważ dokument został zaktualizowany między pobraniem go i zaktualizowaniem. (Automatic Translation)
sync-search=Zsynchronizowane wyszukiwanie (Automatic Translation)
sync-search-help=Jeśli jest to zaznaczone, wyszukiwanie jest uruchamiane w wątku wywoływacza, a nie w puli wątków wyszukiwania Elasticsearch. Dotyczy to tylko trybu pracy EMBEDDED. (Automatic Translation)
transport-addresses=Adresy transportu (Automatic Translation)
transport-addresses-help=Zdalne adresy węzłów do nawiązania połączenia. Ta wartość jest wymagana, gdy tryb pracy jest ustawiony na REMOTE. (Automatic Translation)
transport-tcp-port=Port TCP transportu (Automatic Translation)
transport-tcp-port-help=Port do powiązania do komunikacji między węzłami. Akceptuje pojedynczą wartość lub zakres (np. 9300-9400). (Automatic Translation)