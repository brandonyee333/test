http-cors-enabled=Http CORS įgalinta (Automatic Translation)
http-cors-enabled-help=Jei tai pažymėta, įgalinamas kryžminės kilmės išteklių bendrinimas, kuris nustato, ar kitos kilmės naršyklė gali pateikti užklausas "Elasticsearch". Jei išjungta, žiniatinklio išoriniai įrankiai, pvz., elastinga galvos, gali nepavykti prisijungti. (Automatic Translation)
http-enabled=Http įgalinta (Automatic Translation)
http-enabled-help=Jei tai pažymėta, HTTP sluoksnis įgalintas. Jei nepažymėta, HTTP sluoksnis visiškai mazguose, kurie nėra skirti tiesiogiai aptarnauti REST užklausas, yra išjungtas. (Automatic Translation)
index-name-prefix=Rodyklės pavadinimo prefiksas (Automatic Translation)
index-name-prefix-help=Ieškos indekso pavadinimo priešdėlis. Ši vertė neturėtų būti keičiama įprastomis sąlygomis. Jei pakeisite šią reikšmę, taip pat turite iš naujo įsisakinti portalą ir neautomatiniu būdu panaikinti seną indeksą naudodami elastingų tyrimų administravimo konsolę. (Automatic Translation)
log-exceptions-only=Tik žurnalo išimtys (Automatic Translation)
log-exceptions-only-help=Jei tai pažymėta, rąstų išimtys tik iš Elasticsearch ir ne rethrow juos. (Automatic Translation)
network-bind-host=Tinklo susiejimo pagrindinis kompiuteris (Automatic Translation)
network-bind-host-help=Tinklo sąsaja (-os), prie kurios (-ių) mazgas turi būti susietas , kad galėtų klausytis gaunamų užklausų. (Automatic Translation)
network-host=Tinklo pagrindinis kompiuteris (Automatic Translation)
network-host-help=Pagrindinio kompiuterio vardas arba IP adresas susietas su mazgu, kuris naudojamas publikuoti (reklamuoti) pagrindinį kompiuterį kituose sankaupos mazguose. Tai nuoroda, kuri nustato susieti pagrindinio kompiuterio ir publikuoti pagrindinio kompiuterio tuo pačiu metu. (Automatic Translation)
network-publish-host=Tinklo publikavimo pagrindinis kompiuteris (Automatic Translation)
network-publish-host-help=Viena sąsaja mazgas reklamuojasi į kitus mazgus sankaupos, kad šie mazgai gali prisijungti prie jo. (Automatic Translation)
operation-mode=Veikimo režimas (Automatic Translation)
operation-mode-help=NUOTOLINIO valdymo režimas prisijungia prie nuotolinio atskiro elasticsearch klasterio. EMBEDDED veikimo režimas paleidžia portalą su vidiniu elasticsearch egzemplioriumi tame pačiame JVM. EMBEDDED veikimo režimas nepalaikomas. (Automatic Translation)
override-type-mappings=Nepaisyti tipo susiejimų (Automatic Translation)
override-type-mappings-help=Nepaisyti viso LiferayDocumentType susiejimų JSON formatu (Elasticsearch Put Mapping API). Jei nustatysite šią reikšmę, rodyklės kūrimas nepaisys numatytojo susiejimų apibrėžimo ir bet kokių plėtinių taškų, vietoj to naudodamas šį alternatyvų susiejimų apibrėžimą. Naudokite tai, jei jums reikia sukurti LiferayDocumentType su nestandartiniais numatytųjų laukų susiejimais. Jei jums tereikia pridėti naujų pasirinktinių susiejimų nepersidengiant su numatytosiomis reikšmėmis, naudokite papildomus "TypeMappings". (Automatic Translation)
retry-on-conflict=Kartoti konfliktą (Automatic Translation)
retry-on-conflict-help=Kartojimų skaičius, jei versija nesuderinama dėl to, kad dokumentas buvo atnaujintas tarp jo nuskaitymo ir naujinimo. (Automatic Translation)
sync-search=Sinchronizuota ieška (Automatic Translation)
sync-search-help=Jei tai pažymėta, ieška vykdoma iškviečiamojo gijos, o ne Elasticsearch paieškos gijų telkinyje. Tai taikoma tik EMBEDDED veikimo režimui. (Automatic Translation)
transport-addresses=Transportavimo adresai (Automatic Translation)
transport-addresses-help=Nuotolinis mazgas adresai prisijungti. Ši reikšmė būtina, kai veikimo režimas nustatytas kaip REMOTE. (Automatic Translation)
transport-tcp-port=Transportavimo TCP prievadas (Automatic Translation)
transport-tcp-port-help=Prievadas, skirtas ryšiui tarp mazgų susieti. Priima vieną reikšmę arba diapazoną (pvz., 9300–9400). (Automatic Translation)