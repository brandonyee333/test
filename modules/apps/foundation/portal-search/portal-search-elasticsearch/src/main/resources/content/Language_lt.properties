additional-type-mappings=Papildomi tipų susiejimai (Automatic Translation)
additional-type-mappings-help=Pasirinktiniai "LiferayDocumentType" susiejimai JSON formatu (Elasticsearch Put Mapping API). Ši vertė turi būti nustatyta tik su naujais laukų susiejimais. Jei nustatysite šią reikšmę su bet kokiais persidengiančiais numatytųjų laukų susiejimais, indekso kūrimas nepavyks. Norėdami visiškai pakeisti numatytuosius susiejimus, naudokite overrideTypeMappings. (Automatic Translation)
bootstrap-mlockall=Bootstrap Mlockall (Automatic Translation)
