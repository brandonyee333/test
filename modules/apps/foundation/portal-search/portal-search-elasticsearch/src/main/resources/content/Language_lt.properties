cluster-name=Sankaupos pavadinimas (Automatic Translation)
cluster-name-help=Klasterio, prie kurį reikia prisijungti, pavadinimas. Pavadinimas turi atitikti nuotolinį klasterį, kai veikimo režimas nustatytas kaip nuotolinis. (Automatic Translation)
discovery-zen-ping-unicast-hosts-port=Zen Discovery Unicast pagrindinio kompiuterio prievadas (Automatic Translation)
discovery-zen-ping-unicast-hosts-port-help=Prievadų diapazonas, naudojamas kuriant discovery.zen.ping.unicast.hosts reikšmę. Keli "Elasticsearch" mazgai įvairiuose prievaduose gali veikti kaip paskalų maršrutizatoriai tame pačiame kompiuteryje. (Automatic Translation)
elastic-search-configuration-name=Elasticsearch (Automatic Translation)
http-cors-allow-origin=http CORS leisti kilmę (Automatic Translation)
