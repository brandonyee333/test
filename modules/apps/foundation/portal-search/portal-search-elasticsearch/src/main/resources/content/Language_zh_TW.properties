additional-configurations=其他配置
additional-configurations-help=嵌入式彈性搜索的自定義設置，以 YML 格式（彈性搜索.yml）。 (Automatic Translation)
additional-index-configurations=其他索引配置
additional-index-configurations-help=以 JSON 或 YML 格式（彈性搜尋建立索引 API）對生命射線索引的自定義設置。 (Automatic Translation)
additional-type-mappings=其他類型映射
additional-type-mappings-help=以 JSON 格式（彈性搜尋放置映射 API）對生命射線檔類型進行自定義映射。此值僅應設置為新的欄位映射。如果將此值設置為預設欄位的任何重疊映射，則創建索引失敗。要完全替換預設映射，請使用覆蓋類型映射。 (Automatic Translation)
bootstrap-mlockall=Bootstrap Mlockall
bootstrap-mlockall-help=如果檢查此問題，過程位址空間將鎖定到 RAM 中，從而阻止任何彈性搜索記憶體被交換出去。 (Automatic Translation)
client-transport-ignore-cluster-name=用戶端傳輸忽略群集名稱 (Automatic Translation)
client-transport-ignore-cluster-name-help=如果檢查此問題，則忽略已連接節點的集群名稱驗證。 (Automatic Translation)
client-transport-nodes-sampler-interval=用戶端傳輸節點取樣器間隔 (Automatic Translation)
client-transport-nodes-sampler-interval-help=指導用戶端節點採樣/平滑列出的節點和連接的頻率。 (Automatic Translation)
client-transport-sniff=客戶運輸嗅探 (Automatic Translation)
client-transport-sniff-help=如果檢查了這一點，則啟用群集嗅探，以動態發現集群中的可用節點。 (Automatic Translation)
cluster-name=叢級名稱
cluster-name-help=要加入的集群的名稱。當操作模式設置為遠端時，名稱應與遠端群集匹配。 (Automatic Translation)
discovery-zen-ping-unicast-hosts-port=Zen Discovery Unicast Hosts Port
discovery-zen-ping-unicast-hosts-port-help=構建發現時要使用的埠範圍。一系列埠上的多個彈性搜索節點可以在同一台電腦上充當八卦路由器。 (Automatic Translation)
elastic-search-configuration-name=Elasticsearch
http-cors-allow-origin=赫特普科爾斯允許起源 (Automatic Translation)
http-cors-allow-origin-help=啟用 HTTP CORS 時允許的起源。 (Automatic Translation)
http-cors-configurations=赫特普科爾斯配置 (Automatic Translation)
http-cors-configurations-help=HTTP CORS 的自訂設定，以 YML 格式（彈性搜尋.yml）。 (Automatic Translation)
http-cors-enabled=啟用了赫特普·科雷 (Automatic Translation)
http-cors-enabled-help=如果對此進行了檢查，則啟用了跨源資源分享，從而確定其他源上的瀏覽器是否可以請求彈性搜索。如果禁用，Web 前端工具（如彈性搜索頭）可能無法連接。 (Automatic Translation)
http-enabled=已啟用赫特普 (Automatic Translation)
http-enabled-help=如果檢查了這一點，則啟用了 HTTP 層。如果不加檢查，則完全在不打算直接服務於 REST 請求的節點上的 HTTP 層將禁用。 (Automatic Translation)
index-name-prefix=索引名稱前綴
index-name-prefix-help=搜尋索引名稱的首碼。此值不應在正常條件下更改。如果您更改此值，還必須重新鍵入門戶，然後使用彈性搜索管理主控台手動刪除舊索引。 (Automatic Translation)
log-exceptions-only=僅 Log 紀錄異常
log-exceptions-only-help=如果檢查了這一點，僅從彈性搜索中記錄異常，並且不會重新轉出它們。 (Automatic Translation)
network-bind-host=網路綁定主機
network-bind-host-help=節點應綁定到網路介面以收聽傳入請求。 (Automatic Translation)
network-host=網路主機
network-host-help=主機名或 IP 位址與節點綁定，節點用於將主機發佈（宣傳）到集群中的其他節點。這是一個快捷方式，可同時設置綁定主機和發佈主機。 (Automatic Translation)
network-publish-host=網路發布主機
network-publish-host-help=節點向集群中的其他節點宣傳的單個介面，以便這些節點可以連接到該節點。 (Automatic Translation)
operation-mode=操作模式
operation-mode-help=遠端操作模式連接到遠端獨立彈性搜索集群。嵌入式操作模式以同一 JVM 中的內部彈性搜索實例啟動門戶。嵌入式操作模式不受支援。 (Automatic Translation)
override-type-mappings=覆蓋類型映射
override-type-mappings-help=以 JSON 格式（彈性搜尋放置映射 API）覆蓋整個生命射線檔類型映射。如果設定此值，索引創建將忽略預設映射定義和任何擴展點，而是使用此替代映射定義。如果您需要使用不標準的預設欄位映射創建 Liferay 多庫類型，請使用此欄位。如果您只需要添加新的自定義映射而不重疊任何預設值，請使用其他類型映射。 (Automatic Translation)
retry-on-conflict=關於衝突的重試 (Automatic Translation)
retry-on-conflict-help=如果出現版本衝突，則檢索次數，因為文檔在檢索和更新之間進行了更新。 (Automatic Translation)
sync-search=同步搜索 (Automatic Translation)
sync-search-help=如果檢查了這一點，則搜索將運行在調用線程上，而不是在彈性搜索的搜索線程池中運行。這僅適用於嵌入式操作模式。 (Automatic Translation)
transport-addresses=交通位址 (Automatic Translation)
transport-addresses-help=要連接到的遠端節點位址。當操作模式設置為遠端時，需要此值。 (Automatic Translation)
transport-tcp-port=Transport TCP Port
transport-tcp-port-help=節點之間通信的綁定埠。接受單個值或範圍（例如，9300-9400）。 (Automatic Translation)