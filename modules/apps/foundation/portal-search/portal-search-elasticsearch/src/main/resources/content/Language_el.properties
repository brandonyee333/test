additional-configurations=Πρόσθετες ρυθμίσεις παραμέτρων (Automatic Translation)
additional-configurations-help=Προσαρμοσμένες ρυθμίσεις για ενσωματωμένη elasticsearch, σε μορφή YML (elasticsearch.yml). (Automatic Translation)
additional-index-configurations=Πρόσθετες ρυθμίσεις παραμέτρων ευρετηρίου (Automatic Translation)
additional-index-configurations-help=Προσαρμοσμένες ρυθμίσεις για το ευρετήριο Liferay, σε μορφή JSON ή YML (Elasticsearch Δημιουργία ευρετηρίου API). (Automatic Translation)
additional-type-mappings=Πρόσθετες αντιστοιχίσεις τύπων (Automatic Translation)
additional-type-mappings-help=Προσαρμοσμένες αντιστοιχίσεις για το LiferayDocumentType, σε μορφή JSON (Ελαστική αντιστοίχιση γραφημάτων). Αυτή η τιμή πρέπει να οριστεί μόνο με νέες αντιστοιχίσεις πεδίων. Εάν ορίσετε αυτήν την τιμή με τυχόν επικαλυπτόμενες αντιστοιχίσεις για προεπιλεγμένα πεδία, η δημιουργία ευρετηρίου αποτυγχάνει. Για να αντικαταστήσετε πλήρως τις προεπιλεγμένες αντιστοιχίσεις, χρησιμοποιήστε overrideTypeMappings. (Automatic Translation)
bootstrap-mlockall=Μπότες Mlockall (Automatic Translation)
bootstrap-mlockall-help=Εάν αυτό είναι επιλεγμένο, ο χώρος διευθύνσεων διεργασίας είναι κλειδωμένος στη μνήμη RAM, αποτρέποντας την αντάλλαξη μνήμης Elasticsearch. (Automatic Translation)
client-transport-ignore-cluster-name=Η μεταφορά προγράμματος-πελάτη αγνοεί το όνομα συμπλέγματος (Automatic Translation)
client-transport-ignore-cluster-name-help=Εάν αυτό είναι επιλεγμένο, η επικύρωση ονόματος συμπλέγματος των συνδεδεμένων κόμβων παραβλέπεται. (Automatic Translation)
client-transport-nodes-sampler-interval=Διάστημα δειγματολήπτη κόμβων μεταφοράς προγράμματος-πελάτη (Automatic Translation)
client-transport-nodes-sampler-interval-help=Καθοδηγεί τον κόμβο υπολογιστή-πελάτη σχετικά με τη συχνότητα δειγματοληψίας/ping των κόμβων που παρατίθενται και συνδέονται. (Automatic Translation)
client-transport-sniff=Μυρωδιά μεταφοράς πελατών (Automatic Translation)
client-transport-sniff-help=Εάν αυτό είναι επιλεγμένο, η ανίχνευση συμπλέγματος είναι ενεργοποιημένη για να ανακαλύψετε δυναμικά τους διαθέσιμους κόμβους στο σύμπλεγμα. (Automatic Translation)
cluster-name=Όνομα συμπλέγματος (Automatic Translation)
cluster-name-help=Το όνομα του συμπλέγματος στο οποίο θα συμμετάσχετε. Το όνομα θα πρέπει να ταιριάζει με το απομακρυσμένο σύμπλεγμα όταν η λειτουργία λειτουργίας έχει οριστεί σε απομακρυσμένη. (Automatic Translation)
discovery-zen-ping-unicast-hosts-port=Zen ανακάλυψη Unicast φιλοξενεί λιμάνι (Automatic Translation)
discovery-zen-ping-unicast-hosts-port-help=Περιοχή θυρών που θα χρησιμοποιηθούν κατά τη δημιουργία της τιμής discovery.zen.ping.unicast.hosts. Πολλαπλοί κόμβοι Elasticsearch σε μια σειρά θυρών μπορούν να λειτουργήσουν ως δρομολογητές κουτσομπολιού στον ίδιο υπολογιστή. (Automatic Translation)
elastic-search-configuration-name=Ελαστικός εκμαγνώστρας (Automatic Translation)
http-cors-allow-origin=Το http CORS επιτρέπει την προέλευση (Automatic Translation)
http-cors-allow-origin-help=Προέλευση που θα επιτρέπεται όταν είναι ενεργοποιημένη η HTTP CORS. (Automatic Translation)
http-cors-configurations=Ρυθμίσεις παραμέτρων HTTP CORS (Automatic Translation)
http-cors-configurations-help=Προσαρμοσμένες ρυθμίσεις για HTTP CORS, σε μορφή YML (elasticsearch.yml). (Automatic Translation)
http-cors-enabled=Η διεύθυνση HTTP CORS είναι ενεργοποιημένη (Automatic Translation)
http-cors-enabled-help=Εάν αυτό είναι επιλεγμένο, είναι ενεργοποιημένη η κοινή χρήση πόρων μεταξύ προελεύσεων, η οποία καθορίζει εάν ένα πρόγραμμα περιήγησης σε άλλη προέλευση μπορεί να υποβάλει αιτήσεις στο Elasticsearch. Εάν είναι απενεργοποιημένα, τα εργαλεία προσκηνίων ιστού, όπως η ελαστική κεφαλήsearch, ενδέχεται να μην είναι δυνατό να συνδεθούν. (Automatic Translation)
http-enabled=Το http είναι ενεργοποιημένο (Automatic Translation)
http-enabled-help=Εάν αυτό είναι επιλεγμένο, είναι ενεργοποιημένο το επίπεδο HTTP. Εάν δεν είναι επιλεγμένο, η στρώση HTTP εξ ολοκλήρου σε κόμβους που δεν προορίζονται να εξυπηρετήσουν απευθείας αιτήσεις REST απενεργοποιούνται. (Automatic Translation)
index-name-prefix=Πρόθεμα ονόματος ευρετηρίου (Automatic Translation)
index-name-prefix-help=Το πρόθεμα για το όνομα του ευρετηρίου αναζήτησης. Αυτή η τιμή δεν πρέπει να αλλάξει υπό κανονικές συνθήκες. Εάν αλλάξετε αυτήν την τιμή, πρέπει επίσης να επανεγκατασταίνετε την πύλη και, στη συνέχεια, να διαγράψετε με μη αυτόματο τρόπο το παλιό ευρετήριο χρησιμοποιώντας την κονσόλα διαχείρισης Elasticsearch. (Automatic Translation)
log-exceptions-only=Εξαιρέσεις καταγραφής μόνο (Automatic Translation)
log-exceptions-only-help=Εάν αυτό είναι επιλεγμένο, καταγράφει εξαιρέσεις μόνο από το Elasticsearch και δεν τις αναδιατάσσει. (Automatic Translation)
network-bind-host=Κεντρικός υπολογιστής σύνδεσης δικτύου (Automatic Translation)
network-bind-host-help=Η διασύνδεση δικτύου στην οποία θα πρέπει να συνδεθεί ένας κόμβος για να ακούει για εισερχόμενες αιτήσεις. (Automatic Translation)
network-host=Κεντρικός υπολογιστής δικτύου (Automatic Translation)
network-host-help=Το όνομα κεντρικού υπολογιστή ή η διεύθυνση IP που είναι δεμένη στον κόμβο, ο οποίος χρησιμοποιείται για τη δημοσίευση (διαφήμιση) του κεντρικού υπολογιστή σε άλλους κόμβους του συμπλέγματος. Αυτή είναι μια συντόμευση που ορίζει ταυτόχρονα τον κεντρικό υπολογιστή σύνδεσης και τον κεντρικό υπολογιστή δημοσίευσης. (Automatic Translation)
network-publish-host=Κεντρικός υπολογιστής δημοσίευσης δικτύου (Automatic Translation)
network-publish-host-help=Η ενιαία διεπαφή που διαφημίζει ο κόμβος σε άλλους κόμβους στο σύμπλεγμα, έτσι ώστε αυτοί οι κόμβοι να μπορούν να συνδεθούν σε αυτό. (Automatic Translation)
operation-mode=Λειτουργία λειτουργίας (Automatic Translation)
operation-mode-help=Η λειτουργία REMOTE συνδέεται σε ένα απομακρυσμένο αυτόνομο σύμπλεγμα Elasticsearch. Η λειτουργία ΕΝΣΩΜΑΤΩΜΈΝΗς λειτουργίας ξεκινά την Πύλη με μια εσωτερική παρουσία Elasticsearch στην ίδια JVM. Η λειτουργία ενσωματωμένης λειτουργίας δεν υποστηρίζεται. (Automatic Translation)
override-type-mappings=Παράκαμψη αντιστοιχίσεων τύπων (Automatic Translation)
override-type-mappings-help=Παράκαμψη αντιστοιχίσεων για ολόκληρο τον Τύπο LiferayDocumentType, σε μορφή JSON (Elasticsearch Τοποθέτηση αντιστοίχισης API). Εάν ορίσετε αυτήν την τιμή, η δημιουργία ευρετηρίου αγνοεί τον προεπιλεγμένο ορισμό αντιστοιχίσεων και τυχόν σημεία επέκτασης, χρησιμοποιώντας αυτόν τον εναλλακτικό ορισμό αντιστοιχίσεων. Χρησιμοποιήστε αυτό εάν χρειάζεστε liferayDocumentType για να δημιουργηθεί με μη τυπικές αντιστοιχίσεις για προεπιλεγμένα πεδία. Εάν απλά πρέπει να προσθέσετε νέες προσαρμοσμένες αντιστοιχίσεις χωρίς να επικαλύψετε προεπιλογές, χρησιμοποιήστε πρόσθετεςTypeMappings. (Automatic Translation)
retry-on-conflict=Επανάληψη της διένεξης (Automatic Translation)
retry-on-conflict-help=Ο αριθμός των επαναδικάσεων σε περίπτωση διένεξης έκδοσης παρουσιάζεται επειδή το έγγραφο ενημερώθηκε μεταξύ της ανάκτησής του και της ενημέρωσής του. (Automatic Translation)
sync-search=Συγχρονισμένη αναζήτηση (Automatic Translation)
sync-search-help=Εάν αυτό είναι επιλεγμένο, η αναζήτηση εκτελείται στο νήμα επικαλεστών και όχι στο σύνολο νημάτων αναζήτησης του Elasticsearch. Αυτό ισχύει μόνο για τη λειτουργία ενσωματωμένης λειτουργίας. (Automatic Translation)
transport-addresses=Διευθύνσεις Μεταφορών (Automatic Translation)
transport-addresses-help=Οι απομακρυσμένες διευθύνσεις κόμβων με τις οποίο θα συνδεθείτε. Αυτή η τιμή απαιτείται όταν η λειτουργία λειτουργίας έχει οριστεί σε REMOTE. (Automatic Translation)
transport-tcp-port=Μεταφορά θύρας TCP (Automatic Translation)
transport-tcp-port-help=Η θύρα που θα συνδεθεί για επικοινωνία μεταξύ κόμβων. Δέχεται μία τιμή ή μια περιοχή (π.χ. 9300-9400). (Automatic Translation)