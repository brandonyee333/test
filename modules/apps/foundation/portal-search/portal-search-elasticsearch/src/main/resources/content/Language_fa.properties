additional-configurations=تنظیمات بیشتر
additional-configurations-help=تنظیمات سفارشی برای Elasticsearch جاسازی شده، در فرمت YML (elasticsearch.yml). (Automatic Translation)
additional-index-configurations=تنظیمات فهرست اضافی
additional-index-configurations-help=تنظیمات سفارشی برای شاخص Liferay، در فرمت ابد یا YML (Elasticsearch ایجاد API شاخص). (Automatic Translation)
additional-type-mappings=نقشه برداری نوع اضافی (Automatic Translation)
additional-type-mappings-help=نقشه برداری های سفارشی برای LiferayDocumentType، در فرمت ابد (Elasticsearch قرار دادن API نقشه برداری). این مقدار باید تنها با نگاشت های میدانی جدید تنظیم شود. اگر این مقدار را با هر نقشه برداری همپوشانی برای زمینه های پیش فرض تنظیم کنید، ایجاد شاخص با شکست مواجه می شود. برای جایگزینی نقشه برداری های پیش فرض به طور کامل، از overrideTypeMappings استفاده کنید. (Automatic Translation)
bootstrap-mlockall=بوت استراپ موکل (Automatic Translation)
bootstrap-mlockall-help=اگر این بررسی شود، فضای آدرس فرایند در RAM قفل شده است و از مبادله هر حافظه Elasticsearch جلوگیری می کند. (Automatic Translation)
client-transport-ignore-cluster-name=حمل و نقل مشتری نادیده گرفتن نام خوشه (Automatic Translation)
client-transport-ignore-cluster-name-help=اگر این بررسی شود، اعتبارسنجی نام خوشه گره های متصل نادیده گرفته می شود. (Automatic Translation)
client-transport-nodes-sampler-interval=فاصله نمونه بردار گره های حمل و نقل مشتری (Automatic Translation)
client-transport-nodes-sampler-interval-help=دستور گره مشتری در مورد هر چند وقت یکبار به نمونه / پینگ گره های ذکر شده و متصل. (Automatic Translation)
client-transport-sniff=مشتری حمل و نقل خرناس (Automatic Translation)
client-transport-sniff-help=اگر این بررسی شود، خرناس خوشه ای فعال می شود تا گره های موجود در خوشه را به صورت پویا کشف کند. (Automatic Translation)
cluster-name=نام کلاسترینگ
cluster-name-help=نام خوشه برای پیوستن به. نام باید خوشه از راه دور مطابقت زمانی که عملیات حالت به راه دور تنظیم شده است. (Automatic Translation)
discovery-zen-ping-unicast-hosts-port=ذن دیسکاوری Unicast میزبان بندر (Automatic Translation)
discovery-zen-ping-unicast-hosts-port-help=طیف وسیعی از پورت برای استفاده در هنگام ساخت discovery.zen.ping.unicast.hosts ارزش. چندین گره Elasticsearch بر روی طیف وسیعی از پورت ها می توانند به عنوان روترهای شایعات در همان کامپیوتر عمل کنند. (Automatic Translation)
elastic-search-configuration-name=جستجوی الاستیک
http-cors-allow-origin=Http CORS اجازه می دهد مبدا (Automatic Translation)
http-cors-allow-origin-help=Origins to allow when HTTP CORS is enabled. (Automatic Translation)
http-cors-configurations=Http CORS Configurations (Automatic Translation)
http-cors-configurations-help=تنظیمات سفارشی برای HTTP CORS، با فرمت YML (elasticsearch.yml). (Automatic Translation)
http-cors-enabled=Http CORS فعال شده است
http-cors-enabled-help=اگر این بررسی شده است، به اشتراک گذاری منابع متقابل مبدا فعال است، که تعیین می کند که آیا یک مرورگر در منشاء دیگر می تواند درخواست به Elasticsearch. در صورت غیرفعال شدن، ابزارهای جلوی وب مانند elasticsearch-head ممکن است قادر به اتصال ن باشند. (Automatic Translation)
http-enabled=Http فعال شده است
http-enabled-help=اگر این بررسی شود، لایه HTTP فعال است. اگر بدون علامت، لایه HTTP به طور کامل بر روی گره ها که به معنای خدمت به درخواست REST به طور مستقیم غیر فعال هستند. (Automatic Translation)
index-name-prefix=پیشوند نام فهرست
index-name-prefix-help=پیش فرض برای نام فهرست جستجو. این مقدار نباید در شرایط عادی تغییر کند. اگر شما این مقدار را تغییر دهید، شما همچنین باید دوباره وارد پورتال و سپس به صورت دستی حذف شاخص قدیمی با استفاده از کنسول دولت Elasticsearch. (Automatic Translation)
log-exceptions-only=تنها استثنائات را ثبت کنید
log-exceptions-only-help=اگر این بررسی شود، استثناهای سیاهههای مربوط تنها از Elasticsearch است و آنها را دوباره سرنگون نمی کند. (Automatic Translation)
network-bind-host=میزبان اتصال شبکه
network-bind-host-help=رابط شبکه (ها) یک گره باید به منظور گوش دادن به درخواست های دریافتی متصل شود. (Automatic Translation)
network-host=میزبان شبکه
network-host-help=نام میزبان یا آدرس IP متصل به گره، که برای انتشار (تبلیغ) میزبان به گره های دیگر در خوشه استفاده می شود. این یک میانبر است که میزبان متصل و میزبان انتشار را در همان زمان تنظیم می کند. (Automatic Translation)
network-publish-host=میزبان انتشار شبکه (Automatic Translation)
network-publish-host-help=رابط واحد گره به گره های دیگر در خوشه تبلیغ می کند، به طوری که آن گره ها می توانند به آن متصل شوند. (Automatic Translation)
operation-mode=حالت کاربری
operation-mode-help=حالت عملیات REMOTE به یک خوشه Elasticsearch مستقل از راه دور متصل می شود. حالت عملیات EMBEDDED پورتال را با یک مثال Elasticsearch داخلی در همان JVM شروع می کند. حالت عملیات EMBEDDED بدون حمایت است. (Automatic Translation)
override-type-mappings=نقشه برداری نوع ابطال (Automatic Translation)
override-type-mappings-help=نادیده گرفتن نقشه برداری برای کل LiferayDocumentType، در فرمت ابد (Elasticsearch قرار دادن API نقشه برداری). اگر این مقدار را تنظیم کنید، ایجاد شاخص تعریف نقشه برداری های پیش فرض و هر نقطه پسوند را نادیده می گیرد، با استفاده از این تعریف نقشه برداری های جایگزین به جای آن. استفاده از این اگر شما نیاز به LiferayDocumentType با نقشه برداری های غیر استاندارد برای زمینه های پیش فرض ایجاد می شود. اگر شما فقط نیاز به اضافه کردن نقشه های سفارشی جدید بدون همپوشانی هر گونه پیش فرض, استفاده از additionalTypeMappings. (Automatic Translation)
retry-on-conflict=در صورت مغایرت مجددا تلاش کنید
retry-on-conflict-help=تعداد بازآموزی ها اگر یک تضاد نسخه رخ دهد زیرا سند بین بازیابی آن و به روز رسانی آن به روز شده بود. (Automatic Translation)
sync-search=جست و جوی همزمان
sync-search-help=اگر این تیک زده شده باشد، جست و جو در Thread درخواست کننده به جای Thread pool در Elasticsearch انجام می شود. این تنظیم صرفا در حالت Embedded کار می کند.
transport-addresses=آدرس های حمل و نقل
transport-addresses-help=آدرس گره از راه دور برای اتصال به. این مقدار زمانی مورد نیاز است که عملیات حالت به راه دور تنظیم شده است. (Automatic Translation)
transport-tcp-port=پورت TCP حمل و نقل
transport-tcp-port-help=پورتی که برای ارتباط بین گره ها به هم متصل می شود. یک مقدار واحد یا یک بازه را می پذیرد (مانند ۹۳۰۰-۹۴۰۰). (Automatic Translation)