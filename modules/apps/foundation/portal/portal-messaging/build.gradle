sourceCompatibility = "1.8"
targetCompatibility = "1.8"

repositories {
	maven {
		url "https://repository.apache.org/content/repositories/snapshots"
	}
}

dependencies {
	compileInclude group: "org.apache.felix", name: "org.apache.felix.converter", version: "0.1.0-20170504.133715-6"

	provided group: "biz.aQute.bnd", name: "biz.aQute.bndlib", version: "3.1.0"
	provided group: "com.liferay", name: "com.liferay.portal.configuration.metatype", version: "2.0.0"
	provided group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "2.0.0"
	provided group: "org.osgi", name: "org.osgi.core", version: "5.0.0"
	provided group: "org.osgi", name: "org.osgi.service.cm", version: "1.5.0"
	provided group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.3.0"
	provided group: "org.slf4j", name: "slf4j-api", version: "1.7.2"

	provided project(":apps:foundation:portal:portal-messaging-api")

	testCompile group: "com.liferay", name: "com.liferay.registry.api", version: "1.1.0"
}