sourceCompatibility = "1.8"
targetCompatibility = "1.8"

repositories {
	maven {
		url "https://repository.apache.org/content/repositories/snapshots"
	}
}

dependencies {
	compileInclude group: "org.apache.felix", name: "org.apache.felix.converter", version: "0.1.0-20170504.133715-6"

	provided group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "default"
	provided group: "org.osgi", name: "org.osgi.core", version: "6.0.0"
	provided group: "org.slf4j", name: "slf4j-api", version: "1.7.2"

	testCompile group: "junit", name: "junit", version: "4.12"
}

liferay {
	deployDir = appServerLibGlobalDir
}