tasks.register('replaceIsServerSide') {
	doLast {
		ant.replace(
			file: 'classes/META-INF/resources/metal/src/coreNamed.js',
			token: 'function isServerSide',
			value: 'function isServerSide() { return false; }\n\n  function _isServerSide'
		)
	}
}

jar.dependsOn replaceIsServerSide

afterEvaluate {
	transpileJS {
		soyDependencies = []
	}
}

configJSModules {
	dependsOn transpileJS
	include "**/*.js*"
	moduleFormat "/.soy/g,.soy.js"
}

transpileJS {
	skipWhenEmpty = false
	sourceDir = npmInstall.nodeModulesDir
	soySrcIncludes = "metal*/src/**/*.soy"
	srcIncludes = "metal*/src/**/*.js"
}