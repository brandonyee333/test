disable-in-internet-explorer-11-description=עקב באג במנוע עיבוד הקלשון (המשמש את IE11), כאשר SPA משמש לניווט בדף, שאילתות מדיה יוחלו תמיד כאשר צוינו רק שאילתות ברוחב מינימלי או ברוחב מרבי בלבד, גם אם רוחב העמוד אינו תואם לשאילתות אלה. הדבר משפיע גם על רכיבי iframe של ספקים חיצוניים בדף. הפוך את SPA ללא זמין כדי לעקוף בעיה זו. (Automatic Translation)
disable-in-internet-explorer-description=על מנת לעקוף באג במנוע עיבוד הקלשון (המשמש את IE11) ומנוע העיבוד של MSHTML (בשימוש על ידי Edge), עיבוד נכון של הדף עם SPA דורש כעת הורדה מחדש של כל קבצי CSS בכל ניווטי הדפים עבור כל דפדפני Internet Explorer, מה שעלול לגרום לדפים להיטען לאט יותר עם SPA מופעל מאשר עם SPA מושבת. הפוך את SPA ללא זמין כדי לעקוף בעיה זו. (Automatic Translation)
