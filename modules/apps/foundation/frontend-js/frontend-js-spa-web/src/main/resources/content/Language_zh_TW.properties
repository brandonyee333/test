cache-expiration-time-description=在幾分鐘內定義清除 SPA 緩存的時間。如果緩存在 SPA 導航期間不應過期，請使用零值。如果緩存應禁用，請使用負值。 (Automatic Translation)
cache-expiration-time-name=Cache 過期時間
custom-excluded-paths-description=定義 SPA 應忽略的自定義路徑。
custom-excluded-paths-name=自定義排除的路徑
disable-in-internet-explorer=互聯網瀏覽器中的禁用 SPA (Automatic Translation)
disable-in-internet-explorer-11=互聯網瀏覽器中的禁用 SPA 11 (Automatic Translation)
disable-in-internet-explorer-11-description=由於三叉星渲染引擎（IE11 使用）存在錯誤，當使用 SPA 進行頁面導航時，即使頁面寬度與這些查詢不匹配，也始終會在僅指定最小寬度或最大寬度查詢時應用媒體查詢。這也影響頁面上的第三方 iframes。禁用SPA來解決此問題。 (Automatic Translation)
disable-in-internet-explorer-description=為了解決三叉星渲染引擎（IE11 和 MSHTML 渲染引擎（由 Edge 使用）中的錯誤，使用 SPA 正確渲染頁面當前需要重新下載所有網頁導航上的所有 CSS 檔，以便所有 Internet Explorer 瀏覽器，這可能導致頁面在啟用 SPA 時載入速度比使用 SPA 禁用時慢。禁用SPA來解決此問題。 (Automatic Translation)
it-looks-like-this-is-taking-longer-than-expected=看起來這需要比預期更長的時間。
oops=Oops
request-timeout-description=以毫秒為單位，定義 SPA 請求逾時的時間。如果請求永遠不會逾時，則使用零值。
request-timeout-name=請求逾時時間
spa-configuration-description=要使此處所做的更改生效，您必須在儲存後重新載入瀏覽器頁面。
spa-configuration-name=前端 SPA 架構
user-notification-timeout-description=以毫秒為單位定義向使用者顯示通知的時長，表明請求比預期的長。如果不顯示通知，請使用零值。
user-notification-timeout-name=使用者通知逾時