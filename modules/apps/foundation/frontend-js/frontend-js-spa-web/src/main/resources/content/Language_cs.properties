cache-expiration-time-description=Definujte čas, v minutách, ve kterých není vymazána mezipaměť SPA. Použít hodnotu nula, pokud cache by nikdy nevyprší během navigace SPA. Pokud by měla být zakázána mezipaměť, použijte zápornou hodnotu. (Automatic Translation)
cache-expiration-time-name=Čas vypršení platnosti mezipaměti (Automatic Translation)
disable-in-internet-explorer=Disable SPA in Internet Explorer (Automatic Copy)
disable-in-internet-explorer-11=Disable SPA in Internet Explorer 11 (Automatic Copy)
disable-in-internet-explorer-11-description=Due to a bug in the Trident rendering engine (used by IE11), when SPA is used for page navigation, media queries will always be applied when only min-width or only max-width queries are specified, even if the page width does not match those queries. This also affects third-party iframes on the page. Disable SPA to work around this issue. (Automatic Copy)
disable-in-internet-explorer-description=In order to work around a bug in the Trident rendering engine (used by IE11) and MSHTML rendering engine (used by Edge), properly rendering the page with SPA currently requires re-downloading all CSS files on all page navigations for all Internet Explorer browsers, which can cause pages to load more slowly with SPA enabled than with SPA disabled. Disable SPA to work around this issue. (Automatic Copy)
it-looks-like-this-is-taking-longer-than-expected=Vypadá to, že to trvá déle, než bylo očekáváno. (Automatic Translation)
oops=Chybička se vloudila (Automatic Translation)
request-timeout-description=Definujte čas, v milisekundách, v nichž časový limit žádosti SPA. Použijte hodnotu nula, pokud žádost by měla nikdy časový limit. (Automatic Translation)
request-timeout-name=Čas časový limit požadavku (Automatic Translation)
spa-configuration-description=For changes made here to take effect, you must reload the browser page after saving. (Automatic Copy)
spa-configuration-name=Frontend SPA infrastruktura (Automatic Translation)
user-notification-timeout-description=Definujte čas, v milisekundách, v nichž je zobrazena oznámení uživateli, uvádějící, že žádosti trvá déle, než bylo očekáváno. Použijte hodnotu nula, pokud žádné oznámení by měla být zobrazena. (Automatic Translation)
user-notification-timeout-name=Časový limit upozornění uživatele (Automatic Translation)