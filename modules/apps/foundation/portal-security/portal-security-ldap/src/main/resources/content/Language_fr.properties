authentication-search-filter=驗證搜尋過濾器
authentication-search-filter-help=Entrer un filtre de recherche utilisé pour tester la validité de l'utilisateur. Les zones de texte @company_id@, @email_address@, @screen_name@, and @user_id@ sont remplacées par les valeurs correctes lors de l'execution.
autogenerate-user-password=自動產生使用者密碼
base-dn=基準DN
base-dn-help=La base DN spécifie le contexte de recherche initial pour les utilisateurs et il est optionnel.
base-provider-url=基準提供者網址
company-id=ID de l'Entreprise
connection-properties=Propriétés des connexions
contact-custom-mappings=Mappages personnalisés des contacts
contact-custom-mappings-help=Lors d'import et d'export d'utilisateurs, le portail utilisera ce mappage pour connecte les attributs d'utilisateur LDAP et les attributs personnalisés de contacts portail.
contact-mappings=Mappages des contacts
contact-mappings-help=Lors d'import et d'export d'utilisateurs, le portail utilisera ce mappage pour connecte les attributs d'utilisateur LDAP et les attributs de contacts portail.
create-role-per-group=為每個群組建立角色
default-user-password=預設使用者密碼
enable-group-cache=啟用群組 Cache
enable-import=啟用匯入
enable-import-on-startup=啟用於啟動時匯入
enable-user-password=啟用使用者密碼
enabled=Activé
error-password-age-keywords=錯誤：關鍵字密碼期限
error-password-expired-keywords=錯誤：關鍵字密碼到期
error-password-history-keywords=錯誤：關鍵字密碼歷史
error-password-not-changeable-keywords=錯誤：關鍵字密碼不可變更
error-password-syntax-keywords=錯誤：關鍵字密碼語法
error-password-trivial-text-keywords=Mots-clés de texte trivial de mot de passe d'erreur
error-user-lockout-keywords=錯誤：關鍵字使用者鎖定
export-enabled=使用者參數名稱
export-enabled-help=Paramètres pour exporter les utilisateur depuis le portail vers LDAP. Ceci permets un utilisateur de modifier son prénom, nom, etc. dans le portail et d'envoyer ces modification au serveur LDAP. Ce paramètre n'est pas utilisé à moins que la propriété "LDAPAuthConfiguration.enabled" est à true.
export-group-enabled=已啟用匯出群組
export-group-enabled-help=Affecter true à ceci si les groupes et leurs associations doivent être exportés depuis le portail vers LDAP. Ce paramètre n'est pas utilisé à moins que la propriété "LDAPAuthConfiguration.enabled" est affecté à true.
factory-initial=Initiale de l'usine
group-default-object-classes=群組預設物件類別
group-default-object-classes-help=Lorsqu'un groupe est exporté vers LDAP et ce groupe n'existe pas, ce groupe sera créé avec les classes suivantes d'objet par défaut.
group-mappings=Grouper les mappages
group-mappings-help=Lors d'import de groupes, le portail utilisera ce mappage pour connecter les attributs de groupes LDAP et les attributs de groupes d'utilisateur de portail.
group-search-filter=群組搜尋篩選器
group-search-filter-enabled=已啟用群組搜尋篩選器
group-search-filter-help=Si cette valeur est définie à vrai, le filtre de groupe sera appliqué, mais seulement aux groupes dans la base DN spécifié. Si cette valeur est définie à faux, le filtre ne sera pas appliqué et tous les groupes qui sont associés aux utilisateurs importés seront importés indépendamment de la base DN.
groups-dn=群組DN
groups-dn-help=Nouveaux groupes seront créées au DN spécifié. Ceci sera actif si la propriété "LDAPAuthConfiguration.enabled" et "LDAPExportConfiguration.enabled" sont à vrai.
import-create-role-per-group-help=Définir cette valeur à true si le portail doit créer automatiquement un rôle par groupe importé depuis LDAP. Ce rôle sera assigné au groupe pour que les utilisateurs puissent hériter ce rôle automatiquement quand ils sont associés à ce groupe.
import-group-cache-enabled-help=Spécifier quand les recherches de groupes DN seront mises en cache pendant l'import de LDAP et login. Si ceci est à vrai, alors il va accélérer l'import LDAP et login, mais les mises à jour d'attributs de groupes ne seront pas reconnues jusqu'à l'expiration de l'entrée de cache. La taille et le timeout de cache peuvent être confirmés pour le cache en utilisant le nom de cache "com.liferay.portal.security.exportimport.UserImporter".
import-interval=匯入間隔時間
import-lock-expiration-time-help=Définir le temps d'expiration du verrouillage de l'importation LDAP. Le temps d'expiration par défaut est d'un jour.
import-method=Méthode d'importation
import-method-help=Définir soit utilisateur ou groupe pour la méthode d'import. Si défini à utilisateur, le portail importe tous les utilisateurs et tous les groupes associés avec ces utilisateurs. Si défini à groupe, le portail importe tous les groupes et les utilisateurs associés avec ces groupes. Cette valeur doit être définie en basant sur comment le serveur LDAP stocke les informations de membre de groupe.
import-user-sync-strategy=Importer la stratégie de synchronisation d'utilisateur
ldap-auth-configuration-name=Auth LDAP
ldap-export-configuration-name=Exportation LDAP
ldap-import-configuration-name=Importation LDAP
ldap-server-configuration-name=LDAP伺服器
ldap-server-id=LDAP伺服器ID
lock-expiration-time=Temps d'expiration du verrouillage
method=方法
method-help=Définir soit bind soit password compare pour la méthode d'authentification LDAP. Bind es préféré pour la plupart de clients car ils ne soucieront pas de stratégie d'encryptage.
page-size=Taille de page
page-size-help=Définir la taille de page pour les serveurs annuaires qui supporte pagination. Cette valeur doit être 1000 ou moins pour le server Active Directory de Microsoft.
password-encryption-algorithm=密碼加密演算法
password-encryption-algorithm-help=Définir l'encryptage de mot de passe pour utiliser la comparaison de mots de passe pendant l'import and utiliser les mots de passe crypté pendant l'export. Comparer les mots de passe pendant l'import sera actif uniquement lorsque la propriété "LDAPAuthConfiguration.method" est à la valeur de password-compare. Si l'encryptage est à NONE, ce qui est la valeur par défaut, les mots de passe seront considéré comme du texte plain. L'algorithme SHA-512 n'est pas supporté pour le moment.
password-policy-enabled=啟用密碼政策
password-policy-enabled-help=Réglez ce paramètre sur vrai pour utiliser la police de mot de passe de LDAP à la place de la police de mot de passe du portail. Si le paramètre est sur vrai, il est possible que les mots de passe générés par le portail ne correspondent pas à la politique LDAP. Consultez les propriétés "passwords.regexptoolkit.*" pour obtenir des détails sur la configuration de RegExpToolkit afin de générer ces mots de passe. Veuillez noter que si vous activez ce paramètre, le portail ne vérifiera pas les mots de passe valides, les mots de passe expirés et les utilisateurs verrouillés. Tout cela sera géré par la police de mot de passe du serveur LDAP.
range-size=Taille de la portée
range-size-help=Définir le nombre de valeur à retourner dans chaque requête à un attribut multivalué pour les serveurs d'annuaire qui supportent la récupération de gamme. La taille de gamme doit être 1000 ou moins pour Windows 2000 ou 1500 ou moins pour Windows Server 2003.
referral=Référence
required=必須的
security-credential=Informations d'identification de sécurité
security-principal=Rôle principal de sécurité
server-name=伺服器名稱
system-ldap-configuration-name=Système LDAP
user-custom-mappings=使用者自定義映射
user-custom-mappings-help=Lors de l'import et de l'export d'utilisateur, le portail utilisera ce mappage pour connecter les attributs utilisateur LDAP and les attributs personnalisés d'utilisateur de portail.
user-default-object-classes=使用者預設物件類別
user-default-object-classes-help=Quand un utilisateur est exporté vers LDAP et l'utilisateur n'existe pas, l'utilisateur sera créé avec les classes d'objet par défaut.
user-ignore-attributes=使用者忽略屬性
user-ignore-attributes-help=Définir les attributs d'utilisateur qui sont contrôlé à partir du portail. Lors de l'ajout ou de mis à jour d'un utilisateur à partir de LDAP, ces attributs seront ignorés.
user-mappings=使用者映射
user-mappings-help=Lors de l'import et d'export d'utilisateurs, le portail utilisera ce mappage pour connecter les attributs d'utilisateur LDAP et les attribut d'utilisateur de portail.
user-search-filter=使用者搜尋篩選器
user-search-filter-help=Paramètres pour importer les utilisateur à partir de LDAP vers le portail. Ces paramètres ne sont pas utilisés à moins que la propriété "LDAPImportConfiguration.enabled" est définie à true.
users-dn=使用者DN
users-dn-help=Nouveaux utilisateurs seront créés dans le DN spécifié. Ceci sera actif si les propriété "LDAPAuthConfiguration.enabled" et "LDAPExportConfiguration.enabled" sont définies à true.