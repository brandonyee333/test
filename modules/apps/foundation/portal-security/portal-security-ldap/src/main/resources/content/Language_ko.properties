password-policy-enabled-help=포털 암호 정책 대신 LDAP의 암호 정책을 사용하도록 이 설정합니다. true로 설정하면 포털에서 생성된 암호가 LDAP 정책과 일치하지 않을 수 있습니다. 이러한 암호를 생성하는 RegExpToolkit 구성에 대한 자세한 내용은 "passwords.regexptoolkit.*" 속성을 참조하십시오. 이 옵션을 사용하도록 설정하면 포털에서 유효한 암호, 만료된 암호 또는 잠긴 사용자를 확인하지 않습니다. 이제 LDAP 서버의 암호 정책에 의해 처리됩니다. (Automatic Translation)
