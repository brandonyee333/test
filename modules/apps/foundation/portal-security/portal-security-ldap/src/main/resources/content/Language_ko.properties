password-encryption-algorithm-help=가져오기 중에 암호를 비교하고 내보내기 중에 암호를 암호화하는 데 사용할 암호 암호화를 설정합니다. 가져오기 중에 암호를 비교하는 것은 속성 "LDAPAuthConfiguration.method"가 암호 비교로 설정된 경우에만 사용됩니다. 암호화가 기본 값인 NONE으로 설정된 경우 암호는 일반 텍스트로 간주됩니다. SHA-512 알고리즘은 현재 지원되지 않습니다. (Automatic Translation)
