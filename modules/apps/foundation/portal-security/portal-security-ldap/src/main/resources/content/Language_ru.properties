authentication-search-filter=Фильтр поиска при аутентификации
authentication-search-filter-help=Введите фильтр поиска, который используется для проверки достоверности пользователя. Токены @company_id@, @email_address@, @screen_name@ и @user_id@ заменяются при запуске правильными значениями. (Automatic Translation)
