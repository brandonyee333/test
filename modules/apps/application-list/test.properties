    modified.files.includes[relevant][application-list-rule]=**

    relevant.rule.names=\
        application-list-rule

    test.batch.names[relevant][application-list-rule]=\
        functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][application-list-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][application-list-rule]=\
        (portal.acceptance == true) AND \
        (testray.main.component.name ~ "Control Menu")

