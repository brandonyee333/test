##
## Test Suites
##


	modified.files.includes[relevant][click-to-chat-rule]=**

	relevant.rule.names=\
		click-to-chat-rule

	test.batch.names[relevant][click-to-chat-rule]=\
		functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][click-to-chat-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][click-to-chat-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Click to Chat") OR \
            (testray.main.component.name ~ "Click to Chat")\
        )

##
## Testray
##

    testray.main.component.name=Click to Chat