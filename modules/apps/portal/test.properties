##
## Test Suites
##


	modified.files.includes[relevant][portal-rule]=**

	relevant.rule.names=\
		portal-rule

	test.batch.names[relevant][portal-rule]=\
		functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-rule]=\
        (\
            (portal.acceptance == true) AND \
            (\
                (testray.component.names ~ "Document Management") OR \
                (testray.main.component.name == "Forms") OR \
                (testray.main.component.name ~ "Document Management")\
            )\
        ) OR \
        (testray.main.component.name == "Bundle Blacklist") OR \
        (\
            (license.required != "true") AND \
            (testray.main.component.name == "Clustering")\
        )

##
## Testray
##

    testray.main.component.name=Portal Services