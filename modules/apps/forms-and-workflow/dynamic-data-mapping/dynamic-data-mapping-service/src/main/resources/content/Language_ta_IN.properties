enable-legacy-ddm-index-fields-description=如果選中，將在索引中創建使用動態資料映射欄位的結構 ID 的舊名稱。更改此配置後，需要執行完整重新索引。
small-image-extensions-description=அனுமதிக்கப்பட்ட கோப்பு நீட்டிப்புகளை வேண்டும் வார்ப்புருவில் அமைக்கவும். ஒரு கோப்பு விரிவாக்கம் * கோப்பு நீட்டிப்புகளை அனுமதிக்கும்.
small-image-max-size-description=வேண்டும் வார்ப்புருவில் அதிகபட்ச கோப்பு அளவு பைட்களில் அமைக்கவும். 0 மதிப்பு வரம்பற்ற கோப்பு அளவு குறிக்க பயன்படுகிறது.