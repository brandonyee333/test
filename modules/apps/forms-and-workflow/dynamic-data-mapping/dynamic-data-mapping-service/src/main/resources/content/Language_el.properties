enable-legacy-ddm-index-fields-description=Εάν ενεργοποιηθεί, τα ονόματα παλαιού τύπου που χρησιμοποιούν το αναγνωριστικό δομής των πεδίων δυναμικής αντιστοίχισης δεδομένων θα δημιουργηθούν στο ευρετήριο. Είναι απαραίτητο να εκτελέσετε ένα πλήρες reindex μετά την αλλαγή αυτής της ρύθμισης παραμέτρων. (Automatic Translation)
small-image-extensions-description=Ορίστε τις επιτρεπόμενες επεκτάσεις αρχείων για εικόνες προτύπων. Μια επέκταση αρχείου * θα επιτρέψει όλες τις επεκτάσεις αρχείων. (Automatic Translation)
small-image-max-size-description=Ορίστε το μέγιστο μέγεθος αρχείου για εικόνες προτύπων σε byte. Μια τιμή 0 μπορεί να χρησιμοποιηθεί για να υποδείξει απεριόριστο μέγεθος αρχείου. (Automatic Translation)