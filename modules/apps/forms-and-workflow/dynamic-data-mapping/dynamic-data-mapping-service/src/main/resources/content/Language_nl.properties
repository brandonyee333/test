ddm-indexer-configuration-name=Dynamische datamappingindexer
ddm-service-configuration-name=Dynamische gegevensindeling service
enable-legacy-ddm-index-fields=Oudere indexvelden voor dynamische datamapping inschakelen
enable-legacy-ddm-index-fields-description=Indien geselecteerd, worden de overgenomen namen die de structuur-ID van dynamische velden voor datamapping gebruiken, aangemaakt in de index. Na wijziging van deze configuratie moet een nieuwe indexering worden uitgevoerd.
small-image-extensions-description=Stel de toegestane bestandsextensies voor sjabloonafbeeldingen in. Een bestandsextensie van * staat alle bestandsextensies toe.
small-image-max-size-description=Stel de maximale bestandsgrootte voor sjabloonafbeeldingen in bytes. Een waarde van 0 kan gebruikt worden om een onbeperkte bestandsgrootte aan te geven.