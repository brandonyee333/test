ddm-indexer-configuration-name=Dynamischer Indexer für die Datenzuordnung
ddm-service-configuration-name=Dynamische Datenzuordnungen, Service
enable-legacy-ddm-index-fields=Legacy-Indexfelder der dynamischen Datenzuordnungen aktivieren
enable-legacy-ddm-index-fields-description=Ist diese Option ausgewählt, werden die Legacynamen, die die Struktur-ID der Felder der dynamischen Datenzuordnung verwenden, im Index erstellt. Nach Änderung dieser Konfiguration ist es erforderlich, eine vollständige Neuindizierung durchzuführen.
small-image-extensions-description=Geben Sie die erlaubten Dateierweiterungen für Vorlagenbilder an. Die Angabe von * erlaubt alle Dateierweiterungen.
small-image-max-size-description=Geben Sie die maximale Dateigröße für Vorlagenbilder an. Der Wert 0 kann verwendet werden, um beliebig große Dateien zu erlauben.