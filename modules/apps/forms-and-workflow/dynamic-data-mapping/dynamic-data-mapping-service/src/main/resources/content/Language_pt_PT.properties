ddm-indexer-configuration-name=動態資料映射索引器
ddm-service-configuration-name=Serviço de mapeamento de dados dinâmicos
enable-legacy-ddm-index-fields=啟用舊的動態資料映射索引欄位
enable-legacy-ddm-index-fields-description=如果選中，將在索引中創建使用動態資料映射欄位的結構 ID 的舊名稱。更改此配置後，需要執行完整重新索引。
small-image-extensions-description=Estabelece as extensões de ficheiros permitidas para imagens nos templates. A extensão * vai permitir todas as extensões de ficheiros.
small-image-max-size-description=Estabelece o tamanho máximo de um ficheiro para imagens nos templates em bytes. O valor 0 pode ser utilizado para indicar tamanho ilimitado.