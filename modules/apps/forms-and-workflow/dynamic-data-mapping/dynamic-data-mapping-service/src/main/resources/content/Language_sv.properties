ddm-indexer-configuration-name=Indexerare för dynamisk datamappning
ddm-service-configuration-name=Tjänst för dynamisk datamappning
enable-legacy-ddm-index-fields=Aktivera äldre indexfält för dynamisk datamappning
enable-legacy-ddm-index-fields-description=Om detta markeras kommer äldre namn som använder struktur-ID för dynamiska datamappningsfält att skapas i index. Det är nödvändigt att genomföra fullständig omindexering efter att denna konfiguration ändras.
small-image-extensions-description=Ange tillåtna filtillägg för mallbilder. Ett filtillägg med * tillåter alla filtillägg.
small-image-max-size-description=Ange maximal filstorlek för mallbilder i byte. Ett värde med 0 kan användas för att indikera en obegränsad filstorlek.