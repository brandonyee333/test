small-image-extensions-description=Đặt phần mở rộng tệp được phép cho hình ảnh mẫu. Phần mở rộng tệp * sẽ cho phép tất cả các phần mở rộng tệp. (Automatic Translation)
small-image-max-size-description=Đặt kích thước tệp tối đa cho hình ảnh mẫu theo byte. Giá trị 0 có thể được sử dụng để chỉ kích thước tệp không giới hạn. (Automatic Translation)