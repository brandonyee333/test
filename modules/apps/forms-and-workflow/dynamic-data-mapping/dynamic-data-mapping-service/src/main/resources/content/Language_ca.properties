ddm-indexer-configuration-name=Indexador de mapatge dinàmic de dades
ddm-service-configuration-name=Servei de mapeig de dades dinàmic
enable-legacy-ddm-index-fields=Habilita els camps de l'índex de mapatge dinàmic de dades heretades
enable-legacy-ddm-index-fields-description=Si se selecciona aquesta opció, els noms heretats que utilitzin l'ID d'estructura dels camps de mapatge dinàmic de dades es crearan a l'índex. És necessari executar una reindexació completa després de canviar aquesta configuració.
small-image-extensions-description=Estableix les extensions de fitxers permeses per imatges de plantilla. Una extensió de fitxer com * permetrà qualsevol extensió de fitxer.
small-image-max-size-description=Estableix el tamany màxim, en bytes, per a les imatges de plantilla. Es pot utilitzar un valor de 0 per indicar un tamany de fitxer ilimitat.