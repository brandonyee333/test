enable-legacy-ddm-index-fields=विरासत गतिशील डेटा मैपिंग इंडेक्स फ़ील्ड को सक्षम करें (Automatic Translation)
enable-legacy-ddm-index-fields-description=यदि चेक किया जाता है, तो इंडेक्स में डायनेमिक डेटा मैपिंग फ़ील्ड की संरचना आईडी का उपयोग करके विरासत के नाम बनाए जाएंगे. इस कॉन्फिग्रेशन को बदलने के बाद एक पूर्ण हिरन का काम करना जरूरी है। (Automatic Translation)
small-image-extensions-description=टेम्पलेट छवियों के लिए अनुमति फ़ाइल एक्सटेंशन सेट करें। * का एक फ़ाइल विस्तार सभी फ़ाइल एक्सटेंशन की अनुमति देगा। (Automatic Translation)
small-image-max-size-description=बाइट में टेम्पलेट छवियों के लिए अधिकतम फ़ाइल आकार सेट करें। असीमित फ़ाइल आकार को इंगित करने के लिए 0 के मूल्य का उपयोग किया जा सकता है। (Automatic Translation)