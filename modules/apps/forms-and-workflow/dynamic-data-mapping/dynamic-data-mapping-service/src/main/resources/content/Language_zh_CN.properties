ddm-indexer-configuration-name=动态数据映射索引器
ddm-service-configuration-name=动态数据映射服务
enable-legacy-ddm-index-fields=启用旧动态数据映射索引字段
enable-legacy-ddm-index-fields-description=如果选中，将在索引中创建使用动态数据映射字段的结构 ID 的旧名称。更改此配置后，需要执行完整重新索引。
small-image-extensions-description=为模板图像设置允许的文件扩展名。* 文件扩展名将允许所有文件扩展名。
small-image-max-size-description=以字节为单位设置模板图像的最大文件大小。值为0可用于指示无限制的文件大小。