ddm-indexer-configuration-name=動的データマッピング Web インデクサー
ddm-service-configuration-name=動的データマッピングサービス
enable-legacy-ddm-index-fields=旧形式の動的データマッピングインデックスフィールドを有効にする
enable-legacy-ddm-index-fields-description=チェックがついている場合は、動的データマッピングフィールドのストラクチャーIDを使用する旧形式の名前がインデックス内に作成されます。この設定を変更した後は、全インデックスの再インデックスを実行する必要があります。
small-image-extensions-description=テンプレート画像用に許可するファイル拡張子をセットしてください。*(アスタリスク）を指定すると、すべての拡張子を許可します。
small-image-max-size-description=テンプレート画像用の最大ファイルサイズをバイトで指定してください。0を指定すると、ファイルサイズの制限は無制限となります。