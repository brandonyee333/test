there-are-template-references-to-this-structure.-please-update-them-if-a-field-name-is-renamed-or-removed=Hiện đang có Biểu mẫu sử dụng Cấu trúc này. Bạn hãy cập nhật chúng nếu tên đã bị đổi tên hoặc gỡ bỏ.
