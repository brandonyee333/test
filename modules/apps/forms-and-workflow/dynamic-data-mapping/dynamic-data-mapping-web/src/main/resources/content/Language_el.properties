the-structure-cannot-be-deleted-because-it-is-required-by-one-or-more-structure-links=Δεν είναι δυνατή η διαγραφή της δομής, επειδή απαιτείται από μία ή περισσότερες συνδέσεις δομής. (Automatic Translation)
the-structure-cannot-be-deleted-because-it-is-required-by-one-or-more-templates=Δεν είναι δυνατή η διαγραφή της δομής, επειδή απαιτείται από ένα ή περισσότερα πρότυπα. (Automatic Translation)
the-template-cannot-be-deleted-because-it-is-required-by-one-or-more-template-links=Δεν είναι δυνατή η διαγραφή του προτύπου, επειδή απαιτείται από μία ή περισσότερες συνδέσεις προτύπου. (Automatic Translation)
there-are-template-references-to-this-structure.-please-update-them-if-a-field-name-is-renamed-or-removed=Υπάρχουν αναφορές προτύπου σε αυτήν τη δομή. Ενημερώστε τα εάν ένα όνομα πεδίου μετονομαστεί ή καταργηθεί. (Automatic Translation)
