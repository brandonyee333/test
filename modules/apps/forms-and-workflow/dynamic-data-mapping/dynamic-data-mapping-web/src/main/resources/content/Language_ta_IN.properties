template-key-help=இந்த டெம்ப்ளேட்டை மற்றொரு டெம்ப்ளேட்டில் திட்டவட்டமாக சேர்க்க டெம்ப்ளேட் வார்ப்புரு பயன்படுத்தப்படலாம்.
the-structure-cannot-be-deleted-because-it-has-one-or-more-substructures=Structure ஒன்று அல்லது அதற்கு மேற்பட்ட substructures கொண்டிருப்பதால் அதை நீக்க முடியாது.
the-structure-cannot-be-deleted-because-it-is-required-by-one-or-more-structure-links=Structure நீக்க முடியாது, ஏனெனில் ஒன்று அல்லது அதற்கு மேற்பட்ட structure இணைப்புகள் தேவைப்படுகிறது.
the-structure-cannot-be-deleted-because-it-is-required-by-one-or-more-templates=Structure நீக்க முடியாது, ஏனெனில் இது ஒன்று அல்லது அதற்கு மேற்பட்ட templates தேவைப்படுகிறது.
the-template-cannot-be-deleted-because-it-is-required-by-one-or-more-template-links=டெம்ப்ளேட்டை நீக்க முடியாது, ஏனெனில் ஒன்று அல்லது அதற்கு மேற்பட்ட டெம்ப்ளேட் இணைப்புகள் தேவைப்படுகிறது.
there-are-template-references-to-this-structure.-please-update-them-if-a-field-name-is-renamed-or-removed=இந்த அமைப்புக்கான டெம்ப்ளேட் குறிப்புகள் உள்ளன. ஒரு பெயரின் பெயர் மறுபெயரிடப்பட்டால் அல்லது நீக்கப்பட்டால் அவற்றை புதுப்பிக்கவும்.
this-is-a-collection-of-fields=இது புலங்களின் தொகுப்பாகும்.
