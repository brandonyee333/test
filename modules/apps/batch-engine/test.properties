##
## Test Suites
##


	modified.files.includes[relevant][batch-engine-rule]=**

	relevant.rule.names=\
		batch-engine-rule

	test.batch.names[relevant][batch-engine-rule]=\
		functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][batch-engine-rule]}

    #
    # Relevant
    #

    test.batch.class.names.includes[relevant][batch-engine-rule]=\
        **/batch-engine/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][batch-engine-rule]=\
        (portal.acceptance == true) AND \
        (testray.main.component.name == "Headless Batch Engine API")

