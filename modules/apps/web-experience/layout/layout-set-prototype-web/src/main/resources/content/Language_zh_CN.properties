allow-site-administrators-to-modify-pages-associated-with-this-site-template-help=設定此以允許站台管理員增加，移除或配置應用程式和改變頁面屬性。如果站台管理員修改一個頁面，改變到原始站點版型頁面不會被傳播。如果這個選項被設定，經由頁面管理工具從指定頁面修改可能不允許。
