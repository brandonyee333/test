terms-of-use-web-content=வெப் கன்டன்ட் உபயோகிப்பதன் விதிமுறைகள்
terms-of-use-web-content-help=பயன்பாட்டு விதிமுறைகள் என காட்டப்படும் web Content-ன் Group ஐடி மற்றும் article ஐடியை குறிப்பிடவும். Web Content குறிப்பிடப்படவில்லை என்றால் default text பயன்படுத்தப்படும்.
the-content-references-a-missing-file-entry=Content ஒரு missing file entry-யை குறிப்பிடுகிறது.
the-content-references-a-missing-page=Content ஒரு விடுபட்ட பக்கத்தை குறிப்பிடுகிறது.
the-display-page-cannot-be-set-when-the-scope-of-the-web-content-is-a-page=The display page cannot be set when the scope of the web content is a page.
the-folder-you-selected-does-not-allow-this-type-of-structure.-please-select-a-different-folder=நீங்கள் தேர்ந்தெடுக்கப்பட்ட ஃபோல்டரை இந்த வகை அமைப்பு அனுமதிக்காது. வேறொரு ஃபோல்டரைத் தேர்ந்தெடுக்கவும்.
the-structure-you-selected-is-not-valid-for-this-folder=நீங்கள் தேர்ந்தெடுத்த ஸ்டெக்சர் இந்த ஃபோல்டருக்கு செல்லுபடியாகாது.
the-version-that-is-going-to-be-edited-is-not-the-one-shown-because-recent-versions-have-been-created-on-top-of-it=The version that is going to be edited is not the one shown because recent versions have been created on top of it.
there-is-no-web-content-with-structure-x=<em>{0}</em> இந்த ஸ்டெக்சரில் எந்த வெப் கன்டன்டும் இல்லை.
this-application-is-not-visible-to-users-yet=இந்த அப்ளிகேஷன் பயனர்களுக்கு மறைக்கப்பட்டிருக்கிறது
this-content-has-expired-or-you-do-not-have-the-required-permissions-to-access-it=இந்த content காலாவதியானது அல்லது அதை அணுகுவதற்கு தேவையான அனுமதிகள் உங்களிடம் இல்லை.
this-structure-has-not-been-saved=இந்த ஸ்டெக்சர் சேமிக்கப்படவில்லை.
unable-to-validate-referenced-file-entry-because-it-cannot-be-found-with-the-following-parameters-x=குறிப்பிடப்பட்ட referenced file entry-யைச் சரிபார்க்க முடியவில்லை, ஏனெனில் பின்வரும் parameters-களுடன் இது கண்டறியப்படவில்லை: {0}.
unable-to-validate-referenced-page-because-it-cannot-be-found-with-url-x=பரிந்துரைக்கப்பட்ட பக்கத்தைச் சரிபார்க்க முடியவில்லை, ஏனெனில் இது URL உடன் {0} காணப்படவில்லை.
unable-to-validate-referenced-page-because-the-page-group-with-id-x-cannot-be-found=குறிப்பிடப்பட்ட பக்கத்தைச் சரிபார்க்க முடியவில்லை, ஏனெனில் id {0}, பக்கத்துடன் கூடிய page group காணப்படவில்லை.
use-a-specific-template=குறிப்பிட்ட டெம்ப்ளேட்டை பயன்படுத்து.
use-default-template=இயல்பாக கிடைக்கும் டெம்ப்ளேட்டை பயன்படுத்து
use-default-template-x=இயல்பாக கிடைக்கும் டெம்ப்ளேட்டை பயன்படுத்து: {0}
