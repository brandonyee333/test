you-cannot-apply-the-selected-structure-restrictions-for-this-folder.-at-least-one-web-content-references-another-structure=இந்த ஃபோல்டரிலுள்ள தேர்ந்தெடுக்கப்பட்ட ஸ்டெக்சர் கட்டுப்பாடுகளை நீங்கள் பயன்படுத்த முடியாது. குறைந்தபட்சம் ஒரு web content, ஒரு ஸ்டெக்சரைக் குறிப்பிடுகிறது.
you-do-not-have-the-roles-required-to-access-this-web-content-entry=இந்த வெப் கன்டன்ட் என்ட்ரியை அணுகுவதற்கு தேவையான Roles-கள் உங்களிடம் இல்லை.
you-have-exceeded-the-maximum-web-content-size-allowed=வெப் கன்டன்டின் அளவு குறிப்பிட்ட அளவினை விடவும் அதிகமாக உள்ளது.