validate-journal-feed-references-help=Если проверено, публикации или импорта некоторых типов контента с текстом в них приведет Liferay, чтобы проверить содержание для любых ссылок на веб-каналы контента, и убедитесь, что каждый из этих ссылок указывает на действительный канал. (Automatic Translation)
validate-layout-references=Проверка рекомендаций Layout (Automatic Translation)
validate-layout-references-help=Если проверено, публикации или импорта некоторых типов контента с текстом в них вызовет Liferay, чтобы проверить содержание для любых ссылок, которые ссылаются на один из виртуальных хостов портала, и убедитесь, что каждый из этих ссылок указывает на действительную страницу в Liferay. Снимите это, если ваш виртуальный хост имеет страницы не в Liferay. (Automatic Translation)
validate-missing-references=Проверка отсутствующих ссылок (Automatic Translation)
validate-missing-references-help=Если проверено, публикация или импорт приведет к тому, что Liferay проверит недостающие ссылки. Снимите это, если вы импортируете несколько сайтов, ссылающихся друг на друга. Когда эта проверка пропущена, возможно, что некоторые содержимое будет связано неправильно. (Automatic Translation)
