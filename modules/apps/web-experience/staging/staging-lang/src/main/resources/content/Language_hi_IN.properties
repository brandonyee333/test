validate-journal-feed-references-help=यदि उनमें टेक्स्ट के साथ कुछ प्रकार की सामग्री की जांच, प्रकाशन या आयात करने से लाइफरे को वेब सामग्री फ़ीड के किसी भी संदर्भ के लिए सामग्री की जांच करने का कारण बनेगा, और यह सुनिश्चित करना होगा कि इनमें से प्रत्येक संदर्भ एक वैध फ़ीड को इंगित करता है। (Automatic Translation)
validate-layout-references=लेआउट संदर्भ मान्य करें (Automatic Translation)
validate-layout-references-help=यदि उनमें टेक्स्ट के साथ कुछ प्रकार की सामग्री की जांच, प्रकाशन या आयात करने से लाइफरे को पोर्टल के वर्चुअल होस्ट में से किसी एक को संदर्भित करने वाले किसी भी लिंक के लिए सामग्री की जांच करने का कारण बनेगा, और यह सुनिश्चित करें कि इनमें से प्रत्येक लिंक लाइफरे के भीतर एक वैध पृष्ठ पर इंगित करता है। यदि आपके वर्चुअल होस्ट में लाइफरे में पृष्ठ नहीं हैं तो इसे अनचेक करें। (Automatic Translation)
validate-missing-references=लापता संदर्भों को मान्य करें (Automatic Translation)
validate-missing-references-help=यदि चेक किया जाता है, प्रकाशन या आयात करने से लाइफरे को लापता संदर्भों की जांच करने का कारण बनेगा। यदि आप एक दूसरे को संदर्भित करने वाली कई साइटों का आयात कर रहे हैं तो इसे अनचेक करें। जब यह चेक छोड़ दिया जाता है, तो संभव है कि कुछ सामग्री गलत तरीके से लिंक की जाएगी। (Automatic Translation)
