validate-file-entry-references-help=यदि उनमें टेक्स्ट के साथ कुछ प्रकार की सामग्री की जांच, प्रकाशन या आयात किया जाता है, तो लाइफरे को दस्तावेज़ों के किसी भी लिंक के लिए सामग्री की जांच करने का कारण बनेगा, और यह सुनिश्चित करेगा कि इनमें से प्रत्येक लिंक एक वैध दस्तावेज़ को इंगित करता है। (Automatic Translation)
