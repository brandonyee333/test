staged-portlets-alert=Ak je portlet označený, jeho dáta sa kopírujú do prípravy a môže byť nemožné ich editovať priamo na produkcii. Keď rušíte označenie, uistite sa najprv, že všetky zmeny z prípravy sú publikované na produkcii, inak by ste o ne mohli prísť.
staged-portlets-help=Portlety, ktoré sú označené sú <em>Predpripravované</em>. To znamená, že ich dáta sú publikované automaticky kedykoľvek je stránka, ktorá ich obsahuje, publikovaná. Tie portlety, ktoré sú zakázané a označené, sú vždy automaticky exportované dokonca aj keď nie sú na stránke. Tie, ktoré sú zakázané a nie označené, nie sú nikdy publikované. <em>Kolaboračné</em> portlety, ako napríklad <em>Blogy</em>, <em>Fórum</em> alebo <em>Wiki</em>, sú vyňaté z prípravy od začiatku, pretože ich dáta typicky vznikajú na produkcii. Zhrnuté, keď portlet <em>NIE je predpripravovaný</em> tak <em>produkčné</em> prostredie obsahuje iba dôležité údaje. Keď je použité lokálne produkčné prostredie, tak sa zobrazia rovnaké dáta na oboch prostrediach.
staging-cannot-be-used-for-this-site-because-the-propagation-of-changes-from-the-site-template-is-enabled=Pre toto sídlo sa nedá použiť predpríprava pretože je povolené propagovanie zmien zo šablóny sídla.
