staged-portlets-help=Les portlets qui sont marquées sont <em>Stagées</em>. Cela signifie que leurs données sont publiées automatiquement quand une page les contenant est publiée. Les portlets qui sont désactivées et marquées sont toujours exportées automatiquement, même si elles ne sont pas dans la page. Celles qui sont désactivées et ne sont pas marquées ne sont jamais publiées automatiquement. Portlet de <em>Collaboration</em>, telles que <em>Blogs</em>, <em>Forum</em>, et <em>Wiki</em> sont exclues de <em>Stagées</em> par défaut car leurs données se produisent typiquement en production. Effectivement, quand une portlet est <em>non Stagée</em>, l'environnement de <em>Production</em> contient seulement les données importantes. Quand <em>Local Live</em> Staging est utilisé, les mêmes données sont affichées indépendamment de l'environnement.
