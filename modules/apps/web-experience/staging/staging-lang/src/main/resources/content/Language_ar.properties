validate-file-entry-references-help=في حالة الاختيار، فإن نشر أو استيراد بعض أنواع المحتوى التي بها نص بداخلها سوف يتسبب في فحص Liferay to للمحتوى بحثا عن أي ارتباطات للمستندات، ويضمن أن كل واحد من هذه الارتباطات يشير إلى مستند صالح.
validate-journal-feed-references=التحقق من صحة تفضيلات تغذية دفتر اليومية
validate-journal-feed-references-help=في حالة الاختيار، فإن نشر أو استيراد بعض أنواع المحتوى التي بها نص بداخلها سوف يتسبب في فحص Liferay to للمحتوى بحثا عن أي تفضيلات لتغذية محتوى الويب، ويضمن أن كل واحد من هذه التفضيلا يشير إلى تغذية صالحة.
validate-layout-references=التحقق من مراجع التخطيط
validate-layout-references-help=إذا تم تحديد هذا الخيار، فإن نشر أو استيراد بعض أنواع المحتويات التي تحتوي على نصوص سيؤدي إلى تحقق Liferay من المحتوى لأي ارتباطات تشير إلى أحد المضيفات الظاهرية الخاصة بالموقع، والتأكد من أن جميع هذه الارتباطات يشير إلى صفحة صالحة ضمن Liferay. قم بإلغاء تحديده إذا كان مضيفك الافتراضي يحتوي على صفحات غير موجودة في Liferay.
validate-missing-references=التحقق من المراجع المفقودة
validate-missing-references-help=في حالة الاختيار، فإن النشر أو التصدير سوف يجعل Liferay يفحص المراجع المفقودة. قم بإلغاء اختياره إذا كنت تقوم باستيراد عدة مواقع تشير إلى بعضها البعض. عند تخطي هذا الاختيار، فمن الممكن ارتباط بعض المحتويات بشكل غير صحيح.
