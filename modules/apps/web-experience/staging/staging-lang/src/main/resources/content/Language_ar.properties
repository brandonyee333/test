staged-portlets-alert=عندما يتم تحديد مدخل بوابة، يتم نسخ بياناته إلى التجهيز ومن الممكن تحريره مباشرة عند البث المباشر. وعند إلغاء تحديد مدخل بوابة، تأكد من نشر أي تغييرات تم إجراؤها أثناء التجهيز أولاً، وإلا فقد يتم فقدها.
staged-portlets-help=يتم تعليم مداخل البوابة بأنها <em>مجهزة</em>. وهذا يعني أن بياناتها يتم نشرها تلقائيًا كلما تم نشر صفحة تحتوي عليها. ويتم تعطيل مداخل البوابة هذه وتعليمها دائمًا للتصدير تلقائيًا، حتى إذا لم تكن موجودة في الصفحة. ولا يتم أبدا نشر تلك التي تم تعطيلها وإلغاء تعليمها تلقائيًا. ويتم استبعاد مداخل بوابة <em>التعاون</em>، مثل <em>المدونات</em> و<em>لوحات الرسائل</em> و<em>ويكي </em>من حالة كونها <em>مجهزة</em> بشكل افتراضي نظرًا لأن البيانات الخاصة بها تبدأ في البث. وبشكل فعّال، عندما <em>لا يتم تجهيز</em> مدخل بوابة فإن بيئة <em>البث</em> تحتوي فقط على البيانات الهامة. وعند استخدام تجهيز <em>البث المحلي</em>، يتم عرض نفس البيانات عند عرض التطبيق من أي بيئة.
