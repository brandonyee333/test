staged-portlets-alert=ஒரு போர்ட்லெட் சரிபார்க்கப்படும்போது, ​​அதன் data ஸ்டேஜிங் செய்யப்பட்டு, அவற்றை லைவ்வில் நேரடியாக திருத்த முடியாது. போர்ட்லெட்டைத் தேர்வு செய்யாதபோது, ஸ்டேஜிங்கில் ​​நடத்தப்பட்ட எந்த மாற்றங்களும் முதலில் வெளியிடப்படும், இல்லையெனில் அவை இழக்கப்படலாம் என்பதை உறுதிப்படுத்தவும்.
staged-portlets-help=Portlets被標示為<em>已階段</em>，表示它們的資料被自動出版不管包含它們的頁面是否出版。那些Portlet被停用且被標示總是自動匯出，即使它們不在頁面上。那些被停用且被標示絕不自動出版。<em>協同作業</em>Portlet，如<em>部落格</em>、<em>討論版</em>和<em>Wiki</em>會包含在被<em>已階段</em>， 預設它們的資料會在Live中產生。有效率地，當一個Portlet在<em>Live</em>的<em>非已階段</em>只包含重要資料。當<em>本地Live</em>階段被使用，不管從哪個環境檢視這Portlet，會顯示相同資料。
staging-cannot-be-used-for-this-site-because-the-propagation-of-changes-from-the-site-template-is-enabled=階段不能被這站台使用因為從這站台版型的修改傳遞已經啟用。
