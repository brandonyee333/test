there-are-no-saved-export-templates=Δεν υπάρχουν αποθηκευμένα πρότυπα εξαγωγής. (Automatic Translation)
there-are-no-saved-publish-templates=Δεν υπάρχουν αποθηκευμένα πρότυπα δημοσίευσης. (Automatic Translation)
there-are-no-scheduled-publication-processes=Δεν υπάρχουν προγραμματισμένες διαδικασίες δημοσίευσης. (Automatic Translation)
this-file-was-previously-uploaded-but-not-actually-imported=Αυτό το αρχείο είχε μεταφορτωθεί προηγουμένως, αλλά δεν εισήχθη στην πραγματικότητα. (Automatic Translation)
this-portlet-has-not-been-added-to-the-live-page-publish-the-page-first=Αυτό το portlet δεν έχει προστεθεί στη ζωντανή σελίδα. Δημοσιεύστε τη σελίδα πρώτος.
this-portlet-is-placed-in-a-page-that-does-not-exist-in-the-live-site-publish-the-page-first=Αυτό το portlet βρίσκεται σε μια σελίδα που δεν υπάρχει στο site παραγωγή. Πρέπει πρώτα να δημοσιεύσετε την παρούσα σελίδα.
this-process-is-going-to-publish-the-changes-made-since-the-last-publication=Αυτή η διαδικασία πρόκειται να δημοσιεύσει τις αλλαγές που έγιναν από την τελευταία δημοσίευση. (Automatic Translation)
this-version-will-be-published-when-x-is-published-to-live=Αυτή η έκδοση θα δημοσιευτεί όταν το <em>{0}</em> δημοσιευτεί στο site παραγωγής.
unable-to-activate-remote-staging-on-site-with-id-x.-global-site-can-only-be-staged-to-another-global-site=Unable to activate remote staging on site with ID {0}. Global site can only be staged to another global site. (Automatic Copy)
unable-to-activate-remote-staging-on-site-with-id-x.-the-remote-live-site-must-be-different-from-the-stage-site=Unable to activate remote staging on site with ID {0}. The remote live site must be different from the stage site. (Automatic Copy)
