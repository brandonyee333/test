validate-file-entry-references-help=Εάν γίνει έλεγχος, η δημοσίευση ή η εισαγωγή ορισμένων τύπων περιεχομένου με κείμενο σε αυτά θα αναγκάσει το Liferay να ελέγξει το περιεχόμενο για τυχόν συνδέσμους προς έγγραφα και να διασφαλίσει ότι κάθε ένας από αυτούς τους συνδέσμους οδηγεί σε ένα έγκυρο έγγραφο. (Automatic Translation)
validate-journal-feed-references=Επικύρωση αναφορών τροφοδοσίας χρονικού (Automatic Translation)
validate-journal-feed-references-help=Εάν ενεργοποιηθεί, η δημοσίευση ή η εισαγωγή ορισμένων τύπων περιεχομένου με κείμενο σε αυτά θα αναγκάσει το Liferay να ελέγξει το περιεχόμενο για τυχόν αναφορές σε τροφοδοσίες περιεχομένου web και να διασφαλίσει ότι κάθε μία από αυτές τις αναφορές οδηγεί σε έγκυρη ροή. (Automatic Translation)
validate-layout-references=Επικύρωση αναφορών διάταξης (Automatic Translation)
validate-layout-references-help=Εάν ενεργοποιηθεί, η δημοσίευση ή η εισαγωγή ορισμένων τύπων περιεχομένου με κείμενο σε αυτά θα αναγκάσει το Liferay να ελέγξει το περιεχόμενο για τυχόν συνδέσμους που αναφέρονται σε έναν από τους εικονικούς κεντρικούς υπολογιστές της πύλης και να διασφαλίσει ότι κάθε ένας από αυτούς τους συνδέσμους οδηγεί σε μια έγκυρη σελίδα μέσα στο Liferay. Καταργήστε την επιλογή αυτού εάν ο εικονικός κεντρικός υπολογιστής σας έχει σελίδες που δεν βρίσκονται στο Liferay. (Automatic Translation)
validate-missing-references=Επικύρωση αναφορών που λείπουν (Automatic Translation)
validate-missing-references-help=Εάν ενεργοποιηθεί, η δημοσίευση ή η εισαγωγή θα αναγκάσει το Liferay να ελέγξει τις αναφορές που λείπουν. Καταργήστε την επιλογή αυτού εάν εισάγετε πολλές τοποθεσίες που αναφέρονται η μια στην άλλη. Όταν παραλειφθούν αυτές οι επιταγές, είναι πιθανό ορισμένα περιεχόμενα να μην συνδεθούν σωστά. (Automatic Translation)
view-page-staging-options=Προβολή επιλογών σταδιοποίησης σελίδας (Automatic Translation)
view-source=Προβολή προέλευσης (Automatic Translation)
