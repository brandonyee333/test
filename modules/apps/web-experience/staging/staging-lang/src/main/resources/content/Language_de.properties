staged-portlets-help=Ausgewählte Portlets sind dem Stagingprozess unterworfen. Das bedeutet, dass deren Daten automatisch publiziert werden, wenn eine diese Portlets enthaltende Seite publiziert wird. Lässt sich ein Portlet nicht abwählen, werden dessen Daten immer automatisch exportiert, auch wenn diese sich nicht auf einer Seite befinden. Portlets, die nicht ausgewählt werden können werden nicht publiziert. <em>Kollaborationsportlets</em>, wie <em>Blogs</em>, <em>Foren</em> und <em>Wikis</em> sind standardmäßig vom Stagingprozess ausgenommen, da deren Nutzdaten überlicherweise im Livesystem erstellt werden. Ist ein Portlet <em>nicht</em> dem Stagingprozess unterworfen, hält nur Livesystem wichtige Daten vor. Wird <em>lokales Staging</em> verwendet, werden in beiden Umgebungen die gleichen Daten dargestellt.
