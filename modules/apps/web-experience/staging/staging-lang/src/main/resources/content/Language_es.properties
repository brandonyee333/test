staged-portlets-alert=Cuando un portlet es seleccionado, sus datos son copiados en Staging y puede que no sea posible editarlos directamente en el ambiente Live. Al desmarcar un portlet, asegúrese de que cualquier cambio realizado en Staging sea publicado primero, de lo contrario podrían perderse.
staged-portlets-help=Los portlets que están marcados están <em>En Staging</em>. Esto significa que sus datos serán publicados automáticamente siempre que haya una página que los contenga y esté publicada. Esos portlets que están deshabilitados y marcados serán siempre exportados automáticamente, incluso si no están en la página. Aquellos que están desactivados y desmarcados nunca serán publicados automáticamente. Los portlets de <em>Colaboración</em>, tales como <em>Blogs</em>, <em>Foros</em> y <em>Wiki</em> son excluidos de <em>Staging</em> por defecto, porque sus datos vienen de Live. Efectivamente, cuando un portlet no está <em>En Staging</em> el ambiente <em>Live</em> contiene los únicos datos importante. Cuando el staging <em>Local Live</em> es utilizado, los mismos datos que son del portlet, son exhibidos con independencia del ambiente.
