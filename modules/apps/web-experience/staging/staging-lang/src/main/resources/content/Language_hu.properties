staged-portlets-alert=Amikor egy portlet ki van választva, az adatai átmásolódnak a stagingre, és esetleg nem lesz lehetséges a módosításuk az élesben. Ha eltávolítod a portlet kiválasztását, bizonyosodj meg arról, hogy a stagingen végrehajtott összes változtatás előbb ki legyen publikálva, különben azok elveszhetnek.
staged-portlets-help=A bejelölt portletek <em>Stage-elve</em> vannak. Ez azt jelenti, hogy az adataik automatikusan publikálódnak, amikor az őket tartalmazó oldal publikálásra kerül. Azok a portletek, amik le vannak tiltva és be vannak jelölve, mindig automatikusan exportálódnak, még akkor is, ha nincsenek rajta az oldalon. Azok, amik le vannak tiltva és nincsenek bejelölve, sosme lesznek automatikusan publikálva. Az <em>Együttműködés</em> portletek, mint a <em>Blogok</em>, <em>Fórumok</em> és <em>Wiki</em>, alapértelmezésben ki vannak véve a <em>Stage-elésből</em>, mivel az adataik jellemzően az Élesből származnak. Igazából, ha egy portlet <em>NEM Stage-elt</em>, az <em>Éles</em> környezet tartalmazza csak a fontos adatokat. Amikor a <em>Helyi éles</em> staging van használatban, ugyanaz az adat jelenítődik meg a portlet bármely környezetben történő megnézésekor.
