##
## Test Suites
##


	modified.files.includes[relevant][commerce-rule]=**

	relevant.rule.names=\
		commerce-rule

	test.batch.names[relevant][commerce-rule]=\
		playwright-js-tomcat90-mysql57-jdk8,\
		functional-tomcat90-mysql57-jdk8
##
## Playwright
##

    playwright.test.project[playwright-js-tomcat90-mysql57-jdk8][relevant][commerce-rule]=commerce


    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][commerce-rule]}

    #
    # Relevant
    #

    playwright.test.project[playwright-js-tomcat90-mysql57-jdk8][relevant][commerce-rule]=commerce

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][commerce-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.main.component.name ~ "Commerce") OR \
            (testray.main.component.name ~ "Order Management") OR \
            (testray.main.component.name ~ "Product Info Management") OR \
            (testray.main.component.name ~ "Shopping Experience")\
        )

