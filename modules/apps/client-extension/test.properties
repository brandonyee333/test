##
## Test Suites
##


	modified.files.includes[relevant][client-extension-rule]=**

	relevant.rule.names=\
		client-extension-rule

	test.batch.names[relevant][client-extension-rule]=\
		playwright-js-tomcat90-mysql57-jdk8,\
		functional-tomcat90-mysql57-jdk8
##
## Playwright
##

    playwright.test.project[playwright-js-tomcat90-mysql57-jdk8][relevant][client-extension-rule]=client-extension-web


    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][client-extension-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][client-extension-rule]=\
        (portal.acceptance == true) AND \
        (testray.component.names ~ "Client Extensions")

##
## Testray
##

    testray.main.component.name=Client Extensions