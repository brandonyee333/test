##
## Test Suites
##


	modified.files.includes[relevant][info-rule]=**

	relevant.rule.names=\
		info-rule

	test.batch.names[relevant][info-rule]=\
		functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][info-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][info-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.main.component.name ~ "Content Pages") OR \
            (testray.main.component.name ~ "Display Page Templates")\
        )

