##
## Test Suites
##

    modified.files.includes[relevant][portal-scheduler-rule]=**

    relevant.rule.names=\
        portal-scheduler-rule

    test.batch.names[relevant][portal-scheduler-rule]=\
        functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-scheduler-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-scheduler-rule]=\
        (\
            (portal.acceptance == true) AND \
            (testray.main.component.name == "Staging")\
        ) OR \
        (\
            (license.required != "true") AND \
            (testray.main.component.name == "Clustering")\
        ) OR \
        (testray.main.component.name == "Scheduler")

##
## Testray
##

    testray.main.component.name=Scheduler