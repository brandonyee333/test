##
## Test Suites
##

    modified.files.includes[relevant][portlet-display-template-rule]=**

    relevant.rule.names=\
        portlet-display-template-rule

    test.batch.names[relevant][portlet-display-template-rule]=\
        functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portlet-display-template-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portlet-display-template-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.main.component.name ~ "Templates") OR \
            (testray.main.component.name ~ "Templates Engine")\
        )

