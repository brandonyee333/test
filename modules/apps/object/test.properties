##
## Test Suites
##


	modified.files.includes[relevant][object-rule]=**

	relevant.rule.names=\
		object-rule

	test.batch.names[relevant][object-rule]=\
		playwright-js-tomcat90-mysql57-jdk8,\
		functional-tomcat90-mysql57-jdk8
##
## Playwright
##

    playwright.test.project[playwright-js-tomcat90-mysql57-jdk8][relevant][object-rule]=object


    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][object-rule]}

    #
    # Relevant
    #

    test.batch.class.names.includes[relevant][object-rule]=\
        **/headless-builder/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][object-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names == "Object") OR \
            (testray.main.component.name == "Object")\
        )

##
## Testray
##

    testray.main.component.name=Object