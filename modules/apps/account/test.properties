##
## Test Suites
##


	modified.files.includes[relevant][account-rule]=**

	relevant.rule.names=\
		account-rule

	test.batch.names[relevant][account-rule]=\
		functional-tomcat90-mysql57-jdk8,\
		functional-upgrade-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][account-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][account-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Account") OR \
            (testray.main.component.name ~ "Account")\
        )

    test.batch.run.property.query[functional-upgrade*-tomcat*-mysql*-jdk8][relevant][account-rule]=\
        (portal.acceptance == true) AND \
        (testray.component.names ~ "Account")

##
## Testray
##

    testray.main.component.name=Account