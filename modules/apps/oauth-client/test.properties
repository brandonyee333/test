	modified.files.includes[relevant][oauth-client-rule]=**

	relevant.rule.names=\
		oauth-client-rule

	test.batch.names[relevant][oauth-client-rule]=\
		functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][oauth-client-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][oauth-client-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "OAuth 2") OR \
            (testray.main.component.name ~ "OAuth 2")\
        )

