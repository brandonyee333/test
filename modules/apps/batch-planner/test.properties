##
## Test Suites
##

    modified.files.includes[relevant][batch-planner-rule]=**

    relevant.rule.names=\
        batch-planner-rule

    test.batch.names[relevant][batch-planner-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        playwright-js-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][batch-planner-rule]}

    #
    # Relevant
    #

    playwright.test.project[playwright-js-tomcat90-mysql57-jdk8][relevant][batch-planner-rule]=batch-planner

    test.batch.class.names.includes[relevant][batch-planner-rule]=\
        **/batch-planner/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][batch-planner-rule]=\
        (portal.acceptance == true) AND \
        (testray.main.component.name == "Data Migration Center")

##
## Testray
##

    testray.main.component.name=Data Migration Center