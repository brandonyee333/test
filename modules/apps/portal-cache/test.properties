## Test Suites
##


	modified.files.includes[relevant][portal-cache-rule]=**

	relevant.rule.names=\
		portal-cache-rule

	test.batch.names[relevant][portal-cache-rule]=\
		functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-cache-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-cache-rule]=\
        (\
            (license.required != "true") AND \
            (testray.main.component.name == "Clustering")\
        )

