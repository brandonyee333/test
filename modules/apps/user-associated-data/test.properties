##
## Test Suites
##


	modified.files.includes[relevant][user-associated-data-rule]=**

	relevant.rule.names=\
		user-associated-data-rule

	test.batch.names[relevant][user-associated-data-rule]=\
		functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][user-associated-data-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][user-associated-data-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Personal Data") OR \
            (testray.main.component.name ~ "Personal Data")\
        )

##
## Testray
##

    testray.main.component.name=Personal Data