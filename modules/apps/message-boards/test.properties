##
## Test Suites
##

    modified.files.includes[relevant][message-boards-rule]=**

    relevant.rule.names=\
        message-boards-rule

    test.batch.names[relevant][message-boards-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        playwright-js-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][message-boards-rule]}

    #
    # Relevant
    #

    playwright.test.project[playwright-js-tomcat90-mysql57-jdk8][relevant][message-boards-rule]=message-boards-web

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][message-boards-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Message Boards") OR \
            (testray.main.component.name ~ "Message Boards")\
        )

##
## Testray
##

    testray.main.component.name=Message Boards