File portalImplClassesDir = file("../../../../../../portal-impl/classes")
File portalKernelClassesDir = file("../../../../../../portal-kernel/classes")

if (portalImplClassesDir.exists() && portalKernelClassesDir.exists()) {
	dependencies {
		compileOnly files(portalImplClassesDir, portalKernelClassesDir)
	}
}
else {
	dependencies {
		compileOnly group: "com.liferay.portal", name: "com.liferay.portal.impl", version: "default"
		compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "default"
	}
}