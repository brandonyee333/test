##
## Test Suites
##


	modified.files.includes[relevant][portal-workflow-rule]=**

	relevant.rule.names=\
		portal-workflow-rule
	modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][portal-workflow-rule]=\
        apps/portal-workflow/**/*Test.java
	modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][portal-workflow-rule]=\
        apps/portal-workflow/**/*Test.java

	test.batch.names[relevant][portal-workflow-rule]=\
		modules-unit-jdk8,\
		modules-integration-mysql57-jdk8,\
		functional-tomcat90-mysql57-jdk8,\
		functional-upgrade-tomcat90-mysql57-jdk8

    


    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-workflow-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-workflow-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Workflow") OR \
            (testray.main.component.name ~ "Kaleo Designer") OR \
            (testray.main.component.name ~ "Workflow")\
        )

    test.batch.run.property.query[functional-upgrade-tomcat*-mysql*-jdk8][relevant][portal-workflow-rule]=\
        (testray.main.component.name == "Upgrades Workflow")

