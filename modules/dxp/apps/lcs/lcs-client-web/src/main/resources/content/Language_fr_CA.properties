the-services-include-portal-analytics-fix-packs-management-and-portal-properties-analysis=Les services comprennent des analytiques de portail, une gestion des packs de réparation et des analyses des propriétés du portail. En activant tous les services, vous permettez à Liferay Connected Services d'accéder aux métriques, au packs de réparation installés et aux propriétés de votre portail. Liferay Connected Services n'accédera pas aux propriétés contenant des <span class="{0}">données sensibles</span>.
