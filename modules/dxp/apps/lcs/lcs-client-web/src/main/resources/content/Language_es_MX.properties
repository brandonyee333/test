the-services-include-portal-analytics-fix-packs-management-and-portal-properties-analysis=Entre los servicios, se incluyen el análisis del portal, la administración de paquetes de revisiones y el análisis de las propiedades del portal. Al habilitar todos los servicios, permite que Liferay Connected Services acceda a métricas, paquetes de revisiones instalados y propiedades del portal. Liferay Connected Services no accederá a propiedades que contengan <span class="{0}">información confidencial</span>.
