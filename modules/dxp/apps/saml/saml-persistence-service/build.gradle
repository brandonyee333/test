buildService {
	apiDir = "../saml-persistence-api/src/main/java"
	testDir = "../saml-persistence-test/src/testIntegration/java"
}

dependencies {
	compileInclude group: "ca.juliusdavies", name: "not-yet-commons-ssl", version: "0.3.17"
	compileInclude group: "org.bouncycastle", name: "bcpkix-jdk18on", version: "1.76"
	compileInclude group: "org.bouncycastle", name: "bcprov-jdk18on", version: "1.76"
	compileInclude group: "org.bouncycastle", name: "bcutil-jdk18on", version: "1.76"
	compileInclude group: "xml-resolver", name: "xml-resolver", version: "1.2"

	compileOnly group: "biz.aQute.bnd", name: "biz.aQute.bndlib", version: "3.1.0"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.impl", version: "default"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "default"
	compileOnly group: "javax.portlet", name: "portlet-api", version: "2.0"
	compileOnly group: "javax.servlet", name: "javax.servlet-api", version: "3.0.1"
	compileOnly group: "org.osgi", name: "org.osgi.service.cm", version: "1.5.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.3.0"
	compileOnly group: "org.osgi", name: "osgi.core", version: "6.0.0"
	compileOnly project(":apps:foundation:portal:portal-spring-extender")
	compileOnly project(":apps:foundation:portal:portal-upgrade-api")
	compileOnly project(":apps:static:portal-configuration:portal-configuration-metatype")
	compileOnly project(":core:petra:petra-string")
	compileOnly project(":dxp:apps:saml:saml-api")
	compileOnly project(":dxp:apps:saml:saml-persistence-api")
}