buildService {
	apiDir = "../osb-customer-github-api/src/main/java"
}

dependencies {
	compileInclude group: "com.fasterxml.jackson.core", name: "jackson-annotations", version: "2.6.7"
	compileInclude group: "com.fasterxml.jackson.core", name: "jackson-core", version: "2.6.7"
	compileInclude group: "com.fasterxml.jackson.core", name: "jackson-databind", version: "2.6.7.1"
	compileInclude group: "com.liferay", name: "com.liferay.petra.json.web.service.client", version: "7.1.0"
	compileInclude group: "org.apache.httpcomponents", name: "httpasyncclient", version: "4.1.3"
	compileInclude group: "org.apache.httpcomponents", name: "httpclient", version: "4.5.3"
	compileInclude group: "org.apache.httpcomponents", name: "httpcore", version: "4.4.6"
	compileInclude group: "org.apache.httpcomponents", name: "httpcore-nio", version: "4.4.6"

	compileOnly files("../../osb-portlet/docroot/WEB-INF/lib/osb-portlet-service.jar")
	compileOnly group: "biz.aQute.bnd", name: "biz.aQute.bndlib", version: "3.1.0"
	compileOnly group: "com.liferay", name: "com.liferay.portal.dao.orm.custom.sql", version: "1.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.portal.spring.extender", version: "2.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.portal.upgrade", version: "2.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.registry.api", version: "1.0.0"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "2.50.0"
	compileOnly group: "org.osgi", name: "org.osgi.core", version: "6.0.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.3.0"
	compileOnly project(":private:apps:osb-customer:osb-customer-github:osb-customer-github-api")
}