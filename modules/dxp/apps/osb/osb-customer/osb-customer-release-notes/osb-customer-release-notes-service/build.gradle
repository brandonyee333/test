buildService {
	apiDir = "../osb-customer-release-notes-api/src/main/java"
}

dependencies {
	provided group: "biz.aQute.bnd", name: "biz.aQute.bndlib", version: "3.1.0"
	provided group: "com.liferay", name: "com.liferay.osgi.util", version: "3.0.0"
	provided group: "com.liferay", name: "com.liferay.portal.dao.orm.custom.sql", version: "1.0.0"
	provided group: "com.liferay", name: "com.liferay.portal.spring.extender", version: "2.0.0"
	provided group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "2.6.0"
	provided group: "com.liferay.portal", name: "portal-impl", version: "6.2.1"
	provided group: "org.osgi", name: "org.osgi.util.tracker", version: "1.5.1"
	provided project(":private:apps:osb-customer:osb-customer-release-notes:osb-customer-release-notes-api")
	provided project(":private:apps:osb-customer:osb-customer-release-notes:osb-customer-release-notes-jira-api")
