if-subscription-services-are-offered-for-your-app-customers-can-only-receive-support-maintenance-and-updates-during-the-paid-subscription-period=If subscription services are offered for your app, customers can only receive support, maintenance, and updates during the paid subscription period. Customers with a valid subscription may contact you with support requests for your app. If you choose not to offer subscription services with your app, customers will be entitled to only app updates, if and when updates become available.
if-you-are-a-developer-residing-outside-of-the-united-states-non-perpetual-license-sales-are-subject-to-a-30-withholding-to-the-us-government=If you are a developer residing outside of the United States, non-perpetual license sales are subject to a 30% withholding to the US Government. This does not apply to perpetual licenses. For more information, please refer to the {0}Developer FAQ{1}.
if-you-opt-to-offer-subscription-services-the-price-of-this-added-service-should-be-built-into-the-per-instance-unit-per-year-price-of-the-non-perpetual-license=If you opt to offer subscription services, the price of this added service should be built into the "per Instance Unit per year" price of the non-perpetual license. Please take this into account when pricing your non-perpetual license.
if-you-opt-to-offer-subscription-services-you-will-be-asked-to-price-it-on-a-per-instance-unit-per-year-basis=If you opt to offer subscription services, you will be asked to price it on a "per Instance Unit per year" basis. The first year of subscription services is included with a perpetual license.
if-you-require-support-for-a-potential-upgrade-to-dxp-please-choose-digital-enterprise-as-your-product-and-upgrade-as-your-component=If you require support for a potential upgrade to DXP, please choose Digital Enterprise as your product and Upgrade as your component.
if-you-require-support-for-a-potential-upgrade-to-dxp-please-contact-you-provisioning-representative-for-further-assistance=If you require support for a potential upgrade to DXP, please contact your Provisioning representative for further assistance.
