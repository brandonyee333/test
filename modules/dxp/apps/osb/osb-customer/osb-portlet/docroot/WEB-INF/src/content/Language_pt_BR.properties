if-subscription-services-are-offered-for-your-app-customers-can-only-receive-support-maintenance-and-updates-during-the-paid-subscription-period=Caso serviços de subscrição sejam oferecidos pelo seu app, clientes só podem receber suporte, manutenção e atualizações durante o período de subscrição pago. Clientes com subscrição válida podem contatá-lo com solicitações de suporte para seu app. Caso você opte por não oferecer serviços de subscrição com seu app, os clientes terão direito a apenas atualizações do app, se e quando atualizações estejam disponíveis.
