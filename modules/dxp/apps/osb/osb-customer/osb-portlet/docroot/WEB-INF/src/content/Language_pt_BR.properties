if-you-opt-to-offer-subscription-services-you-will-be-asked-to-price-it-on-a-per-instance-unit-per-year-basis=Caso você opte por oferecer serviços de subscrição, você será solicitado a precificá-lo numa base "por unidade de instância por ano". O primeiro ano dos serviços de subscrição estão inclusos com uma licença definitiva.
