apply plugin: "com.liferay.lang.merger"

dependencies {
	compileOnly group: "org.osgi", name: "org.osgi.core", version: "6.0.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.3.0"

	provided group: "biz.aQute.bnd", name: "biz.aQute.bndlib", version: "3.1.0"
	provided group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "2.0.0"
	provided group: "javax.portlet", name: "portlet-api", version: "2.0"
	provided group: "javax.servlet", name: "javax.servlet-api", version: "3.0.1"
	provided group: "org.apache.velocity", name: "velocity", version: "1.7"
	provided project(":private:apps:osb-customer:osb-customer-release-notes-local:osb-customer-release-notes-local-api")
	provided project(":private:apps:osb-customer:osb-customer-release-notes-local:osb-customer-release-notes-local-service")
	provided project(":private:apps:osb-customer:osb-customer-release-notes-remote:osb-customer-release-notes-remote-api")
	provided project(":private:apps:osb-customer:osb-customer-release-notes-remote:osb-customer-release-notes-remote-service")
}

deployDependencies {
	from configurations.provided
	include "velocity-*.jar"
}