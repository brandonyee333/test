buildService {
	apiDir = "../osb-customer-zendesk-documentation-sync-api/src/main/java"
	databaseNameMaxLength = 64
}

dependencies {
	compileOnly fileTree(dir: "src/main/resources/lib", include: "*.jar")
	compileOnly group: "biz.aQute.bnd", name: "biz.aQute.bndlib", version: "3.1.0"
	compileOnly group: "com.liferay", name: "com.liferay.knowledge.base.api", version: "4.5.0"
	compileOnly group: "com.liferay", name: "com.liferay.osgi.util", version: "3.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.petra.string", version: "1.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.portal.configuration.metatype", version: "2.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.portal.spring.extender", version: "2.1.0"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.impl", version: "2.0.0"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "2.6.0"
	compileOnly group: "com.vladsch.flexmark", name: "flexmark-osgi", version: "0.40.18"
	compileOnly group: "org.osgi", name: "org.osgi.core", version: "5.0.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.3.0"
	compileOnly project(":private:apps:osb-customer:osb-customer-zendesk-connector:osb-customer-zendesk-connector-api")
	compileOnly project(":private:apps:osb-customer:osb-customer-zendesk-documentation:osb-customer-zendesk-documentation-sync-api")
	compileOnly project(":private:apps:osb-customer:osb-customer-zendesk:osb-customer-zendesk-api")
}