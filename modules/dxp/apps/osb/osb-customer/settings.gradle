buildscript {
	dependencies {
		classpath group: "com.liferay", name: "com.liferay.gradle.plugins.defaults", version: "latest.release"
	}

	repositories {
		mavenLocal()

		maven {
			url "https://repository-cdn.liferay.com/nexus/content/groups/public"
		}
	}
}

apply plugin: "com.liferay.settings.plugin"

include ":private:apps:osb-common:osb-common-restful-servlet"
project(":private:apps:osb-common:osb-common-restful-servlet").projectDir = file("../../../private/apps/osb-common/osb-common-restful-servlet")