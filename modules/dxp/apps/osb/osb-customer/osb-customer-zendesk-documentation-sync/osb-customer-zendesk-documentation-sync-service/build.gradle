	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.3.0"
	compileOnly project(":private:apps:osb-customer:osb-customer-zendesk-documentation-sync:osb-customer-zendesk-documentation-sync-api")
}