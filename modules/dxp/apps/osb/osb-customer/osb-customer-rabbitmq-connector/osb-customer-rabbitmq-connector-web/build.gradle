apply plugin: "com.liferay.lang.merger"

dependencies {
	compileOnly group: "org.osgi", name: "org.osgi.core", version: "6.0.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.3.0"

	provided group: "biz.aQute.bnd", name: "biz.aQute.bndlib", version: "3.1.0"
	provided group: "com.liferay", name: "com.liferay.application.list.api", version: "2.0.0"
	provided group: "com.liferay", name: "com.liferay.frontend.taglib", version: "2.0.0"
	provided group: "com.liferay", name: "com.liferay.product.navigation.control.menu.api", version: "3.0.0"
	provided group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "2.20.0"
	provided group: "com.liferay.portal", name: "com.liferay.util.taglib", version: "2.4.0"
	provided group: "com.rabbitmq", name: "amqp-client", version: "3.6.1"
	provided group: "javax.portlet", name: "portlet-api", version: "2.0"
	provided group: "javax.servlet", name: "javax.servlet-api", version: "3.0.1"
	provided project(":private:apps:osb-customer:osb-customer-rabbitmq-connector:osb-customer-rabbitmq-connector-api")
	provided project(":private:apps:osb-customer:osb-customer-rabbitmq-connector:osb-customer-rabbitmq-connector-service")
}

deployDependencies {
	from configurations.provided
	include "amqp-client-*.jar"
}