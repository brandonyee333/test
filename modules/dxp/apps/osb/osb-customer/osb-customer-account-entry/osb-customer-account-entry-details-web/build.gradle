task deployConfigs(type: Copy)

apply plugin: "com.liferay.lang.merger"

dependencies {
	compileOnly files("../../osb-portlet/docroot/WEB-INF/lib/osb-portlet-service.jar")
	compileOnly group: "biz.aQute.bnd", name: "biz.aQute.bndlib", version: "3.1.0"
	compileOnly group: "com.liferay", name: "com.liferay.frontend.taglib", version: "2.0.0"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "2.50.0"
	compileOnly group: "com.liferay.portal", name: "com.liferay.util.taglib", version: "2.4.0"
	compileOnly group: "javax.portlet", name: "portlet-api", version: "2.0"
	compileOnly group: "javax.servlet", name: "javax.servlet-api", version: "3.0.1"
}

deploy {
	finalizedBy deployConfigs
}

deployConfigs {
	ext {
		autoClean = false
	}

	from "configs"
	into new File(liferay.liferayHome, "osgi/configs")
}
