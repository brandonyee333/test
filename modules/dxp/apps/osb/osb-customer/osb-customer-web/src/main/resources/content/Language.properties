you-may-request-liferay-university-passport-access-for-yourself-or-for-a-member-of-your-liferay-project-team=You may request Liferay University Passport access for yourself or for a member of your Liferay Project team. To request access for yourself, please enter your email that is tied to your Liferay account. To request access for another member, please enter an email that has the same email domain as your own. For example, if the email associated with your Liferay account has the email domain "@liferay.com", then the end user's email must match and also contain "@liferay.com".