you-may-request-liferay-university-passport-access-for-yourself-or-for-a-member-of-your-liferay-project-team=Podeu sol·licitar l'accés al passaport de la universitat liferay per a vosaltres mateixos o per a un membre del vostre equip de Projecte Liferay. Per sol·licitar accés per a vostè mateix, si us plau introdueixi el seu correu electrònic que està vinculat al seu compte de Liferay. Per sol·licitar l'accés a un altre membre, introduïu un correu electrònic que tingui el mateix domini de correu electrònic que el vostre. Per exemple, si el correu electrònic associat al vostre compte de Liferay té el domini de correu electrònic "@liferay.com", el correu electrònic de l'usuari final ha de coincidir i també contenir "@liferay.com". (Automatic Translation)