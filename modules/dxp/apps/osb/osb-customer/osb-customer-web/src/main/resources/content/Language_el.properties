you-may-request-liferay-university-passport-access-for-yourself-or-for-a-member-of-your-liferay-project-team=Μπορείτε να ζητήσετε πρόσβαση στο Διαβατήριο του Πανεπιστημίου Liferay για τον εαυτό σας ή για ένα μέλος της ομάδας του Liferay Project. Για να ζητήσετε πρόσβαση μόνοι σας, εισαγάγετε το email σας που είναι συνδεδεμένο με τον λογαριασμό σας liferay. Για να ζητήσετε πρόσβαση για ένα άλλο μέλος, εισαγάγετε ένα μήνυμα ηλεκτρονικού ταχυδρομείου που έχει τον ίδιο τομέα ηλεκτρονικού ταχυδρομείου με τον δικό σας. Για παράδειγμα, εάν το μήνυμα ηλεκτρονικού ταχυδρομείου που σχετίζεται με το λογαριασμό σας Liferay έχει τον τομέα ηλεκτρονικού ταχυδρομείου "@liferay.com", τότε το μήνυμα ηλεκτρονικού ταχυδρομείου του τελικού χρήστη πρέπει να ταιριάζει και να περιέχει επίσης "@liferay.com". (Automatic Translation)