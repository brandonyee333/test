query SiteMetrics($channelId: String, $interval: String!, $rangeEnd: String, $rangeStart: String) {
    site(channelId: $channelId, interval: $interval, rangeEnd: $rangeEnd, rangeStart: $rangeStart) {
        anonymousVisitorsMetric {
            ...metricFragment
            __typename
        }
        bounceRateMetric {
            ...metricFragment
            __typename
        }
        knownVisitorsMetric {
            ...metricFragment
            __typename
        }
        sessionDurationMetric {
            ...metricFragment
            __typename
        }
        sessionsPerVisitorMetric {
            ...metricFragment
            __typename
        }
        visitorsMetric {
            ...metricFragment
            __typename
        }
        __typename
    }
}

fragment metricFragment on Metric {
    histogram {
        asymmetricComparison
        metrics {
            key
            previousValue
            previousValueKey
            value
            valueKey
            trend {
                percentage
                trendClassification
            }
        }
        total
    }
    previousValue
    trend {
        percentage
        trendClassification
        __typename
    }
    value
    __typename
}

query UserSession($channelId: String!, $entityId: String!, $entityType: EntityType!, $keywords: String, $page: Int!, $rangeEnd: String, $rangeKey: Int, $rangeStart: String, $size: Int!) {
    eventsByUserSessions(channelId: $channelId, entityId: $entityId, entityType: $entityType, keywords: $keywords, page: $page, rangeEnd: $rangeEnd, rangeKey: $rangeKey, rangeStart: $rangeStart, size: $size) {
        userSessions {
            ... on UserSession {
                browserName
                completeDate
                contentLanguageId
                createDate
                devicePixelRatio
                deviceType
                events {
                    canonicalUrl
                    createDate
                    name
                    pageDescription
                    pageKeywords
                    pageTitle
                    referrer
                    url
                    __typename
                }
                languageId
                screenHeight
                screenWidth
                timezoneOffset
                userAgent
                __typename
            }
            __typename
        }
        totalEvents
        __typename
    }
}
