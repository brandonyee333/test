query SiteMetric($assetId: String!, $channelId: String, $country: String, $deviceType: String, $interval: String, $rangeKey: Int!, $timeZoneId: String) {
	site(assetId: $assetId, channelId: $channelId, country: $country, deviceType: $deviceType, interval: $interval, rangeKey: $rangeKey, timeZoneId: $timeZoneId) {
		anonymousVisitorsMetric {
			value
		}
		bounceRateMetric {
			value
		}
		knownVisitorsMetric {
			value
		}
		sessionDurationMetric {
			value
		}
		sessionsMetric {
			value
		}
		sessionsPerVisitorMetric {
			value
		}
		visitorsMetric {
			histogram {
				asymmetricComparison
				metrics {
					value
				}
			}
			value
		}
	}
}