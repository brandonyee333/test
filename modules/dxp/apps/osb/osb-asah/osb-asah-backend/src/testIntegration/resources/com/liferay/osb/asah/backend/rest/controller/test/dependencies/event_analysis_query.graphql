query EventAnalysis($analysisType: AnalysisType!, $channelId: String!, $eventDefinitionId: String!, $rangeEnd: String, $rangeStart: String) {
	eventAnalysis(analysisType: $analysisType, channelId: $channelId, eventDefinitionId: $eventDefinitionId, rangeEnd: $rangeEnd, rangeStart: $rangeStart) {
		count
		page
		totalEvents
		value
	}
}