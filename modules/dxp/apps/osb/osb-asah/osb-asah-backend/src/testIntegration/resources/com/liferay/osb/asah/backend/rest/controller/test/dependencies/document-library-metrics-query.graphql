query DocumentLibraryMetrics($channelId: String, $keywords: String, $rangeKey: Int!, $size: Int!, $start: Int!, $sort: Sort!) {
	documents(channelId: $channelId, keywords: $keywords, rangeKey: $rangeKey, size: $size, start: $start, sort: $sort) {
		assetMetrics {
			... on DocumentMetric {
				assetId
				assetTitle
				commentsMetric {
					value
				}
				downloadsMetric {
					value
				}
				previewsMetric {
					value
				}
				ratingsMetric {
					value
				}
				urls
			}
		}
		total
	}
}