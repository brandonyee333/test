mutation CreateEventAnalysis($analysisType: AnalysisType!, $channelId: String!, $compareToPrevious: Boolean!, $eventAnalysisBreakdowns: [EventAnalysisBreakdownInput], $eventAnalysisFilters: [EventAnalysisFilterInput], $eventDefinitionId: String!, $name: String!, $rangeEnd: String, $rangeKey: Int, $rangeStart: String, $userId: String!, $userName: String!) {
	createEventAnalysis(analysisType: $analysisType, channelId: $channelId, compareToPrevious: $compareToPrevious, eventAnalysisBreakdowns: $eventAnalysisBreakdowns, eventAnalysisFilters: $eventAnalysisFilters, eventDefinitionId: $eventDefinitionId,  name: $name, rangeEnd: $rangeEnd, rangeKey: $rangeKey, rangeStart: $rangeStart, userId: $userId, userName: $userName) {
		analysisType
		channelId
		compareToPrevious
		createdByUserId
		createdByUserName
		eventAnalysisBreakdowns {
			attributeId
			attributeType
			binSize
			dataType
			description
			displayName
		}
		eventAnalysisFilters {
			attributeId
			attributeType
			dataType
			description
			displayName
			operator
			values
		}
		eventDefinitionId
		modifiedByUserId
		modifiedByUserName
		name
		rangeEnd
		rangeKey
		rangeStart
	}
}