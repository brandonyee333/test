query JournalMetric($assetId: String!, $channelId: String, $country: String, $deviceType: String, $rangeKey: Int!, $url: String!) {
	journal(assetId: $assetId, channelId: $channelId, country: $country, deviceType: $deviceType, rangeKey: $rangeKey, url: $url) {
		assetId
		assetTitle
		urls
		viewsMetric {
			browser {
				value
				valueKey
			}
			device {
				metrics {
					value
					valueKey
				}
				value
				valueKey
			}
			geolocation {
				metrics {
					value
					valueKey
				}
				value
				valueKey
			}
			segment {
				metrics {
					value
					valueKey
				}
				total
			}
			trend {
				percentage
				trendClassification
			}
			value
		}
	}
}