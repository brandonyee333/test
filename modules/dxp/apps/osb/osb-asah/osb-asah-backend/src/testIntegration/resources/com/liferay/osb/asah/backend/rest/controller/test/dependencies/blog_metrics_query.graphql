query BlogMetrics($channelId: String, $keywords: String, $rangeKey: Int!, $size: Int!, $start: Int!, $sort: Sort!) {
	blogs(channelId: $channelId, keywords: $keywords, rangeKey: $rangeKey, size: $size, start: $start, sort: $sort) {
		assetMetrics {
			... on BlogMetric {
				assetId
				assetTitle
				commentsMetric {
					value
				}
				ratingsMetric {
					value
				}
				readingTimeMetric {
					value
				}
				urls
				viewsMetric {
					value
				}
			}
		}
		total
	}
}