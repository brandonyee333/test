query EventAnalyses($channelId: String!, $keywords: String, $page: Int!, $size: Int!, $sort: Sort!) {
	eventAnalyses(channelId: $channelId, keywords: $keywords, page: $page, size: $size, sort: $sort) {
		eventAnalyses {
			... on EventAnalysis {
				createdByUserName
				id
				modifiedDate
				name
			}
		}
		total
	}
}