query EventMetrics($channelId: String!, $entityId: String!, $entityType: EntityType!, $interval: String!, $keywords: String, $rangeEnd: String, $rangeKey: Int, $rangeStart: String!) {
	eventMetric(channelId: $channelId, entityId: $entityId, entityType: $entityType, interval: $interval, keywords: $keywords, rangeEnd: $rangeEnd, rangeKey: $rangeKey, rangeStart: $rangeStart) {
		totalEventsMetric {
			...trendFragment
			__typename
		}
		totalSessionsMetric {
			...trendFragment
			__typename
		}
		__typename
	}
}

fragment trendFragment on Metric {
	histogram {
		metrics {
			key
			value
			valueKey
		}
		total
	}
	__typename
}