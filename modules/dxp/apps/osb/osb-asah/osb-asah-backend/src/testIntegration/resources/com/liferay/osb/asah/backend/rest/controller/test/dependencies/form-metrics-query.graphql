query FormMetrics($channelId: String, $keywords: String, $rangeKey: Int!, $size: Int!, $start: Int!, $sort: Sort!) {
	forms(channelId: $channelId, keywords: $keywords, rangeKey: $rangeKey, size: $size, start: $start, sort: $sort) {
		assetMetrics {
			... on FormMetric {
				abandonmentsMetric {
					value
				}
				assetId
				assetTitle
				completionTimeMetric {
					value
				}
				submissionsMetric {
					value
				}
				urls
				viewsMetric {
					value
				}
			}
		}
		total
	}
}