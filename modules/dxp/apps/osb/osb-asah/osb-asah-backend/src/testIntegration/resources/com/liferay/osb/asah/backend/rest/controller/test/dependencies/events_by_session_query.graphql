query EventsByUserSession($channelId: String!, $entityId: String!, $entityType: EntityType!, $keywords: String, $page: Int!, $rangeKey: Int!, $size: Int!) {
	eventsByUserSessions(channelId: $channelId, entityId: $entityId, entityType: $entityType, keywords: $keywords, page: $page, rangeKey: $rangeKey, size: $size) {
		userSessions {
			... on UserSession {
					browserName
					completeDate
					contentLanguageId
					createDate
					devicePixelRatio
					deviceType
					events {
						canonicalUrl
						name
						pageDescription
						pageKeywords
						pageTitle
						referrer
						url
						__typename
					}
					languageId
					screenHeight
					screenWidth
					timezoneOffset
					userAgent
					__typename
				}
		}
		totalEvents
		__typename
	}
}