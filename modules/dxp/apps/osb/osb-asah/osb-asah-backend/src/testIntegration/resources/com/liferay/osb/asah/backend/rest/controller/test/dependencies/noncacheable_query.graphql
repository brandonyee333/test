query IndividualMetrics($channelId: String!, $interval: String!, $rangeKey: Int!) {
    individualMetric(channelId: $channelId, interval: $interval, rangeKey: $rangeKey) {
        anonymousIndividualsMetric {
            ...trendFragment
            __typename
        }
        knownIndividualsMetric {
            ...trendFragment
            __typename
        }
        totalIndividualsMetric {
            ...trendFragment
            __typename
        }
        __typename
    }
}

fragment trendFragment on Metric {
    histogram {
        key
        valueKey
        value
        __typename
    }
    value
    trend {
        percentage
        __typename
    }
    __typename
}