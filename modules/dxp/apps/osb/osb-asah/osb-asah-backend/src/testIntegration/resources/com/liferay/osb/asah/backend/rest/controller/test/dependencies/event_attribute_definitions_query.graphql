query EventAttributeDefinitions($keyword: String, $page: Int!, $size: Int!, $sort: Sort!) {
    eventAttributeDefinitions(keyword: $keyword, page: $page, size: $size, sort: $sort) {
        eventAttributeDefinitions {
            ... on EventAttributeDefinition {
                dataType
                description
                displayName
                sampleValue
                name
                __typename
            }
            __typename
        }
        total
        __typename
    }
}