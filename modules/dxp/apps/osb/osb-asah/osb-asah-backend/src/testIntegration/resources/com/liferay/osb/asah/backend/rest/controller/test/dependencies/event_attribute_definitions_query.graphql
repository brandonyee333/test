query EventAttributeDefinitions($keyword: String, $page: Int!, $size: Int!, $sort: Sort!, $type: EventAttributeDefinitionType!) {
    eventAttributeDefinitions(keyword: $keyword, page: $page, size: $size, sort: $sort, type: $type) {
        eventAttributeDefinitions {
            ... on EventAttributeDefinition {
                dataType
                description
                displayName
                name
                sampleValue
                type
                __typename
            }
            __typename
        }
        total
        __typename
    }
}