fragment browserFragment on Metric {
	browser {
		metrics {
			value
			valueKey
		}
		value
		valueKey
	}
}

fragment deviceFragment on Metric {
	device {
		metrics {
			value
			valueKey
		}
		value
		valueKey
	}
}

fragment metricFragment on Metric {
	value
}

query PageMetric($canonicalUrl: String, $channelId: String, $country: String, $deviceType: String, $rangeKey: Int!, $title: String, $url: String) {
	page(canonicalUrl: $canonicalUrl, channelId: $channelId, country: $country, deviceType: $deviceType, rangeKey: $rangeKey, title: $title, url: $url) {
		bounceRateMetric {
			...metricFragment
		}
		directAccessMetric {
			...metricFragment
		}
		engagementMetric {
			...metricFragment
		}
		indirectAccessMetric {
			...metricFragment
		}
		viewsMetric {
			...browserFragment
			...deviceFragment
			...metricFragment
		}
	}
}