fragment browserFragment on Metric {
	browser {
		metrics {
			value
			valueKey
		}
		value
		valueKey
	}
}

fragment deviceFragment on Metric {
	device {
		metrics {
			value
			valueKey
		}
		value
		valueKey
	}
}

fragment geolocationFragment on Metric {
	geolocation {
		metrics {
			value
			valueKey
		}
		value
		valueKey
	}
}

fragment metricFragment on Metric {
	previousValue
	trend {
		percentage
		trendClassification
	}
	value
}

fragment segmentFragment on Metric {
	anonymousUsersCount
	knownUsersCount
	nonsegmentedKnownUsersCount
	segment {
		metrics {
			value
			valueKey
		}
		total
	}
	segmentedKnownUsersCount
}

query FormMetric($assetId: String!, $canonicalUrl: String, $channelId: String, $country: String, $deviceType: String, $rangeKey: Int!, $title: String, $url: String) {
	form(assetId: $assetId, canonicalUrl: $canonicalUrl, channelId: $channelId, country: $country, deviceType: $deviceType, rangeKey: $rangeKey, title: $title, url: $url) {
		abandonmentsMetric {
			...metricFragment
		}
		assetId
		assetTitle
		canonicalUrls
		completionTimeMetric {
			...metricFragment
		}
		formPageMetrics {
			formFieldMetrics {
				fieldAbandonmentsMetric {
					value
				}
				fieldEmptyMetric {
					value
				}
				fieldInteractionDurationMetric {
					value
				}
				fieldInteractionsMetric {
					value
				}
				fieldName
				fieldRefilledMetric {
					value
				}
			}
			pageAbandonmentsMetric {
				value
			}
			pageIndex
			pageViewsMetric {
				value
			}
		}
		submissionsMetric {
			...browserFragment
			...deviceFragment
			...geolocationFragment
			...metricFragment
		}
		urls
		viewsMetric {
			...metricFragment
			...segmentFragment
		}
	}
}