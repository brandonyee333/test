query EventAnalysis($analysisType: AnalysisType!, $channelId: String!, $eventAnalysisFilters: [EventAnalysisFilter], $eventDefinitionId: String!, $rangeEnd: String, $rangeStart: String) {
	eventAnalysis(analysisType: $analysisType, channelId: $channelId, eventAnalysisFilters: $eventAnalysisFilters, eventDefinitionId: $eventDefinitionId, rangeEnd: $rangeEnd, rangeStart: $rangeStart) {
		count
		page
		value
	}
}