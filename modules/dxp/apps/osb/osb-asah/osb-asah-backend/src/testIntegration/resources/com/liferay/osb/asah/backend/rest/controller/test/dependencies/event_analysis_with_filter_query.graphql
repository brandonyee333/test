query EventAnalysis($analysisType: AnalysisType!, $channelId: String!, $compareToPrevious: Boolean!, $eventAnalysisFilters: [EventAnalysisFilterInput], $eventDefinitionId: String!, $page: Int!, $rangeEnd: String, $rangeStart: String, $size: Int!) {
	eventAnalysis(analysisType: $analysisType, channelId: $channelId, compareToPrevious: $compareToPrevious, eventAnalysisFilters: $eventAnalysisFilters, eventDefinitionId: $eventDefinitionId, page: $page, rangeEnd: $rangeEnd, rangeStart: $rangeStart, size: $size) {
		breakdownItems {
			breakdownItems {
				leafNode
				name
				value
			},
			leafNode
			name
			value
		}
		count
		page
		value
	}
}