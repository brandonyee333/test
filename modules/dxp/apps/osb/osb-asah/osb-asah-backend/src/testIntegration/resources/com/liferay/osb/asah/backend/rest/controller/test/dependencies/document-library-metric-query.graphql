fragment browserFragment on Metric {
	browser {
		metrics {
			value
			valueKey
		}
		value
		valueKey
	}
}

fragment deviceFragment on Metric {
	device {
		metrics {
			value
			valueKey
		}
		value
		valueKey
	}
}

fragment geolocationFragment on Metric {
	geolocation {
		metrics {
			value
			valueKey
		}
		value
		valueKey
	}
}

fragment metricFragment on Metric {
	histogram {
		key
		previousValue
		previousValueKey
		trend {
			percentage
			trendClassification
		}
		value
		valueKey
	}
	previousValue
	trend {
		percentage
		trendClassification
	}
	value
}

fragment segmentFragment on Metric {
	anonymousUsersCount
	knownUsersCount
	nonsegmentedKnownUsersCount
	segment {
		metrics {
			value
			valueKey
		}
		total
	}
	segmentedKnownUsersCount
}

query DocumentLibraryMetric($assetId: String!, $channelId: String, $location: String, $devices: String, $title: String, $url: String!, $rangeKey: Int!) {
	document(assetId: $assetId, channelId: $channelId, country: $location, deviceType: $devices, url: $url, rangeKey: $rangeKey, title: $title) {
		assetId
		assetTitle
		commentsMetric {
			...metricFragment
		}
		downloadsMetric {
			...browserFragment
			...deviceFragment
			...geolocationFragment
			...metricFragment
			...segmentFragment
		}
		previewsMetric {
			...metricFragment
		}
		ratingsMetric {
			...metricFragment
		}
		urls
	}
}