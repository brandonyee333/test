fragment browserFragment on Metric {
	browser {
		metrics {
			value
			valueKey
		}
		value
		valueKey
	}
}

fragment deviceFragment on Metric {
	device {
		metrics {
			value
			valueKey
		}
		value
		valueKey
	}
}

fragment geolocationFragment on Metric {
	geolocation {
		metrics {
			value
			valueKey
		}
		value
		valueKey
	}
}

fragment metricFragment on Metric {
	histogram {
		key
		previousValue
		previousValueKey
		trend {
			percentage
			trendClassification
		}
		value
		valueKey
	}
	previousValue
	trend {
		percentage
		trendClassification
	}
	value
}

fragment segmentFragment on Metric {
	anonymousUsersCount
	knownUsersCount
	nonsegmentedKnownUsersCount
	segment {
		metrics {
			value
			valueKey
		}
		total
	}
	segmentedKnownUsersCount
}

query DocumentLibraryMetric($assetId: String!, $canonicalUrl: String, $channelId: String, $country: String, $deviceType: String, $title: String, $rangeKey: Int!, $url: String) {
	document(assetId: $assetId, canonicalUrl: $canonicalUrl, channelId: $channelId, country: $country, deviceType: $deviceType, rangeKey: $rangeKey, title: $title, url: $url) {
		assetId
		assetTitle
		canonicalUrls
		commentsMetric {
			...metricFragment
		}
		downloadsMetric {
			...browserFragment
			...deviceFragment
			...geolocationFragment
			...metricFragment
			...segmentFragment
		}
		previewsMetric {
			...metricFragment
		}
		ratingsMetric {
			...metricFragment
		}
		urls
	}
}