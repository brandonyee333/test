query EventDefinitions($eventType: String!, $keyword: String, $page: Int!, $size: Int!, $sort: Sort!) {
    eventDefinitions(eventType: $eventType, keyword: $keyword, page: $page, size: $size, sort: $sort) {
        eventDefinitions {
            ... on EventDefinition {
                name
                type
                displayName
                description
                __typename
            }
        }
        total
        __typename
    }
}