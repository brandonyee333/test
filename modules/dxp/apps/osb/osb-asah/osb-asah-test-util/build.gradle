apply plugin: "com.liferay.spring.boot.defaults"
apply plugin: "io.spring.dependency-management"

ext["junit-jupiter.version"] = "5.8.2"
ext["log4j2.version"] = "2.16.0"

bootJar {
	enabled = false
}

configurations.all {
	exclude group: "com.vaadin.external.google", module: "android-json"
}

dependencies {
	compile group: "nl.jqno.equalsverifier", name: "equalsverifier", version: "2.5.1"
	compile group: "org.springframework.boot", name: "spring-boot-starter-test"
	compile project(configuration: "default", path: ":dxp:apps:osb:osb-asah:osb-asah-common")
}

jar {
	enabled = true
}