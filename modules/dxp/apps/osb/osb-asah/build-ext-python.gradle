import com.liferay.gradle.util.FileUtil

import com.pswidersk.gradle.python.PythonPlugin
import com.pswidersk.gradle.python.VenvTask

configure(subprojects.findAll { FileUtil.exists(it, "src/main/python")}) {
	apply plugin: "com.liferay.root.defaults.plugin"
	apply plugin: PythonPlugin

	pythonPlugin {
		minicondaVersion.set("py37_4.9.2")
		pythonVersion.set("3.7.9")
	}

	task installPackageDependencies(type: VenvTask)
	task installProjectEnvDependencies(type: VenvTask)
	task installTestEnvDependencies(type: VenvTask)
	task packagePython(type: VenvTask)
	task testPython(type: VenvTask)
	task zipPython(type: VenvTask)

	def pythonSource = "src/main/python"
	def pythonTempDir = "$buildDir/python-temp"
	def pythonTestSource = "src/test/python"

	installPackageDependencies {
		args = ["install", "--isolated", "-r", "$projectDir/$pythonSource/requirements-package.txt", "--target", pythonTempDir]
		venvExec = "pip"
	}

	installProjectEnvDependencies {
		args = ["install", "--isolated", "-r", "$projectDir/$pythonSource/requirements.txt"]
		venvExec = "pip"
	}

	installTestEnvDependencies {
		args = ["install", "--isolated", "-r", "$projectDir/$pythonTestSource/requirements.txt"]
		venvExec = "pip"
	}

	packagePython {
		dependsOn installPackageDependencies
		dependsOn installProjectEnvDependencies

		finalizedBy zipPython

		doLast {
			copy {
				exclude "requirements-package.txt"
				from pythonSource
				into pythonTempDir
			}

			def buildLibs = new File("$buildDir/libs")

			if (!buildLibs.exists()) {
				buildLibs.mkdirs()
			}
		}
	}

	testPython {
		dependsOn installProjectEnvDependencies
		dependsOn installTestEnvDependencies

		args = ["$projectDir/$pythonTestSource/", "--capture=no", "--disable-warnings", "--suppress-no-test-exit-code"]
		environment = ["PYTHONPATH": file("src/main")]
		venvExec = "pytest"
		workingDir = file("src/test")
	}

	zipPython {
		args = ["-m", "zipapp", pythonTempDir, "-o", "$buildDir/libs/${project.name}.zip"]
		venvExec = "python"

		doLast {
			copy {
				from pythonSource + "/__main__.py"
				into "$buildDir/libs"
				rename '(.*)__main__.py', '$1osb-asah-spark-driver.py'
			}

			delete pythonTempDir
		}
	}

	task assemble {
		dependsOn packagePython
	}

	task test {
		dependsOn testPython
	}
}