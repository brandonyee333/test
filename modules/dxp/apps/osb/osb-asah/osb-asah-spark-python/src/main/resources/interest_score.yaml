google:
    project:
        id: $PROJECT_ID
    storage:
        path:
            temporaryGcsBucket: ${PROJECT_ID}-dataproc-${REGION}/temp_write_bucket_for_bq_writes
interest:
    filter:
        entity:
            type: true
    models:
        embeddings:
            lang: "en"
            name: "roberta_base"
        language_detector:
            lang: "xx"
            name: "ld_tatoeba_cnn_99"
            threshold: .90
        ner:
            lang: "en"
            name: "ner_ontonotes_roberta_base"
        path: "gs://${PROJECT_ID}-dataproc-${REGION}/resources/johnsnowlabs"
        pos_tagger:
            lang: "en"
            name: "pos_anc"
spark:
    jars:
        packages: "com.johnsnowlabs.nlp:spark-nlp_2.12:4.4.2"