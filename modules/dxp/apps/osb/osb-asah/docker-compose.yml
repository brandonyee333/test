services:
    dxpcloudemulator:
        build: ./devtools/dxp-cloud-emulator
        container_name: dxpcloudemulator
        healthcheck:
            interval: 10s
            retries: 10
            start_period: 10s
            test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/status" ]
        ports:
            - "3001:3000"
    osbapiemulator:
        build: ./devtools/osb-api-emulator
        container_name: osbapiemulator
        healthcheck:
            interval: 10s
            retries: 10
            start_period: 10s
            test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/status" ]
        ports:
            - "3002:3000"
    osbasahbackend:
        build:
            args:
                LABEL_BUILD_DATE: ${LABEL_BUILD_DATE}
                LABEL_VCS_REF: ${LABEL_VCS_REF}
            context: ./osb-asah-backend
        container_name: osbasahbackend
        depends_on:
            - osbasahupgrade
        env_file:
            - common.env
            - local.env
        environment:
            - JAVA_OPTS=-Xmx256m
        healthcheck:
            interval: 10s
            retries: 30
            start_period: 120s
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/context"]
        ports:
            - "5010:5005"
            - "8086:8080"
        volumes:
            - export:/export
            - temp:/temp
    osbasahbatchcurator:
        build:
            args:
                LABEL_BUILD_DATE: ${LABEL_BUILD_DATE}
                LABEL_VCS_REF: ${LABEL_VCS_REF}
            context: ./osb-asah-batch-curator
        container_name: osbasahbatchcurator
        depends_on:
            - osbasahupgrade
        env_file:
            - common.env
            - local.env
        environment:
            - JAVA_OPTS=-Xmx512m
        healthcheck:
            interval: 10s
            retries: 30
            start_period: 120s
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/context"]
        ports:
            - "5011:5005"
            - "8087:8080"
        volumes:
            - export:/export
            - temp:/temp
    osbasahextractor:
        build:
            args:
                LABEL_BUILD_DATE: ${LABEL_BUILD_DATE}
                LABEL_VCS_REF: ${LABEL_VCS_REF}
            context: ./osb-asah-extractor
        container_name: osbasahextractor
        depends_on:
            - osbasahpublisher
            - osbasahupgrade
            - pubsubemulator
        env_file:
            - common.env
            - local.env
        environment:
            - JAVA_OPTS=-Xms2765m -Xmx2765m -XX:MaxMetaspaceSize=96m
        healthcheck:
            interval: 10s
            retries: 30
            start_period: 120s
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/context"]
        ports:
            - "5007:5005"
            - "8083:8080"
    osbasahpublisher:
        build:
            args:
                LABEL_BUILD_DATE: ${LABEL_BUILD_DATE}
                LABEL_VCS_REF: ${LABEL_VCS_REF}
            context: ./osb-asah-publisher
        container_name: osbasahpublisher
        depends_on:
            - osbasahupgrade
            - pubsubemulator
        env_file:
            - common.env
            - local.env
        environment:
            - JAVA_OPTS=-Xms96m -Xmx96m
        healthcheck:
            interval: 10s
            retries: 30
            start_period: 120s
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/context"]
        ports:
            - "5008:5005"
            - "8084:8080"
    osbasahredis:
        build: ./osb-asah-redis
        container_name: osbasahredis
        ports:
            - "6379:6379"
    osbasahsalesforceextractor:
        build:
            args:
                LABEL_BUILD_DATE: ${LABEL_BUILD_DATE}
                LABEL_VCS_REF: ${LABEL_VCS_REF}
            context: ./osb-asah-salesforce-extractor
        container_name: osbasahsalesforceextractor
        depends_on:
            - osbasahupgrade
        env_file:
            - common.env
            - local.env
        environment:
            - JAVA_OPTS=-Xmx256m
        healthcheck:
            interval: 10s
            retries: 30
            start_period: 120s
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/context"]
        ports:
            - "5012:5005"
            - "8088:8080"
    osbasahstreamcurator:
        build:
            args:
                LABEL_BUILD_DATE: ${LABEL_BUILD_DATE}
                LABEL_VCS_REF: ${LABEL_VCS_REF}
            context: ./osb-asah-stream-curator
        container_name: osbasahstreamcurator
        depends_on:
            - osbasahupgrade
            - pubsubemulator
        env_file:
            - common.env
            - local.env
        environment:
            - JAVA_OPTS=-Xms96m -Xmx1g -XX:MaxMetaspaceSize=96m
        healthcheck:
            interval: 10s
            retries: 30
            start_period: 120s
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/context"]
        ports:
            - "5006:5005"
            - "8082:8080"
    osbasahupgrade:
        build:
            args:
                LABEL_BUILD_DATE: ${LABEL_BUILD_DATE}
                LABEL_VCS_REF: ${LABEL_VCS_REF}
            context: ./osb-asah-upgrade
        container_name: osbasahupgrade
        depends_on:
             - osbasahredis
             - wedeploy-elasticsearch
        env_file:
            - common.env
            - local.env
        environment:
            - JAVA_OPTS=-Xmx256m
    osbfarofrontend:
        container_name: faro
        environment:
            - FARO_DXP_CLOUD_API_URL=http://dxpcloudemulator:3000/projects/
            - FARO_WEDEPLOY_EMAIL_ADDRESS=test@liferay.com
            - FARO_WEDEPLOY_PASSWORD=test
            - OSB_ASAH_LOCAL_CLUSTER_URL=http://{service}:8080
            - OSB_API_URL=http://osbapiemulator:3000
        image: liferay/com-liferay-osb-faro:latest
        ports:
            - "11311:11311"
            - "8000:8000"
            - "8080:8080"
        volumes:
            - faro:/opt/liferay/data
    postgresql:
        container_name: postgresql
        env_file:
            - postgresql.env
        image: postgres:13.1
        ports:
            - "5432:5432"
    pubsubemulator:
        build: ./devtools/pubsub-emulator
        container_name: pubsubemulator
        ports:
            - "8095:8095"
    trino:
        build: ./osb-asah-trino
        container_name: trino
        depends_on:
            - postgresql
        ports:
            - "9090:8080"
    wedeploy-elasticsearch:
        container_name: wedeploy-elasticsearch
        env_file:
            - elasticsearch.env
        healthcheck:
            interval: 10s
            retries: 3
            start_period: 5s
            test: ["CMD", "curl", "-f", "http://localhost:9200"]
            timeout: 10s
        image: docker.elastic.co/elasticsearch/elasticsearch-oss:7.9.2
        ports:
            - "9200:9200"
            - "9300:9300"
        volumes:
            - esdata1:/usr/share/elasticsearch/data
    wedeploy-kibana:
        container_name: wedeploy-kibana
        depends_on:
            - wedeploy-elasticsearch
        environment:
            - ELASTICSEARCH_HOSTS=http://wedeploy-elasticsearch:9200
        image: docker.elastic.co/kibana/kibana-oss:7.9.2
        ports:
            - "5601:5601"
        volumes:
            - kibanadata:/usr/share/kibana/data
version: "2.4"
volumes:
    backup:
        driver: local
    esdata1:
        driver: local
    export:
        driver: local
    faro:
        driver: local
    kibanadata:
        driver: local
    temp:
        driver: local