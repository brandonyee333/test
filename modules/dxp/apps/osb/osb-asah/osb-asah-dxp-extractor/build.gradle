apply plugin: "com.liferay.dependency.local.copy"
apply plugin: "com.liferay.spring.boot.defaults"

dependencies {
	compile group: "com.liferay", name: "com.liferay.petra.json.web.service.client", version: "7.1.0"
	compile group: "local.copy", name: ":dxp:apps:osb:osb-asah:osb-asah-common"

	testCompile group: "local.copy", name: ":dxp:apps:osb:osb-asah:osb-asah-test-util"
}

testIntegration {
	doFirst {
		environment "OSB_ASAH_DXP_EXTRACTOR_URL", "http://localhost:8080"
		environment "OSB_ASAH_PUBSUB_EMULATOR_URL", "http://127.0.0.1:8095"
	}
}