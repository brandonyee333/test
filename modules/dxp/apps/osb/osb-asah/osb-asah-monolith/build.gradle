apply plugin: "com.liferay.spring.boot.defaults"

configurations.all {
	exclude group: "com.google.cloud", module: "google-cloud-pubsub"
	exclude group: "org.springframework.data", module: "spring-data-redis"
	exclude group: "redis.clients", module: "jedis"
}

dependencies {
	implementation project(":dxp:apps:osb:osb-asah:osb-asah-backend")
	implementation project(":dxp:apps:osb:osb-asah:osb-asah-batch-curator")
	implementation project(":dxp:apps:osb:osb-asah:osb-asah-common")
	implementation project(":dxp:apps:osb:osb-asah:osb-asah-dxp-extractor")
	implementation project(":dxp:apps:osb:osb-asah:osb-asah-extractor")
	implementation project(":dxp:apps:osb:osb-asah:osb-asah-publisher")
	implementation project(":dxp:apps:osb:osb-asah:osb-asah-salesforce-extractor")
	implementation project(":dxp:apps:osb:osb-asah:osb-asah-stream-curator")
	implementation project(":dxp:apps:osb:osb-asah:osb-asah-upgrade")

	compile (group: "org.apache.httpcomponents", name: "httpcore", version: "4.4.10") {
		force = true
	}

	testCompile group: "junit", name: "junit", version: "4.12"

	testImplementation project(":dxp:apps:osb:osb-asah:osb-asah-test-util")
}