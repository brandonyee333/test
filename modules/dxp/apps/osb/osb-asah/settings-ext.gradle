String projectPathPrefix = properties["project.path.prefix"]

rootDir.eachDir {
	File subprojectDir ->

	if (subprojectDir.name.equals("devtools")) {
		subprojectDir.eachDir {
			File devtoolsProjectDir ->

			File devtoolsSrcDir = new File(devtoolsProjectDir, "src")

			if (!devtoolsSrcDir.exists()) {
				return
			}

			String devtoolsSubprojectName = "${projectPathPrefix}:${devtoolsProjectDir.name}"

			include devtoolsSubprojectName

			ProjectDescriptor projectDescriptor = project(devtoolsSubprojectName)

			projectDescriptor.projectDir = devtoolsProjectDir
		}
	}

	File srcDir = new File(subprojectDir, "src")

	if (!srcDir.exists()) {
		return
	}

	if (gradle.startParameter.taskNames.contains("assemble") && subprojectDir.name.equals("osb-asah-spark-python")) {
		return
	}

	String subprojectName = "${projectPathPrefix}:${subprojectDir.name}"

	include subprojectName

	ProjectDescriptor projectDescriptor = project(subprojectName)

	projectDescriptor.projectDir = subprojectDir
}