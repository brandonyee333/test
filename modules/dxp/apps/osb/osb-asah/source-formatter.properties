##
## Exclusions
##
## See https://github.com/liferay/liferay-portal/blob/master/source-formatter.properties
## for available properties.
##

    source.formatter.excludes=\
        **/osb-asah-publisher/**/analytics_events_message_invalid_syntax.json,\
        **/osb-asah-spark/.bootstrap/**,\
        **/osb-asah-spark/.envs/**,\
        **/osb-asah-stream-curator/src/main/resources/profile/**

    checkstyle.ChainingCheck.allowedClassNames=\
        AggregationBuilder,\
        BoolQueryBuilderUtil,\
        DoubleTensor,\
        JSONArrayIterator,\
        JSONUtil

    checkstyle.ChainingCheck.allowedMethodNames=\
        greaterThanOrEqual,\
        logProb,\
        minus,\
        plus,\
        prob,\
        put,\
        terms,\
        times,\
        toGreaterThanOrEqualToMask,\
        topHits

    run.outside.portal.excludes=**

##
## Git
##

    git.liferay.portal.branch=7.0.x

##
## Source Check Properties
##

    source.check.JavaAPISignatureCheck.enabled=false

    source.check.JSONLineBreakCheck.enabled=false

    source.check.YMLLongLinesCheck.enabled=false

    source.check.YMLStylingCheck.enabled=false

    source.check.YMLWhitespaceCheck.enabled=false