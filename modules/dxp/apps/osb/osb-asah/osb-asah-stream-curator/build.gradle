import com.liferay.gradle.util.FileUtil
import com.liferay.gradle.util.copy.StripPathSegmentsAction

apply plugin: "com.liferay.spring.boot.defaults"
apply plugin: "io.spring.dependency-management"

ext["junit-jupiter.version"] = "5.8.2"
ext["log4j2.version"] = "2.17.0"

bootJar {
	classifier = "application"
}

configurations.all {
	exclude group: "org.apache.geronimo.bundles", module: "json"
}

File langDetectProfileDir = file("src/main/resources/com/liferay/osb/asah/stream/curator/nlp/profile")

dependencies {
	compile classifier: "models", group: "edu.stanford.nlp", name: "stanford-corenlp", version: "4.4.0"
	compile group: "com.cybozu.labs", name: "langdetect", version: "1.1-20120112"
	compile group: "com.fasterxml.jackson.datatype", name: "jackson-datatype-jdk8", version: "2.9.8"
	compile group: "com.fasterxml.jackson.datatype", name: "jackson-datatype-json-org", version: "2.9.8"
	compile group: "com.fasterxml.jackson.datatype", name: "jackson-datatype-jsr310", version: "2.9.8"
	compile group: "edu.stanford.nlp", name: "stanford-corenlp", version: "4.4.0"
	compile project(configuration: "default", path: ":dxp:apps:osb:osb-asah:osb-asah-common")

	testCompile project(configuration: "default", path: ":dxp:apps:osb:osb-asah:osb-asah-test-util")
}

if (!langDetectProfileDir.exists()) {
	task unzipLangDetectProfile(type: Copy)

	processResources {
		dependsOn unzipLangDetectProfile
	}

	unzipLangDetectProfile {
		eachFile new StripPathSegmentsAction(1)

		from {
			zipTree(FileUtil.get(project, "https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/language-detection/langdetect-09-13-2011.zip"))
		}

		include "profiles/"
		includeEmptyDirs = false
		into langDetectProfileDir
	}
}

jar {
	enabled = true
}