apply plugin: "com.liferay.scala.defaults"

dependencies {
	compile group: "org.apache.spark", name: "spark-core_2.12", version: "3.1.0"
	compile group: "org.apache.spark", name: "spark-sql_2.12", version: "3.1.0"
	compile group: "org.scala-lang", name: "scala-library", version: "2.12"

	spotbugsMain.enabled = false

	testCompile group: "com.vladsch.flexmark", name: "flexmark-all", version: "0.35.10"
	testCompile group: "junit", name: "junit", version: "4.12"
	testCompile group: "org.scalatest", name: "scalatest_2.12", version: "3.2.9"
}