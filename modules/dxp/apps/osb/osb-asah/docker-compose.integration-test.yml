services:
    test_elasticsearch:
        container_name: test_elasticsearch
        env_file:
            - elasticsearch.env
        healthcheck:
            interval: 10s
            retries: 3
            start_period: 5s
            test: ["CMD", "curl", "-f", "http://localhost:9200"]
            timeout: 10s
        image: docker.elastic.co/elasticsearch/elasticsearch-oss:7.9.2
        mem_limit: 2g
        ports:
            - 9200:9200
            - 9300:9300
        restart: always
    test_postgresql:
        container_name: test_postgresql
        env_file:
            - postgresql.env
        image: postgres:13.1
        mem_limit: 2g
        ports:
            - "5432:5432"
        restart: always
    test_pubsubemulator:
        build: ./devtools/pubsub-emulator
        container_name: test_pubsubemulator
        mem_limit: 1g
        ports:
            - "8095:8095"
        restart: always
    test_redis:
        build: ./osb-asah-redis
        container_name: test_redis
        ports:
            - "6379:6379"
    test_trino:
        build: ./osb-asah-trino
        container_name: test_trino
        depends_on:
            - test_postgresql
        ports:
            - "9090:8080"
version: "2.3"