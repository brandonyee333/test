services:
    test_elasticsearch:
        container_name: test_elasticsearch
        env_file:
            - elasticsearch.env
        healthcheck:
            interval: 10s
            retries: 3
            start_period: 5s
            test: ["CMD", "curl", "-f", "http://localhost:9200"]
            timeout: 10s
        image: docker.elastic.co/elasticsearch/elasticsearch-oss:7.8.1
        mem_limit: 1g
        ports:
            - 9200:9200
            - 9300:9300
        restart: always
    test_osbasahpubsubemulator:
        build: osb-asah-pubsub-emulator
        container_name: test_osbasahpubsubemulator
        mem_limit: 1g
        ports:
            - "8095:8095"
        restart: always
version: "2.3"