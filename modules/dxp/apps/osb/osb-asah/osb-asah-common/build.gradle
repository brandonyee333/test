apply plugin: "com.liferay.spring.boot.defaults"
apply plugin: "io.spring.dependency-management"

sourceCompatibility = "1.8"
targetCompatibility = "1.8"

ext["junit-jupiter.version"] = "5.8.2"
ext["log4j2.version"] = "2.17.0"

group = "com.liferay"

bootJar {
	enabled = false
}

configurations.all {
	exclude group: "com.vaadin.external.google", module: "android-json"
	exclude group: "org.apache.geronimo.bundles", module: "json"
	exclude group: "org.slf4j", module: "slf4j-log4j12"
}

dependencies {
	compile group: "com.esotericsoftware", name: "kryo", version: "5.2.0"
	compile group: "com.fasterxml.jackson.datatype", name: "jackson-datatype-jdk8", version: "2.9.8"
	compile group: "com.fasterxml.jackson.datatype", name: "jackson-datatype-json-org", version: "2.9.8"
	compile group: "com.fasterxml.jackson.datatype", name: "jackson-datatype-jsr310", version: "2.9.8"
	compile group: "com.github.ben-manes.caffeine", name: "caffeine", version: "2.9.2"
	compile group: "com.github.loki4j", name: "loki-logback-appender-jdk8", version: "1.2.0"
	compile group: "com.google.cloud", name: "google-cloud-pubsub", version: "1.103.1"
	compile group: "com.google.cloud", name: "google-cloud-storage", version: "1.107.0"
	compile group: "com.graphql-java", name: "graphql-java", version: "6.0"
	compile group: "com.joestelmach", name: "natty", version: "0.11"
	compile group: "com.univocity", name: "univocity-parsers", version: "2.4.1"
	compile group: "commons-io", name: "commons-io", version: "2.6"
	compile group: "commons-logging", name: "commons-logging", version: "1.2"
	compile group: "io.micrometer", name: "micrometer-registry-prometheus"
	compile group: "io.projectreactor", name: "reactor-core", version: "3.4.1"
	compile group: "io.trino", name: "trino-jdbc", version: "353"
	compile group: "org.apache.commons", name: "commons-collections4", version: "4.4"
	compile group: "org.apache.commons", name: "commons-lang3", version: "3.7"
	compile group: "org.apache.hadoop", name: "hadoop-client", version: "3.3.0"
	compile group: "org.apache.httpcomponents", name: "httpclient", version: "4.5.13"

	compile (group: "org.apache.httpcomponents", name: "httpcore", version: "4.4.10") {
		force = true
	}

	compile group: "org.apache.parquet", name: "parquet-avro", version: "1.11.1"
	compile group: "org.aspectj", name: "aspectjweaver", version: "1.9.6"
	compile group: "org.codehaus.janino", name: "janino", version: "3.1.3"
	compile group: "org.elasticsearch", name: "elasticsearch", version: "7.9.2"
	compile group: "org.elasticsearch.client", name: "elasticsearch-rest-high-level-client", version: "7.9.2"
	compile group: "org.elasticsearch.client", name: "transport", version: "7.9.2"
	compile group: "org.elasticsearch.client", name: "x-pack-transport", version: "7.9.2"
	compile group: "org.jooq", name: "jooq", version: "3.14.8"
	compile group: "org.json", name: "json"
	compile group: "org.owasp.esapi", name: "esapi", version: "2.2.3.1"
	compile group: "org.postgresql", name: "postgresql", version: "42.2.18"
	compile group: "org.springframework.boot", name: "spring-boot-starter-actuator"
	compile group: "org.springframework.boot", name: "spring-boot-starter-data-jdbc"
	compile group: "org.springframework.boot", name: "spring-boot-starter-data-redis"
	compile group: "org.springframework.boot", name: "spring-boot-starter-validation"
	compile group: "org.springframework.boot", name: "spring-boot-starter-web"
	compile group: "org.springframework.retry", name: "spring-retry"
	compile group: "org.springframework.security.oauth", name: "spring-security-oauth", version: "2.5.0.RELEASE"
	compile group: "org.springframework.security.oauth", name: "spring-security-oauth2", version: "2.5.0.RELEASE"
	compile group: "redis.clients", name: "jedis"

	testCompile group: "io.rest-assured", name: "json-schema-validator", version: "3.2.0"
	testCompile group: "io.rest-assured", name: "rest-assured", version: "3.2.0"

	testCompile group: "org.skyscreamer", name: "jsonassert", transitive: false
	testCompile group: "org.springframework.boot", name: "spring-boot-starter-test"
	testCompile project(configuration: "default", path: ":dxp:apps:osb:osb-asah:osb-asah-test-util")
}

jar {
	enabled = true
}