import org.springframework.boot.gradle.dependencymanagement.DependencyManagementPluginFeatures

apply plugin: "com.liferay.dependency.local.copy"
apply plugin: "com.liferay.source.formatter"
apply plugin: "com.liferay.source.formatter.defaults"
apply plugin: "com.liferay.spring.boot.defaults"
apply plugin: "eclipse"
apply plugin: "idea"
apply plugin: "io.spring.dependency-management"
apply plugin: "java"

sourceCompatibility = "1.8"
targetCompatibility = "1.8"

group = "com.liferay"

bootRepackage {
	enabled = false
}

configurations.all {
	exclude group: "org.apache.geronimo.bundles", module: "json"
	exclude group: "com.vaadin.external.google", module: "android-json"
}

dependencies {
	compile group: "com.fasterxml.jackson.datatype", name: "jackson-datatype-jdk8", version: "2.8.4"
	compile group: "com.fasterxml.jackson.datatype", name: "jackson-datatype-json-org", version: "2.8.4"
	compile group: "com.fasterxml.jackson.datatype", name: "jackson-datatype-jsr310", version: "2.8.4"
	compile group: "com.google.cloud", name: "google-cloud-pubsub", version: "1.103.1"
	compile group: "com.google.cloud", name: "google-cloud-storage", version: "1.107.0"
	compile group: "com.joestelmach", name: "natty", version: "0.11"
	compile group: "com.univocity", name: "univocity-parsers", version: "2.4.1"
	compile group: "commons-io", name: "commons-io", version: "2.6"
	compile group: "commons-logging", name: "commons-logging", version: "1.2"
	compile group: "io.prometheus", name: "simpleclient_spring_boot", version: "0.1.0"
	compile group: "org.apache.commons", name: "commons-lang3", version: "3.7"
	compile group: "org.elasticsearch", name: "elasticsearch", version: "7.8.1"
	compile group: "org.elasticsearch.client", name: "transport", version: "7.8.1"
	compile group: "org.json", name: "json"
	compile group: "org.springframework.boot", name: "spring-boot-starter-web"
	compile group: "org.springframework.data", name: "spring-data-redis"
	compile group: "org.springframework.retry", name: "spring-retry"
	compile group: "org.springframework.security.oauth", name: "spring-security-oauth", version: "2.3.3.RELEASE"
	compile group: "org.springframework.security.oauth", name: "spring-security-oauth2", version: "2.3.3.RELEASE"
	compile group: "redis.clients", name: "jedis"

	testCompile group: "io.rest-assured", name: "json-schema-validator", version: "3.2.0"
	testCompile group: "io.rest-assured", name: "rest-assured", version: "3.2.0"
	testCompile group: "junit", name: "junit", version: "4.12"
	testCompile group: "local.copy", name: ":dxp:apps:osb:osb-asah:osb-asah-test-util"
	testCompile group: "org.skyscreamer", name: "jsonassert", transitive: false
	testCompile group: "org.springframework.boot", name: "spring-boot-starter-test"
}

dependencyManagement {
	imports {
		mavenBom "org.springframework.boot:spring-boot-dependencies:${DependencyManagementPluginFeatures.class.package.implementationVersion}"
	}
}

testIntegration {
	doFirst {
		environment "LCP_ENGINE_ELASTICSEARCH_SERVER_IP", "127.0.0.1"
		environment "OSB_ASAH_PUBSUB_EMULATOR_URL", "http://127.0.0.1:8095"
	}
}