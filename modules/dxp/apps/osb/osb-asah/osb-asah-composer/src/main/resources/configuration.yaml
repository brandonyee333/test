commerce_dataproc_trigger:
  dataproc:
    bucket: "{{ dag.default_args['project_id'] }}-dataproc-{{ dag.default_args['region'] }}"
    cluster:
      idle_delete_ttl: 900
      image_version: '1.4'
      master:
        count: 1
        disk_size:
        disk_type: pd-standard
        machine_type: n1-standard-4
      metadata: !!str >
        {
          "MINICONDA_VARIANT": "3"
        }
      name_prefix: commerce
      worker:
        count: 0
        disk_size:
        disk_type: pd-ssd
        machine_type: n1-standard-8
    pyspark:
      configuration: commerce_application.yaml
      properties: !!str >
        {
          "spark.executorEnv.DATASOURCEID": "{{ dag_run.conf['datasourceId'] }}",
          "spark.yarn.appMasterEnv.DATASOURCEID": "{{ dag_run.conf['datasourceId'] }}",
          "spark.executorEnv.GOOGLE_STORAGE_BUCKET": "{{ dag.default_args['project_id'] }}-dataflow",
          "spark.yarn.appMasterEnv.GOOGLE_STORAGE_BUCKET": "{{ dag.default_args['project_id'] }}-dataflow",
          "spark.executor.extraJavaOptions": "-XX:ThreadStackSize=8192",
          "spark.serializer": "org.apache.spark.serializer.KryoSerializer",
          "spark.executor.instances": "8",
          "spark.executor.memory": "8g",
          "spark.executor.memoryOverhead": "1536"
        }
pubsub_dag_trigger:
  pubsub:
    subscription: ac-{{ dag.default_args['lcp_project_id'] }}_composer
  trigger:
    dag:
      id: commerce_dataproc_trigger