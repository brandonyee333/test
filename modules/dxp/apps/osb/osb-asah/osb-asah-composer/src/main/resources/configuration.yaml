commerce_dataproc_trigger:
    dataproc:
        bucket: "{{ dag.default_args['project_id'] }}-dataproc-{{ dag.default_args['region'] }}"
        cluster:
            idle_delete_ttl: 900
            image_version: '1.4'
            master:
                count: 1
                disk_size:
                disk_type: pd-standard
                machine_type: n1-standard-4
            metadata: !!str >
                {
                    "MINICONDA_VARIANT": "3"
                }
            name: "commerce-{{ dag_run.conf['datasourceId'] }}-{{ ds_nodash }}"
            name_prefix: commerce
            properties:
            worker:
                count: 0
                disk_size:
                disk_type: pd-ssd
                machine_type: n1-standard-8
        pyspark:
            configuration: commerce_application.yaml
            properties: !!str >
                {
                    "spark.executor.extraJavaOptions": "-XX:ThreadStackSize=8192",
                    "spark.executor.instances": "8",
                    "spark.executor.memory": "8g",
                    "spark.executor.memoryOverhead": "1536",
                    "spark.executorEnv.DATASOURCEID": "{{ dag_run.conf['datasourceId'] }}",
                    "spark.executorEnv.GOOGLE_STORAGE_BUCKET": "{{ dag.default_args['project_id'] }}-dataflow",
                    "spark.serializer": "org.apache.spark.serializer.KryoSerializer",
                    "spark.yarn.appMasterEnv.DATASOURCEID": "{{ dag_run.conf['datasourceId'] }}",
                    "spark.yarn.appMasterEnv.GOOGLE_STORAGE_BUCKET": "{{ dag.default_args['project_id'] }}-dataflow"
                }
interest_score_dag_trigger:
    dataproc:
        bucket: "{{ dag.default_args['project_id'] }}-dataproc-{{ dag.default_args['region'] }}"
        cluster:
            idle_delete_ttl: 900
            image_version: '2.0'
            master:
                count: 1
                disk_size:
                disk_type: pd-standard
                machine_type: n1-standard-4
            metadata: !!str >
                {
                    "MINICONDA_VARIANT": "3",
                    "MINICONDA_VERSION": "latest"
                }
            name: "interest-score-{{ dag.default_args['ac_project_id'] | truncate(20, True, '') }}-{{ ds_nodash }}"
            properties: !!str >
                {
                    "dataproc:pip.packages": "spark-nlp==4.4.2,google-cloud-bigquery==3.3.5"
                }
            worker:
                count: 2
                disk_size:
                disk_type: pd-ssd
                machine_type: n1-standard-8
        pyspark:
            configuration: interest_score.yaml
            properties: !!str >
                {
                    "spark.serializer": "org.apache.spark.serializer.KryoSerializer",
                    "spark.jars.packages": "com.johnsnowlabs.nlp:spark-nlp_2.12:4.4.2",
                    "spark.jars": "gs://spark-lib/bigquery/spark-bigquery-latest_2.12.jar"
                }
pubsub_dag_trigger:
    dag:
        id: commerce_dataproc_trigger
    pubsub:
        subscription: ac-{{ dag.default_args['lcp_project_id'] }}_composer