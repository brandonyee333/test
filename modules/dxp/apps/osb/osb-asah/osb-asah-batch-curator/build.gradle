import com.liferay.gradle.util.FileUtil
import com.liferay.gradle.util.copy.StripPathSegmentsAction

apply plugin: "com.liferay.dependency.local.copy"
apply plugin: "com.liferay.spring.boot.defaults"

configurations.all {
	exclude group: "org.apache.geronimo.bundles", module: "json"
}

File langDetectProfileDir = file("src/main/resources/com/liferay/osb/asah/batch/curator/nlp/profile")

dependencies {
	compile classifier: "models", group: "edu.stanford.nlp", name: "stanford-corenlp", version: "3.9.2"
	compile group: "cc.mallet", name: "mallet", version: "2.0.8"
	compile group: "com.amazonaws", name: "aws-java-sdk-personalize", version: "1.11.764"
	compile group: "com.cybozu.labs", name: "langdetect", version: "1.1-20120112"
	compile group: "com.fasterxml.jackson.datatype", name: "jackson-datatype-json-org", version: "2.8.4"
	compile group: "com.google.cloud", name: "google-cloud-dataproc", version: "0.119.0"
	compile group: "edu.stanford.nlp", name: "stanford-corenlp", version: "3.9.2"
	compile group: "local.copy", name: ":dxp:apps:osb:osb-asah:osb-asah-common"
	compile group: "net.arnx", name: "jsonic", version: "1.2.9"

	testCompile group: "junit", name: "junit", version: "4.12"
	testCompile group: "local.copy", name: ":dxp:apps:osb:osb-asah:osb-asah-test-util"
}

if (!langDetectProfileDir.exists()) {
	task unzipLangDetectProfile(type: Copy)

	processResources {
		dependsOn unzipLangDetectProfile
	}

	unzipLangDetectProfile {
		eachFile new StripPathSegmentsAction(1)

		from {
			zipTree(FileUtil.get(project, "https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/language-detection/langdetect-09-13-2011.zip"))
		}

		include "profiles/"
		includeEmptyDirs = false
		into langDetectProfileDir
	}
}

testIntegration {
	doFirst {
		environment "OSB_ASAH_PUBSUB_EMULATOR_URL", "http://127.0.0.1:8095"
	}
}