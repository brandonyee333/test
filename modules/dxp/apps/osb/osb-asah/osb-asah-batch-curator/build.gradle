apply plugin: "com.liferay.spring.boot.defaults"
apply plugin: "io.spring.dependency-management"

bootJar {
	classifier = "application"
}

configurations.all {
	exclude group: "org.apache.geronimo.bundles", module: "json"
}

dependencies {
	compile group: "cc.mallet", name: "mallet", version: "2.0.8"
	compile group: "com.amazonaws", name: "aws-java-sdk-personalize", version: "1.11.764"
	compile group: "com.fasterxml.jackson.datatype", name: "jackson-datatype-json-org", version: "2.9.8"
	compile group: "com.google.cloud", name: "google-cloud-dataproc", version: "0.119.0"
	compile group: "net.arnx", name: "jsonic", version: "1.2.9"

	implementation project(":dxp:apps:osb:osb-asah:osb-asah-common")

	testCompile group: "junit", name: "junit", version: "4.12"

	testImplementation project(":dxp:apps:osb:osb-asah:osb-asah-test-util")
}

jar {
	enabled = true
}

testIntegration {
	doFirst {
		environment "OSB_ASAH_PUBSUB_EMULATOR_URL", "http://127.0.0.1:8095"
	}
}