apply plugin: "com.liferay.spring.boot.defaults"
apply plugin: "io.spring.dependency-management"

ext["junit-jupiter.version"] = "5.8.2"
ext["log4j2.version"] = "2.17.0"

bootJar {
	classifier = "application"
}

configurations.all {
	exclude group: "org.apache.geronimo.bundles", module: "json"
}

dependencies {
	compile group: "cc.mallet", name: "mallet", version: "2.0.8"
	compile group: "com.fasterxml.jackson.datatype", name: "jackson-datatype-json-org", version: "2.9.8"
	compile group: "net.arnx", name: "jsonic", version: "1.2.9"
	compile group: "org.apache.commons", name: "commons-collections4", version: "4.4"
	compile group: "org.apache.commons", name: "commons-lang3", version: "3.7"
	compile project(configuration: "default", path: ":dxp:apps:osb:osb-asah:osb-asah-common")

	testCompile project(configuration: "default", path: ":dxp:apps:osb:osb-asah:osb-asah-test-util")
}

jar {
	enabled = true
}