aws:
    access:
        key:
            id: $AWS_ACCESS_KEY_ID
    secret:
        access:
            key: $AWS_SECRET_ACCESS_KEY
    storage:
        path: s3a://analytics-cloud-aws-personalize
es:
    net:
        http:
            auth:
                pass: $ES_NET_HTTP_AUTH_PASS
                user: $ES_NET_HTTP_AUTH_USER
    nodes: http://localhost:9200
google:
    storage:
        path: gs://analytics-cloud-analytics-events-uat
spark:
    jars:
        packages: "org.apache.hadoop:hadoop-aws:2.7.3,org.elasticsearch:elasticsearch-spark-20_2.11:6.8.2"