apply plugin: "com.liferay.spring.boot.defaults"

dependencies {
	compile ext: "gz", group: "com.liferay", name: "com.51degrees.dat.enterprise", version: "latest.release"
	compile ext: "gz", group: "com.liferay", name: "com.maxmind.geoip.dat", version: "20180327"
	compile group: "com.51degrees", name: "device-detection-core", version: "3.2.17.2"
	compile group: "com.maxmind.geoip", name: "geoip-api", version: "1.3.1"

	implementation project(":dxp:apps:osb:osb-asah:osb-asah-common")

	testImplementation project(":dxp:apps:osb:osb-asah:osb-asah-test-util")
}

processResources {
	into("META-INF") {
		from configurations.compile
		include "**/*.gz"
	}
}

testIntegration {
	doFirst {
		environment "LCP_PROJECT_ID", "test"
		environment "OSB_ASAH_PUBSUB_EMULATOR_URL", "http://127.0.0.1:8095"
	}
}