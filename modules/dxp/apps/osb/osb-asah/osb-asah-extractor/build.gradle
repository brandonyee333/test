apply plugin: "com.liferay.spring.boot.defaults"
apply plugin: "io.spring.dependency-management"

ext["junit-jupiter.version"] = "5.8.2"
ext["log4j2.version"] = "2.16.0"

bootJar {
	classifier = "application"
}

dependencies {
	compile ext: "gz", group: "com.liferay", name: "com.maxmind.geoip.dat", version: "20180327"
	compile group: "com.blueconic", name: "browscap-java", version: "latest.release"
	compile group: "com.maxmind.geoip", name: "geoip-api", version: "1.3.1"
	compile project(configuration: "default", path: ":dxp:apps:osb:osb-asah:osb-asah-common")

	testCompile project(configuration: "default", path: ":dxp:apps:osb:osb-asah:osb-asah-test-util")
}

jar {
	enabled = true
}

processResources {
	into("META-INF") {
		from configurations.compile
		include "**/*.gz"
	}
}