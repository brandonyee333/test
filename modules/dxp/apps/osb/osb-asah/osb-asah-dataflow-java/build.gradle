ext {
	maxmindGeoIPVersion = "20180327"
}

configurations.all {
	resolutionStrategy.eachDependency {
		DependencyResolveDetails dependencyResolveDetails ->

		if (dependencyResolveDetails.requested.group == 'org.apache.logging.log4j') {
			dependencyResolveDetails.useVersion '2.17.0'
		}
	}
}

repositories {
	maven {
		url "http://packages.confluent.io/maven"
	}
}

dependencies {
	compile ext: "gz", group: "com.liferay", name: "com.maxmind.geoip.dat", version: "${maxmindGeoIPVersion}"
	compile group: "com.blueconic", name: "browscap-java", version: "latest.release"
	compile group: "com.maxmind.geoip", name: "geoip-api", version: "1.3.1"
	compile group: "org.apache.beam", name: "beam-runners-direct-java", version: "2.38.0"
	compile group: "org.apache.beam", name: "beam-runners-google-cloud-dataflow-java", version: "2.38.0"
	compile group: "org.apache.beam", name: "beam-sdks-java-core", version: "2.38.0"
	compile group: "org.apache.beam", name: "beam-sdks-java-extensions-google-cloud-platform-core", version: "2.38.0"
	compile group: "org.apache.beam", name: "beam-sdks-java-io-google-cloud-platform", version: "2.38.0"
	compile group: "org.apache.commons", name: "commons-lang3", version: "3.7"
	compile group: "org.slf4j", name: "slf4j-api", version: "1.7.32"

	testCompile group: "org.junit.jupiter", name: "junit-jupiter", version: "5.8.2"
}

task execute(type: JavaExec)

execute {
	args System.getProperty("exec.args") ? System.getProperty("exec.args").split() : []
	classpath = sourceSets.main.runtimeClasspath
	main = System.getProperty("exec.mainClass")
}

processResources {
	into("META-INF") {
		from configurations.compile
		include "**/*.gz"
		rename {
			String fileName -> fileName.replace("-${maxmindGeoIPVersion}", "")
		}
	}
}