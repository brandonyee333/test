apply plugin: "com.liferay.lang.merger"

dependencies {
	compileInclude group: "org.scribe", name: "scribe", version: "1.3.6"

	compileOnly group: "com.liferay", name: "com.liferay.petra.string", version: "1.0.0"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "2.0.0"
	compileOnly group: "javax.portlet", name: "portlet-api", version: "2.0"
	compileOnly group: "javax.servlet", name: "javax.servlet-api", version: "3.0.1"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.3.0"
	compileOnly project(":private:apps:osb-testray:osb-testray-api")
}

mergeLang {
	sourceDirs = [
		"../osb-testray-lang/src/main/resources/content"
	]
}