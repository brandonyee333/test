import com.bmuschko.gradle.docker.tasks.container.*
import com.bmuschko.gradle.docker.tasks.image.*

import com.liferay.gradle.plugins.app.docker.AppDockerPlugin
import com.liferay.gradle.util.FileUtil
import com.liferay.gradle.util.GradleUtil
import com.liferay.gradle.util.OSDetector

import javax.management.remote.JMXConnectorFactory as JmxFactory
import javax.management.remote.JMXServiceURL as JmxUrl

import org.gradle.testing.jacoco.plugins.JacocoPlugin

import org.kt3k.gradle.plugin.CoverallsPlugin

buildscript {
	dependencies {
		classpath group: "com.bmuschko", name: "gradle-docker-plugin", version: "3.2.0"
		classpath group: "com.liferay", name: "com.liferay.gradle.plugins.app.docker", version: "1.0.3"
		classpath group: "org.kt3k.gradle.plugin", name: "coveralls-gradle-plugin", version: "2.6.3"
	}

	repositories {
		maven {
			url "https://cdn.lfrs.sl/repository.liferay.com/nexus/content/groups/public"
		}
	}
}

apply plugin: com.bmuschko.gradle.docker.DockerRemoteApiPlugin
apply plugin: CoverallsPlugin

allprojects {
	apply plugin: JacocoPlugin

	configurations {
		jolokiaAgent
	}

	dependencies {
		jolokiaAgent group: "org.jolokia", name: "jolokia-jvm", version: "1.3.7", classifier: "agent"
	}

	jacoco {
		toolVersion = "0.7.8"
	}

	repositories {
		mavenLocal()

		maven {
			url "https://cdn.lfrs.sl/repository.liferay.com/nexus/content/groups/public"
		}
	}

	task copyJolokiaAgent(type: Copy) {
		from configurations.jolokiaAgent
		into "${rootDir}/pulpo-connector-de-docker/jolokia/lib"
		rename { fileName ->
			def artifacts = configurations.jolokiaAgent.resolvedConfiguration.resolvedArtifacts
			def artifact = artifacts.find { it.file.name == fileName }
			"jolokia-${artifact.classifier}.${artifact.extension}"
		}
	}
}

configure(subprojects.findAll {!it.childProjects}) {
	liferay {
		deployDir = getClientDeployDir()
	}

	task copyJacocoAgent(type: Copy) {
		configurations.jacocoAgent.asFileTree.each {
			from( zipTree(it) )
		}
		into "${rootDir}/build/jacoco"
	}

	test {
		ignoreFailures = false
	}

	testIntegration {
		def browser = System.getenv().get("PULPO_TEST_BROWSER") ?: project.property("com.liferay.pulpo.connector.de.browser")

		environment "PULPO_TEST_BROWSER", browser

		def connectorUrl = System.getenv().get("PULPO_TEST_CONNECTOR_DE_URL") ?: project.property("com.liferay.pulpo.connector.de.url")

		environment "PULPO_TEST_CONNECTOR_DE_URL", connectorUrl

		ignoreFailures = false

		testLogging {
			events "started", "passed", "skipped", "failed", "standardOut", "standardError"
			showExceptions true
			exceptionFormat "full"
			showCauses true
			showStackTraces true
		}
	}

	setUpTestableTomcat {
		enabled = false
	}

	startTestableTomcat {
		enabled = false
	}

	stopTestableTomcat {
		enabled = false
	}

	group project.property("com.liferay.pulpo.connector.de.group.name")
}

if (GradleUtil.getProperty(project, "com.liferay.pulpo.connector.de.docker.apply.plugin").toBoolean()) {
	apply plugin: AppDockerPlugin

	appDocker {
		imageName this.getImageName()
		imageUser this.getUserName()
		inputDir "pulpo-connector-de-docker"
	}

	docker {
		registryCredentials {
			username = System.getenv().get("DOCKER_USER")
			password = System.getenv().get("DOCKER_PWD")
		}
	}

	buildAppDockerImage {
		dependsOn copyJolokiaAgent

		buildAppDockerImage.dependsOn subprojects.findAll{!it.childProjects}.deploy
	}

	allprojects {
		ext {
			dockerDestinationDir = prepareAppDockerImageInputDir.destinationDir
		}
	}

	// This avoids the plugin builing the image again on push

	pushAppDockerImage.dependsOn = []

	afterEvaluate {
		for (DockerTagImage dockerTagImage in tasks.withType(DockerTagImage)) {
			dockerTagImage.dependsOn = []
			dockerTagImage.imageId = "${appDocker.imageUser}/${appDocker.imageName}"
		}
	}
}

task checkDocker() {
	doLast {
		def url = "http://localhost:8080"

		println("Trying to reach " + url)

		while (true) {
			try {
				print(".")

				url.toURL().text

				println("Portal startup finished")

				break
			}
			catch (Exception e) {
				Thread.sleep(1000)
			}
		}
	}
}

def getClientDeployDir() {
	return new File(rootDir, project.property('com.liferay.pulpo.connector.de.deploy.dir'))
}

def osbLcsGatewayHostName = System.getenv().get("OSB_LCS_GATEWAY_WEB_HOST_NAME")
def osbLcsGatewayHostPort = System.getenv().get("OSB_LCS_GATEWAY_WEB_HOST_PORT")
def osbLcsGatewayWebIp = System.getenv().get("OSB_LCS_GATEWAY_WEB_IP")
def osbLcsGatewayWebProtocol = System.getenv().get("OSB_LCS_GATEWAY_WEB_PROTOCOL")
def osbLcsPortletHostName = System.getenv().get("OSB_LCS_PORTLET_HOST_NAME")
def osbLcsPortletEmail = System.getenv().get("OSB_LCS_PORTLET_EMAIL")
def osbLcsPortletHostPort = System.getenv().get("OSB_LCS_PORTLET_HOST_PORT")
def osbLcsPortletIp = System.getenv().get("OSB_LCS_PORTLET_IP")
def osbLcsPortletOauthConsumerKey = System.getenv().get("OSB_LCS_PORTLET_OAUTH_CONSUMER_KEY")
def osbLcsPortletOauthConsumerSecret = System.getenv().get("OSB_LCS_PORTLET_OAUTH_CONSUMER_SECRET")
def osbLcsPortletProcotol = System.getenv().get("OSB_LCS_PORTLET_PROTOCOL")
def osbLcsPortletPwd = System.getenv().get("OSB_LCS_PORTLET_PWD")
def pulpoAssetConnectorEnvironmentUniquename = System.getenv().get("PULPO_ASSET_CONNECTOR_ENVIRONMENT_UNIQUENAME")
def pulpoContactConnectorEnvironmentUniquename = System.getenv().get("PULPO_CONTACT_CONNECTOR_ENVIRONMENT_UNIQUENAME")
def pulpoContactsProviderId = System.getenv().get("PULPO_CONTACTS_PROVIDER_ID")
def pulpoProjectId = System.getenv().get("PULPO_PROJECT_ID")

task createDockerContainer(type: DockerCreateContainer) {
	dependsOn subprojects.findAll {!it.childProjects}.copyJacocoAgent

	def javaOpts = project.getProperty('com.liferay.pulpo.connector.de.java.opts')

	javaOpts += ' ' + project.getProperty('com.liferay.pulpo.connector.de.jacoco.opts')

	javaOpts += ' ' + project.getProperty('com.liferay.pulpo.connector.de.jolokia.opts')

	if (project.hasProperty('debug')) {
		javaOpts += ' ' + project.getProperty('com.liferay.pulpo.connector.de.debug.opts')
	}

	targetImageId { getImageNameWithUserAndVersion() }
	portBindings =['8099:8099', '5005:5005', '8778:8778', '11311:11311', '8080:8080']
	extraHosts = ["lcs-portal-pulpo:$osbLcsPortletIp", "lcs-gateway-pulpo:$osbLcsGatewayWebIp"]
	env = [
		"JACOCO_DIR=${rootDir}/build/jacoco",
		"JAVA_OPTS=$javaOpts",
		"OSB_LCS_GATEWAY_WEB_HOST_NAME=$osbLcsGatewayHostName",
		"OSB_LCS_GATEWAY_WEB_HOST_PORT=$osbLcsGatewayHostPort",
		"OSB_LCS_GATEWAY_WEB_PROTOCOL=$osbLcsGatewayWebProtocol",
		"OSB_LCS_PORTLET_EMAIL=$osbLcsPortletEmail",
		"OSB_LCS_PORTLET_HOST_NAME=$osbLcsPortletHostName",
		"OSB_LCS_PORTLET_HOST_PORT=$osbLcsPortletHostPort",
		"OSB_LCS_PORTLET_OAUTH_CONSUMER_KEY=$osbLcsPortletOauthConsumerKey",
		"OSB_LCS_PORTLET_OAUTH_CONSUMER_SECRET=$osbLcsPortletOauthConsumerSecret",
		"OSB_LCS_PORTLET_PROTOCOL=$osbLcsPortletProcotol",
		"OSB_LCS_PORTLET_PWD=$osbLcsPortletPwd",
		"PULPO_ASSET_CONNECTOR_ENVIRONMENT_UNIQUENAME=${pulpoAssetConnectorEnvironmentUniquename}",
		"PULPO_CONTACT_CONNECTOR_ENVIRONMENT_UNIQUENAME=${pulpoContactConnectorEnvironmentUniquename}",
		"PULPO_CONTACTS_PROVIDER_ID=${pulpoContactsProviderId}",
		"PULPO_PROJECT_ID=${pulpoProjectId}",
		"ROOT_DIR=${rootDir}",
	]
	containerName = "com-liferay-pulpo-connector-de-private"

	String jacocoDirName = getDockerFilePath(new File(rootDir, "build/jacoco"))
	String clientDeployDirName = getDockerFilePath(getClientDeployDir())

	binds = ["${jacocoDirName}" : '/jacoco', "${clientDeployDirName}" : '/liferay/deploy']
}

task runDocker(type: DockerStartContainer) {
	dependsOn createDockerContainer

	targetContainerId { createDockerContainer.getContainerId() }

	finalizedBy checkDocker
}

def getDockerFilePath(File f) {
	String absolutePath = FileUtil.getAbsolutePath(f)

	if (OSDetector.windows) {
		char unit = absolutePath.charAt(0)

		absolutePath = "/" + String.valueOf(Character.toLowerCase(unit)) + absolutePath.substring(2)
	}

	absolutePath
}

def getImageName() {
	return project.property("com.liferay.pulpo.connector.de.docker.image.name")
}

def getImageVersion() {
	return project.property("com.liferay.pulpo.connector.de.docker.image.version")
}

def getUserName() {
	return project.property("com.liferay.pulpo.connector.de.docker.username")
}

def getImageNameWithUser() {
	return getUserName() + "/" + getImageName()
}

def getImageNameWithUserAndVersion() {
	return getImageNameWithUser() + ":" + getImageVersion()
}

task jacocoRootReport(type: org.gradle.testing.jacoco.tasks.JacocoReport) {
	dependsOn = subprojects.findAll{!it.childProjects}.test
	additionalSourceDirs = files(subprojects.findAll{!it.childProjects}.sourceSets.main.allSource.srcDirs)
	sourceDirectories = files(subprojects.findAll{!it.childProjects}.sourceSets.main.allSource.srcDirs)
	classDirectories =  files(subprojects.findAll{!it.childProjects}.sourceSets.main.output)

	executionData = files(subprojects.findAll{!it.childProjects}.jacocoTestReport.executionData, "${rootDir}/build/jacoco/testIntegration.exec")

	onlyIf = { true }

	afterEvaluate {
		classDirectories = files(
			classDirectories.files.collect {
				fileTree(
					dir: it,
					exclude: [
						'**/assets/*',
						'**/constants/*',
						'**/exception/*Exception*',
						'**/model/*Model*',
						'**/model/*Soap*',
						'**/model/*Wrapper*',
						'**/model/impl/*BaseImpl*',
						'**/model/impl/*CacheModel*',
						'**/model/impl/*ModelImpl*',
						'**/service/*ServiceUtil*',
						'**/service/*ServiceWrapper*',
						'**/service/base/*',
						'**/service/http/*',
						'**/service/persistence/*Util*',
						'**/service/persistence/impl/*PersistenceImpl*',
						'**/service/persistence/impl/*FinderBaseImpl*',
						'**/service/util/*',
						'**/test/util/*'
					]
				)
			}
		)
	}

	reports {
		html.enabled = true
		xml.enabled = true
		xml.destination "${rootDir}/build/reports/jacoco/test/jacocoTestReport.xml"
		csv.enabled = false
	}

	doFirst {
		executionData = files(executionData.findAll { it.exists() })
	}
}

task dumpJacoco {
	doLast {
		def serverUrl = 'service:jmx:rmi:///jndi/rmi://localhost:8099/jmxrmi'
		String beanName = "org.jacoco:type=Runtime"
		def server = JmxFactory.connect(new JmxUrl(serverUrl)).MBeanServerConnection
		def gmxb = new GroovyMBean(server, beanName)

		gmxb.dump(true)
	}
}

tasks.coveralls {
	dependsOn jacocoRootReport
}

coveralls.sourceDirs = files(subprojects.findAll{!it.childProjects}.sourceSets.main.allSource.srcDirs).collect {
	file -> file.absolutePath
}