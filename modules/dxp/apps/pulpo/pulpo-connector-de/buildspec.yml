phases:
  install:
    commands:
      - echo install phase started on `date`
  pre_build:
    commands:
      - echo pre_build phase started on `date`
  build:
    commands:
      - echo build phase started on `date`
      - chmod a+x $CODEBUILD_SRC_DIR/gradlew
      - cd $CODEBUILD_SRC_DIR/pulpo-connector-de-assets-functional-test
      - $CODEBUILD_SRC_DIR/gradlew -Pcom.liferay.pulpo.connector.de.docker.apply.plugin=false testIntegration --stacktrace
      - cd $CODEBUILD_SRC_DIR/pulpo-connector-de-contacts-functional-test
      - $CODEBUILD_SRC_DIR/gradlew -Pcom.liferay.pulpo.connector.de.docker.apply.plugin=false testIntegration --stacktrace
  post_build:
    commands:
      - echo post_build phase started on `date`

version: 0.2