sourceCompatibility = "1.8"
targetCompatibility = "1.8"

dependencies {
	provided group: "com.github.cukespace", name: "cukespace-core", version: "1.6.3"
	provided group: "com.google.guava", name: "guava", version: "21.0"
	provided group: "com.liferay", name: "net.jsourcerer.webdriver.JSErrorCollector", version: "0.6"
	provided group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "2.6.0"
	provided group: "com.relevantcodes", name: "extentreports", version: "2.41.2"
	provided group: "com.vimalselvam", name: "cucumber-extentsreport", version: "1.1.1"
	provided group: "info.cukes", name: "cucumber-core", version: "1.2.5"
	provided group: "info.cukes", name: "gherkin", version: "2.12.2"
	provided group: "junit", name: "junit", version: "4.12"
	provided group: "org.jboss.arquillian.graphene", name: "graphene-webdriver", version: "2.1.0.Final"
	provided group: "org.seleniumhq.selenium", name: "selenium-api", version: "3.4.0"
	provided group: "org.seleniumhq.selenium", name: "selenium-chrome-driver", version: "3.4.0"
	provided group: "org.seleniumhq.selenium", name: "selenium-firefox-driver", version: "3.4.0"
	provided group: "org.seleniumhq.selenium", name: "selenium-java", version: "3.4.0"
	provided group: "org.seleniumhq.selenium", name: "selenium-remote-driver", version: "3.4.0"
	provided group: "org.seleniumhq.selenium", name: "selenium-support", version: "3.4.0"
}

deploy {
	enabled = false
}

project.ext.skipDocker = true