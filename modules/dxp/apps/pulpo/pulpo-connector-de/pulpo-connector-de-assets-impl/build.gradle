sourceCompatibility = "1.8"
targetCompatibility = "1.8"

dependencies {
	provided files("../pulpo-connector-de-docker/libs/com.liferay.osb.lcs.messaging.osgi-1.0.0.jar")
	provided group: "com.liferay", name: "com.liferay.osgi.util", version: "3.0.0"
	provided group: "com.liferay.plugins", name: "lcs-portlet", version: "7.0.10.39"
	provided group: "com.liferay.portal", name: "com.liferay.portal.impl", version: "2.0.0"
	provided group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "2.0.0"
	provided group: "javax.portlet", name: "portlet-api", version: "2.0"
	provided group: "org.osgi", name: "org.osgi.core", version: "5.0.0"
	provided group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.3.0"
	provided project(":private:apps:pulpo:pulpo-connector-de:pulpo-connector-de-assets-api")
	provided project(":private:apps:pulpo:pulpo-connector-de:pulpo-connector-de-assets-properties-provider")
	provided project(":private:apps:pulpo:pulpo-connector-de:pulpo-connector-de-assets-url-provider")
}

deployDependencies {
	from configurations.provided
	include "com.liferay.osb.lcs.messaging.osgi-*.jar"
	include "lcs-portlet-*.war"
}