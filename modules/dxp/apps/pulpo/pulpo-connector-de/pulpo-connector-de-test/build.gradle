sourceCompatibility = "1.8"
targetCompatibility = "1.8"

dependencies {
	testIntegrationCompile  project(":private:apps:pulpo:pulpo-connector-de:pulpo-connector-de-api")
	testIntegrationCompile group: "com.liferay", name: "com.liferay.arquillian.extension.junit.bridge", version: "1.0.6"
	testIntegrationCompile group: "com.liferay", name: "com.liferay.petra.xml", version: "1.0.0"
	testIntegrationCompile group: "com.liferay", name: "com.liferay.registry.api", version: "1.0.0"
	testIntegrationCompile group: "com.liferay.osb.faro", name: "com.liferay.osb.faro.site.arquillian.extension", version: "0.0.1-20170717.113204-1"
	testIntegrationCompile group: "com.liferay.portal", name: "com.liferay.portal.impl", version: "2.0.0"
	testIntegrationCompile group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "2.0.0"
	testIntegrationCompile group: "com.liferay.portal", name: "com.liferay.util.java", version: "2.0.0"

	testIntegrationRuntime group: "com.liferay.portal", name: "com.liferay.portal.test", version: "2.0.0"
	testIntegrationRuntime group: "com.liferay.portal", name: "com.liferay.portal.test.integration", version: "2.0.0"
	testIntegrationRuntime group: "org.apache.aries", name: "org.apache.aries.util", version: "1.1.3"
	testIntegrationRuntime group: "org.apache.aries.jmx", name: "org.apache.aries.jmx", version: "1.1.5"
}

deploy {
	enabled = false
}

deployDependencies {
	from configurations.testIntegrationRuntime
	include "com.liferay.portal.*.jar"
	include "org.apache.aries*.jar"
}

jar {
	enabled = false
}