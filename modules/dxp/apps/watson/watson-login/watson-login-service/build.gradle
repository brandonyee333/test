buildService {
	apiDir = "../watson-login-api/src/main/java"
}

dependencies {
	compileInclude group: "com.auth0", name: "java-jwt", version: "2.2.0"

	provided group: "biz.aQute.bnd", name: "biz.aQute.bndlib", version: "3.1.0"
	provided group: "com.liferay", name: "com.liferay.portal.spring.extender", version: "2.0.0"
	provided group: "com.liferay", name: "com.liferay.portal.upgrade", version: "2.5.0"
	provided group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "2.28.0"
	provided group: "javax.servlet", name: "javax.servlet-api", version: "3.0.1"
	provided project(":private:apps:watson:watson-login:watson-login-api")
}