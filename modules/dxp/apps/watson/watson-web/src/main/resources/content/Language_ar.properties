authorization-token-invalid=رمز التخويل الذي أدخلته غير صالح. يرجى إعادة المحاولة. إذا كنت ترغب في إعادة تعيين الرمز، فانقر فوق "إرسال رمز تخويل جديد أدناه".
authorization-token-invalid-ip=لديك عنوان IP غير صالح لرمز المصادقة، يجري تسجيل خروجك. يجب أن تسجل الدخول مرة أخرى باستخدام اسم المستخدم وكلمة المرور الخاصة بك، وسيتم إرسال رمز تخويل جديد لك إلى بريدك الإلكتروني.
authorization-token-invalid-ip-warning=تمت محاولة تسجيل الدخول من عنوان IP غير مرتبط برمز المصادقة الحالي لك. لأسباب تتعلق بالأمان، تم تسجيل خروجك. يجب أن تسجل الدخول مرة أخرى باستخدام اسم المستخدم وكلمة المرور الخاصة بك، وسوف يتم إرسال رمز مصادقة جديد إلى بريدك الإلكتروني.
authorization-token-pending=رمز التخويل الذي تم إرساله لك في السابق لا يزال ساريًا. إذا لم تستلمه وكنت ترغب في إعادة تعيين الرمز، فانقر فوق "إرسال رمز تخويل جديد" أدناه.
