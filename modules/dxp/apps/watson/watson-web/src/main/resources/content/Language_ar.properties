provide-a-brief-description-of-this-address-and-how-it-relates-to-the-incident=اذكر وصفًا مختصرًا لهذا العنوان وكيف يتصل بالحادث.
provide-a-detailed-description-of-this-resource=اذكر وصفًا تفصيليا لهذا المورد. إذا كان المورد يقع في المقر، فاذكر المكان الذي يمكن استرداد المورد منه (على سبيل المثال تسجيل فيديو لجون سميث من 2016-11-12 يقع في DVD #5216)
provide-a-detailed-narrative-of-the-events-of-this-activity=اذكر القصة التفصيلية للأحداث في هذا النشاط.
provide-a-name-that-describes-this-address=اذكر اسمًا لهذا العنوان (مثل حديقة حيوان شيانج ماي أو قريب من المطار أو مكن الاختطاف أو غيره).
provide-a-summary-for-this-resource=اذكر ملخصًا لهذا المورد والذي سوف يُستخدم لأغراض العرض في شريط التنقل بالجانب الأيمن. يجب أن يكون أقل من 5 كلمات.
provide-any-additional-comments-about-this-person=اذكر أي تعليقات إضافية عن هذا الشخص. مثل الندبات أو العلامات أو الوشم أو أي معلومات فريدة أخرى عن الشخص.
provide-any-unique-identifiers-for-this-vehicle=اذكر أي خصائص مادية للسيارة والتي تعرّفها بشكل صحيح (مثل فقدان غطاء الصرة الأمامية بجانب السائق، أو انبعاج المصد الأمامي، أو كسر الزجاج الخلفي أو غيره)
provide-government-issued-ids-for-this-person=اذكر المعرفات الصادرة من الحكومة لهذا الشخص، اختر النوع أولا، ثم أدخل قيمة المعرف.
provide-one-or-more-names-for-this-person=اذكر أحد الأسماء أو أكثر لهذا الشخص. اختر النوع أولا، ثم أدخل قيمة الاسم. إذا كنت على دراية بعدة أسماء مستعارة أو أسماء بديلة، فيرجى ذكرها جميعًا.
provide-phone-numbers-for-this-person=اذكر رقم الهاتف لهذا الشخص، اختر النوع أولا، ثم أدخل رقم الهاتف.
provide-social-media-account-ids-for-this-person=اذكر معرفات حساب التواصل الاجتماعي لهذا الشخص. اختر النوع أولا، ثم أدخل قيمة المعرف.
provide-the-birth-date-of-this-person-if-available=اذكر تاريخ ميلاد هذا الشخص إذا كان متوفرًا.
provide-the-color-of-this-vehicle=اذكر لون هذه السيارة.
provide-the-country-of-ethnicity-for-this-person=اذكر بلد الأصل العرقي لهذا الشخص. إذا كان البلد تايلاند أو بورما، فاذكر أيضًا الأصل العرقي بمزيد من التخصيص.
provide-the-country-where-this-person-was-born=اذكر البلد التي وُلد فيها الشخص.
provide-the-date-that-the-events-of-this-activity-occurred=اذكر تاريخ وقوع أحداث هذا النشاط.
provide-the-date-that-the-events-of-this-activity-were-reported-to-you=اذكر تاريخ وقوع أحداث هذا النشاط الذي أبلغت عنه.
provide-the-date-that-the-events-of-this-incident-ended=التاريخ الذي لم يتوصل فيه التحقيق إلى أي أدلة أو تاريخ الاعتقال.
provide-the-date-that-the-events-of-this-incident-started=اذكر التاريخ الذي تم فيه إبلاغك بوقائع هذا الحادث.
provide-the-date-that-the-events-of-this-incident-were-reported-to-you=اذكر التاريخ الذي أبلغت فيه بوقوع أحداث هذا الحادث.
provide-the-eye-color-of-this-person=اذكر لون العين لهذا الشخص.
