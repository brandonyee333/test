String implPath = "com.liferay.watson.model.impl"
String modelPath = "com.liferay.watson.model"

buildBaseAlloyModels {
	into "jsp/watson/models/base"
}

baseAlloyModels.each {
	String className, Map properties ->

	String baseAlloyModelFileName = "${properties.fileSafeName}_base_model.jspf"

	buildBaseAlloyModels {
		from("jsp/dependencies/alloy_base_model.jspf.template") {
			expand(classname: className, baseclassname: properties.baseClassName, implpath: implPath, instancename: properties.instanceName, langname: properties.langName, modelpath: modelPath, pluralclassname: properties.pluralClassName, pluralinstancename: properties.pluralInstanceName)

			rename {
				baseAlloyModelFileName
			}
		}
	}

	cleanBaseAlloyModels {
		delete new File(buildBaseAlloyModels.destinationDir, baseAlloyModelFileName)
	}
}

defaultTasks = [buildBaseAlloyModels.name]