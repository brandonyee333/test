task runGradleTest

allprojects {
	repositories {
		maven {
			url "https://repository-cdn.liferay.com/nexus/content/groups/public"
		}
	}
}

runGradleTest {
	dependsOn ":modules:sample-ds-service-builder:sample-ds-service-builder-service:buildService"
	dependsOn ":modules:sample-ds-service-builder:sample-ds-service-builder-test:testIntegrationClasses"

	doLast {
		Project sampledsServiceBuilderTestProject = project(":modules:sample-ds-service-builder:sample-ds-service-builder-test")

		File testClassesIntegrationDir = sampledsServiceBuilderTestProject.file("test-classes/integration")

		assert testClassesIntegrationDir.exists()

		assert sampledsServiceBuilderTestProject.clean.targetFiles.asPath.contains("test-classes")
	}
}