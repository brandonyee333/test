import java.util.zip.ZipEntry
import java.util.zip.ZipFile

task runGradleTest

allprojects {
	repositories {
		maven {
			url "https://repository-cdn.liferay.com/nexus/content/groups/public"
		}
	}
}

runGradleTest {
	dependsOn ":modules:sample-spring-service-builder:sample-spring-service-builder-service:buildService"
	dependsOn ":modules:sample-spring-service-builder:sample-spring-service-builder-service:jar"

	doLast {
		Project sampleSpringServiceBuilderServiceProject = project(":modules:sample-spring-service-builder:sample-spring-service-builder-service")

		File sampleSpringServiceBuilderServiceJarFile = sampleSpringServiceBuilderServiceProject.file("build/libs/com.liferay.sample.spring.service.builder.service-1.0.0.jar")

		assert sampleSpringServiceBuilderServiceJarFile.exists()

		ZipFile zipFile = new ZipFile(sampleSpringServiceBuilderServiceJarFile)

		String zipEntryName = "META-INF/MANIFEST.MF"

		ZipEntry zipEntry = zipFile.getEntry(zipEntryName)

		assert zipEntry != null

		zipFile.withCloseable {
			InputStream inputStream = zipFile.getInputStream(zipEntry)

			assert inputStream.text.normalize().contains("Liferay-Spring-Context: META-INF/spring")
		}
	}
}