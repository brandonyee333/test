task runGradleTest

List<String> projectNames = ["java-theme", "js-theme", "js-widget", "modules", "mvc-portlet", "sample-ds-service-builder", "sample-ds-service-builder-api", "sample-ds-service-builder-service", "war-mvc-portlet"]

runGradleTest {
	doLast {
		assert subprojects.collect{it.name}.sort{it}.equals(projectNames)
		assert project(":modules:java-theme").plugins.findPlugin("war") != null
		assert project(":modules:js-theme").plugins.findPlugin("com.liferay.theme.plugin") != null
		assert project(":modules:js-widget").plugins.findPlugin("com.liferay.frontend.plugin") != null
		assert project(":modules:mvc-portlet").plugins.findPlugin("com.liferay.osgi.plugin") != null
		assert project(":modules:sample-ds-service-builder:sample-ds-service-builder-api").plugins.findPlugin("com.liferay.osgi.plugin") != null
		assert project(":modules:sample-ds-service-builder:sample-ds-service-builder-service").plugins.findPlugin("com.liferay.osgi.plugin") != null
		assert project(":modules:war-mvc-portlet").plugins.findPlugin("war") != null
	}
}