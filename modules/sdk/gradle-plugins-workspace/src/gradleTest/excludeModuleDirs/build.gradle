task runGradleTest

runGradleTest {
	dependsOn ":modules:sample-ds-service-builder:sample-ds-service-builder-service:buildService"
	dependsOn ":modules:sample-ds-service-builder:sample-ds-service-builder-service:jar"

	doLast {
		Project sampleDsServiceBuilderAPIProject = project(":modules:sample-ds-service-builder:sample-ds-service-builder-api")

		File sampleDsServiceBuilderAPIJarFile = sampleDsServiceBuilderAPIProject.file("build/libs/com.liferay.sample.ds.service.builder.api-1.0.0.jar")

		assert !sampleDsServiceBuilderAPIJarFile.exists()

		Project sampleDsServiceBuilderServiceProject = project(":modules:sample-ds-service-builder:sample-ds-service-builder-service")

		File sampleDsServiceBuilderJarFile = sampleDsServiceBuilderServiceProject.file("build/libs/com.liferay.sample.ds.service.builder.service-1.0.0.jar")

		assert !sampleDsServiceBuilderJarFile.exists()
	}
}