##
## Test Suites
##


	modified.files.includes[relevant][project-templates-rule]=**

	relevant.rule.names=\
		project-templates-rule

	test.batch.names[relevant][project-templates-rule]=\
		functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][project-templates-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][project-templates-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Project Templates") OR \
            (testray.main.component.name ~ "Project Templates")\
        )

