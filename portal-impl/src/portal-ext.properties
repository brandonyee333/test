#
# Set the properties used to create the Java Mail session. The property
# prefix "mail.session." will be removed before it is used to create the
# session object. These properties will only be read if the property
# "mail.session.jndi.name" is not set.
#
mail.session.mail.pop3.host=arena-mail-pop3
mail.session.mail.pop3.password=
mail.session.mail.pop3.port=110
mail.session.mail.pop3.user=
mail.session.mail.smtp.auth=false
mail.session.mail.smtp.host=arena-mail-smtp
mail.session.mail.smtp.password=
mail.session.mail.smtp.port=25
mail.session.mail.smtp.user=
mail.session.mail.store.protocol=pop3
mail.session.mail.transport.protocol=smtp

mime.types=\
        application/msword doc,\
        application/pdf pdf,\
        application/vnd.ms-excel xls,\
        application/vnd.ms-powerpoint ppt,\
        application/x-ms-wmp wmv,\
        application/x-shockwave-flash swf flv,\
        text/javascript js,\
        text/css css

mime.types.content.disposition.inline=flv,pdf,swf,wmv,css,txt,html,js,xml,xsl,gif,jpg,png,wmv

#
# Set to true if the Portlet authentication token check should be enabled, see http://www.liferay.com/community/wiki/-/wiki/Main/Authentication+Token
