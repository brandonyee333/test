##
## You can override portal.properties by specifying your own settings in this
## file.
##
setup.wizard.enabled=false
portal.ctx=/
locale.default.request=true
plugin.notifications.enabled=false
company.default.web.id=axiell.com
company.security.auth.type=screenName
terms.of.use.required=false
users.reminder.queries.enabled=false
users.reminder.queries.custom.question.enabled=false
locales=en_GB,sv_SE,da_DK,de_DE,fi_FI,pl_PL,fo_FO,kl_GL
company.default.locale=en_GB
company.default.time.zone=GMT

# Must be enabled so the Installer can change its value
web.server.protocol=http

#
# Set this to true to enable the read count for document library files.
#
#dl.file.entry.read.count.enabled=false

#
# Set this to true to enable file rank for document library files.
#
#dl.file.rank.enabled=false

#
# Set the default admin password.
#
default.admin.password=sarenat

#
# Set the default admin screen name prefix.
#
default.admin.screen.name=support

#
# Set the default admin email address prefix.
#
default.admin.email.address.prefix=support

#
# Set the default admin first name.
#
default.admin.first.name=Support

#
# Set the default admin middle name.
#
default.admin.middle.name=

#
# Set the default admin last name.
#
default.admin.last.name=Administrator

#
# Input a list of reserved email addresses separated by \n characters.
#
admin.email.from.name=Nobody
admin.email.from.address=noreplay@axiell.com


company.security.strangers=false

# Set the maximum file size and valid file extensions for documents. A value
# of 0 for the maximum file size can be used to indicate unlimited file
# size. However, the maximum file size allowed is set in the property
# "com.liferay.portal.upload.UploadServletRequestImpl.max.size".
#
dl.file.max.size=4000000

