liferay-learn-ddm-importer:
    name: Liferay Learn Web
    scopes:
        - liferay-json-web-services.everything.write
        - liferay-json-web-services.everything
        - Liferay.Data.Engine.REST.everything
        - Liferay.Headless.Admin.User.everything.read
    type: oAuthApplicationHeadlessServer
    userAccountEmailAddress: test@$[conf:dxp.lxc.liferay.com.virtualInstanceId]
runtime:
    cpu: 2000m
    env:
        - name: LIFERAY_GROUP_FRIENDLY_URL_PATH
          value: guest
        - name: OAUTH2_JOB_PROFILE
          value: liferay-learn-ddm-importer
    memory: 500Mi
    type: configuration
    workload: job