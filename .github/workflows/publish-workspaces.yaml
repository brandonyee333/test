name: CI Test

on:
  push:
    branches:
    - master
    paths:
    - workspaces/liferay-sample-workspace

jobs:
  publish:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    - name: Print Message
      run: |
        echo "This is a test by Seiphon"
        ls -la
